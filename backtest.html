function normalCdf(z){const t=1/(1+.2316419*Math.abs(z)),d=.3989422804*Math.exp(-z*z/2);const p=d*t*(.3193815+t*(-.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));return z>=0?1-p:p}
function logisticWinProb(rA,rB,scale=11){return 1/(1+Math.pow(10,-(rA-rB)/scale))}
function predictSpreadCover(margin,line,std=12){return normalCdf((margin+line)/std)}
function predictOver(predicted,line,std=12){return normalCdf((predicted-line)/std)}
function kellyFrac(fp,bp,fr=0.25){const o=1/bp-1;if(o<=0)return 0;return Math.max(0,((fp*o-(1-fp))/o)*fr)}

function findRating(name,db){
  const n=name.toLowerCase().trim();
  for(const[k,v]of Object.entries(db)){if(k.toLowerCase()===n)return v}
  for(const[k,v]of Object.entries(db)){
    const kl=k.toLowerCase();
    if(n.includes(kl)||kl.includes(n))return v;
    const last=kl.split(' ').pop();
    if(last.length>3&&n.includes(last))return v;
  }
  return null;
}

// ═══ ESPN FETCHER ═══
async function fetchESPN(sport,league,dateStr){
  const url=`https://site.api.espn.com/apis/site/v2/sports/${sport}/${league}/scoreboard?dates=${dateStr}`;
  try{
    const res=await fetch(url);if(!res.ok)return[];
    const data=await res.json();
    const games=[];
    for(const ev of (data.events||[])){
      const comp=ev.competitions[0];
      if(!comp.status.type.completed)continue;
      const teams=comp.competitors;
      const home=teams.find(t=>t.homeAway==='home');
      const away=teams.find(t=>t.homeAway==='away');
      if(!home||!away)continue;
      games.push({
        date:dateStr,
        home_team:home.team.displayName,away_team:away.team.displayName,
        home_score:+home.score,away_score:+away.score,
        home_win:+home.score>+away.score,
        total:+home.score+ +away.score,
        margin:+home.score- +away.score
      });
    }
    return games;
  }catch(e){return[]}
}

function getDates(startStr,endStr){
  const dates=[];
  let d=new Date(startStr+'T12:00:00Z');
  const end=new Date(endStr+'T12:00:00Z');
  while(d<=end){
    dates.push(d.toISOString().slice(0,10).replace(/-/g,''));
    d.setDate(d.getDate()+1);
  }
  return dates;
}

// ═══ BACKTEST ENGINE ═══
function backtestGames(games,ratingsDb,hca,spreadStd,totalStd){
  const res={ml:{bets:0,wins:0,pnl:[]},spread:{bets:0,wins:0,pnl:[]},total:{bets:0,wins:0,pnl:[]}};
  const preds=[];
  let matched=0,skipped=0;

  for(const g of games){
    const hr=findRating(g.home_team,ratingsDb);
    const ar=findRating(g.away_team,ratingsDb);
    if(!hr||!ar){skipped++;continue}
    matched++;

    const modelHP=logisticWinProb(hr.net+hca,ar.net);
    const predMargin=(hr.net-ar.net)+hca;
    const predTotal=hr.off&&ar.off?((hr.off+ar.def)/2)+((ar.off+hr.def)/2):null;

    // ML: bet if model >57% either side (stronger threshold than 55%)
    if(modelHP>0.57){
      res.ml.bets++;
      if(g.home_win){res.ml.wins++;res.ml.pnl.push(1)}else{res.ml.pnl.push(-1)}
    }else if(modelHP<0.43){
      res.ml.bets++;
      if(!g.home_win){res.ml.wins++;res.ml.pnl.push(1)}else{res.ml.pnl.push(-1)}
    }

    // Spread: if model predicts margin > 5pts different from a flat -3 line
    if(Math.abs(predMargin)>3){
      const simSpread=predMargin>0?-3:3;
      const coverP=predictSpreadCover(predMargin>0?predMargin:-predMargin,simSpread,spreadStd);
      if(coverP>0.57){
        res.spread.bets++;
        const favMargin=predMargin>0?g.margin:-g.margin;
        if(favMargin+simSpread>0){res.spread.wins++;res.spread.pnl.push(1)}else{res.spread.pnl.push(-1)}
      }
    }

    // Total: if model predicts total >4pts away from 225 (NBA) or 145 (NCAAB)
    if(predTotal){
      const refLine=predTotal>200?225:145;// auto-detect sport by scale
      if(Math.abs(predTotal-refLine)>4){
        const overP=predictOver(predTotal,refLine,totalStd);
        if(overP>0.57){
          res.total.bets++;
          if(g.total>refLine){res.total.wins++;res.total.pnl.push(1)}else{res.total.pnl.push(-1)}
        }else if(overP<0.43){
          res.total.bets++;
          if(g.total<refLine){res.total.wins++;res.total.pnl.push(1)}else{res.total.pnl.push(-1)}
        }
      }
    }

    preds.push({...g,modelHP,predMargin,predTotal});
  }

  return{res,preds,matched,skipped};
}

// ═══ MAIN ═══
async function runBacktest(){
  const btn=document.getElementById('runBtn');
  const prog=document.getElementById('progress');
  const bar=document.getElementById('progBar');
  const status=document.getElementById('statusText');
  const resultsDiv=document.getElementById('results');

  btn.disabled=true;
  btn.innerHTML='<div class="pulse"></div>RUNNING BACKTEST...';
  prog.style.display='block';

  // Fetch NBA
  const nbaDates=getDates('2025-10-22','2026-03-25');
  let nbaGames=[];
  for(let i=0;i<nbaDates.length;i++){
    if(i%10===0){
      const pct=((i/nbaDates.length)*70).toFixed(0);
      bar.style.width=pct+'%';
      status.textContent=`Fetching NBA games... ${i}/${nbaDates.length} days (${nbaGames.length} games found)`;
      await new Promise(r=>setTimeout(r,1));// yield to UI
    }
    const games=await fetchESPN('basketball','nba',nbaDates[i]);
    nbaGames=nbaGames.concat(games);
    await new Promise(r=>setTimeout(r,50));// rate limit
  }
  status.textContent=`NBA: ${nbaGames.length} games. Fetching NCAAB tournament...`;
  bar.style.width='75%';

  // Fetch NCAAB tournament
  const ncaabDates=getDates('2026-03-17','2026-03-26');
  let ncaabGames=[];
  for(const d of ncaabDates){
    const games=await fetchESPN('basketball','mens-college-basketball',d);
    ncaabGames=ncaabGames.concat(games);
    await new Promise(r=>setTimeout(r,50));
  }
  status.textContent=`NCAAB: ${ncaabGames.length} tournament games. Running model...`;
  bar.style.width='85%';

  // Run backtests
  const nbaRes=backtestGames(nbaGames,NBA,3.0,12,12);
  const ncaabRes=backtestGames(ncaabGames,NCAAB,0,11,11);
  bar.style.width='100%';
  status.textContent='Complete!';

  // Render results
  renderResults(nbaRes,ncaabRes,nbaGames.length,ncaabGames.length,resultsDiv);
  resultsDiv.style.display='block';
  btn.textContent='✅ BACKTEST COMPLETE';
}

  h+='<div class="section"><div class="section-t">📈 P/L CURVES</div>';
  h+='<div class="chart-wrap"><div class="chart-title">MONEYLINE P/L</div><canvas id="chartML" height="200"></canvas></div>';
  h+='<div class="chart-wrap"><div class="chart-title">SPREAD P/L</div><canvas id="chartSpread" height="200"></canvas></div>';
  h+='<div class="chart-wrap"><div class="chart-title">TOTAL P/L</div><canvas id="chartTotal" height="200"></canvas></div>';
  h+='</div>';

  // Calibration
  h+='<div class="section"><div class="section-t">🎯 MODEL CALIBRATION</div>';
  h+='<div class="chart-wrap"><div class="chart-title">PREDICTED vs ACTUAL WIN RATE</div><canvas id="chartCal" height="300"></canvas></div>';
  h+='</div>';

  // Caveats
  h+='<div class="caveat">';
  h+='<strong>⚠️ Important caveats:</strong><br>';
  h+='• Uses end-of-season ratings for all games = <strong>lookahead bias</strong>. Early-season games are rated with info that wasn\'t available yet.<br>';
  h+='• Without actual closing odds, we simulate with fixed thresholds (57%+). Real edges depend on finding a book with worse-than-fair odds.<br>';
  h+='• This tests the MODEL layer only. Cross-book edges (your primary edge source) can\'t be backtested without historical odds snapshots.<br>';
  h+='• <strong>Forward-test with the TRACK tab in the live scanner for the real performance measurement.</strong>';
  h+='</div>';

  h+='<div class="footer">+EV Scanner v4 • Model Backtest • March 2026</div>';

  el.innerHTML=h;

  // Draw charts after DOM update
  setTimeout(()=>{
    drawPLChart('chartML',nba.res.ml.pnl,ncaab.res.ml.pnl);
    drawPLChart('chartSpread',nba.res.spread.pnl,ncaab.res.spread.pnl);
    drawPLChart('chartTotal',nba.res.total.pnl,ncaab.res.total.pnl);
    drawCalibration('chartCal',nba.preds,ncaab.preds);
  },100);
}

function statsBlock(data,label,totalGames){
  const r=data.res;
  let h=`<div style="font-size:12px;color:var(--muted);margin-bottom:8px;font-family:var(--mono)">${totalGames} games fetched • ${data.matched} matched to ratings • ${data.skipped} skipped</div>`;
  h+='<div class="row r3">';
  for(const[mkt,name]of [['ml','Moneyline'],['spread','Spread'],['total','Total']]){
    const d=r[mkt];
    const wr=d.bets?((d.wins/d.bets)*100).toFixed(1):'—';
    const net=d.pnl.reduce((a,b)=>a+b,0);
    const roi=d.bets?((net/d.bets)*100).toFixed(1):'—';
    const color=net>0?'var(--g)':net<0?'var(--r)':'var(--muted)';
    h+='<div class="box">';
    h+=`<div class="box-l">${name.toUpperCase()}</div>`;
    h+=`<div class="box-v" style="color:${color};font-size:16px">${d.wins}/${d.bets}</div>`;
    h+=`<div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:4px">${wr}% WR • ${net>=0?'+':''}${net.toFixed(1)}u • ${roi}% ROI</div>`;
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function drawPLChart(canvasId,nbaPnl,ncaabPnl){
  const ctx=document.getElementById(canvasId);
  if(!ctx)return;
  const datasets=[];
  if(nbaPnl.length){
    const cum=[];let s=0;nbaPnl.forEach(v=>{s+=v;cum.push(s)});
    datasets.push({label:`NBA (${nbaPnl.length} bets)`,data:cum,borderColor:'#ff6b35',backgroundColor:'rgba(255,107,53,.1)',fill:true,tension:.3,pointRadius:0,borderWidth:2});
  }
  if(ncaabPnl.length){
    const cum=[];let s=0;ncaabPnl.forEach(v=>{s+=v;cum.push(s)});
    const offset=nbaPnl.length;
    datasets.push({label:`NCAAB (${ncaabPnl.length} bets)`,data:cum,borderColor:'#ff9e44',backgroundColor:'rgba(255,158,68,.1)',fill:true,tension:.3,pointRadius:0,borderWidth:2});
  }
  new Chart(ctx,{
    type:'line',
    data:{labels:Array.from({length:Math.max(nbaPnl.length,ncaabPnl.length)},(_, i)=>i+1),datasets},
    options:{
      responsive:true,
      plugins:{legend:{labels:{color:'#7c889a',font:{family:'IBM Plex Mono',size:11}}}},
      scales:{
        x:{display:true,grid:{color:'rgba(255,255,255,.03)'},ticks:{color:'#4a5568',font:{size:10}}},
        y:{display:true,grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#7c889a',font:{family:'IBM Plex Mono',size:11}}}
      }
    }
  });
}

function drawCalibration(canvasId,nbaPreds,ncaabPreds){
  const ctx=document.getElementById(canvasId);
  if(!ctx)return;
  const bins=[[0,.3],[.3,.4],[.4,.45],[.45,.5],[.5,.55],[.55,.6],[.6,.7],[.7,1]];

  function getBinData(preds){
    const pts=[];
    for(const[lo,hi]of bins){
      const sub=preds.filter(p=>p.modelHP>=lo&&p.modelHP<hi);
      if(!sub.length)continue;
      const avgModel=sub.reduce((s,p)=>s+p.modelHP,0)/sub.length;
      const actualWR=sub.filter(p=>p.home_win).length/sub.length;
      pts.push({x:avgModel*100,y:actualWR*100});
    }
    return pts;
  }

  const nbaData=getBinData(nbaPreds);
  const ncaabData=getBinData(ncaabPreds);

  new Chart(ctx,{
    type:'scatter',
    data:{
      datasets:[
        {label:'Perfect',data:[{x:0,y:0},{x:100,y:100}],type:'line',borderColor:'#333',borderDash:[5,5],pointRadius:0,borderWidth:1},
        {label:'NBA',data:nbaData,backgroundColor:'#ff6b35',borderColor:'#ff6b35',pointRadius:8,showLine:true,borderWidth:2},
        {label:'NCAAB',data:ncaabData,backgroundColor:'#ff9e44',borderColor:'#ff9e44',pointRadius:8,showLine:true,borderWidth:2}
      ]
    },
    options:{
      responsive:true,
      aspectRatio:1,
      plugins:{legend:{labels:{color:'#7c889a',font:{family:'IBM Plex Mono',size:11}}}},
      scales:{
        x:{min:0,max:100,title:{display:true,text:'Model Predicted %',color:'#7c889a'},grid:{color:'rgba(255,255,255,.03)'},ticks:{color:'#7c889a'}},
        y:{min:0,max:100,title:{display:true,text:'Actual Win Rate %',color:'#7c889a'},grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#7c889a'}}
      }
    }
  });
}
</script>
