<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>+EV Scanner Pro v3</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body style="background:#060810;color:#d8dae5;font-family:'Space Grotesk',sans-serif;margin:0">
<div id="app" style="max-width:780px;margin:0 auto;padding:16px 14px 80px"></div>
<script>
// TEST: minimal scanner to diagnose the issue
const APIBASE='https://api.the-odds-api.com/v4';
let S={apiKey:'',testLog:[]};

function load(){
  // Try evpro3 first, then evpro2
  for(const k of ['evpro3','evpro2']){
    try{const d=JSON.parse(localStorage.getItem(k));if(d&&d.apiKey){S.apiKey=d.apiKey;break}}catch(e){}
  }
}

async function runTest(){
  const log=document.getElementById('log');
  S.testLog=[];
  function addLog(msg){S.testLog.push(msg);log.innerHTML=S.testLog.map(l=>'<div style="padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)">'+l+'</div>').join('')}

  if(!S.apiKey){addLog('❌ No API key found in localStorage');return}
  addLog('🔑 API key found: '+S.apiKey.substring(0,8)+'...');

  // Test 1: GET /sports
  addLog('📡 Step 1: Fetching /v4/sports...');
  try{
    const r1=await fetch(APIBASE+'/sports?apiKey='+S.apiKey);
    addLog('   HTTP status: '+r1.status);
    addLog('   Remaining: '+r1.headers.get('x-requests-remaining'));
    addLog('   Used: '+r1.headers.get('x-requests-used'));
    if(!r1.ok){addLog('❌ Failed: '+r1.status);return}
    const sports=await r1.json();
    const active=sports.filter(s=>s.active);
    addLog('✅ '+active.length+' active sports: '+active.map(s=>s.key).join(', '));
  }catch(e){addLog('❌ Network error: '+e.message);return}

  // Test 2: GET /events for NBA
  addLog('');
  addLog('📡 Step 2: Fetching NBA events...');
  try{
    const r2=await fetch(APIBASE+'/sports/basketball_nba/events?apiKey='+S.apiKey);
    addLog('   HTTP status: '+r2.status);
    addLog('   Remaining: '+r2.headers.get('x-requests-remaining'));
    if(!r2.ok){addLog('❌ Failed');return}
    const events=await r2.json();
    addLog('✅ '+events.length+' NBA events');
    if(!events.length){addLog('⚠️ No NBA events returned');return}
    const ev=events[0];
    addLog('   First game: '+(ev.away_team||'?')+' @ '+(ev.home_team||'?')+' id='+ev.id);

    // Test 3: GET /events/{id}/odds with just h2h,spreads,totals
    addLog('');
    addLog('📡 Step 3: Fetching odds for first game (h2h,spreads,totals)...');
    const r3=await fetch(APIBASE+'/sports/basketball_nba/events/'+ev.id+'/odds?apiKey='+S.apiKey+'&regions=us&markets=h2h,spreads,totals&oddsFormat=american');
    addLog('   HTTP status: '+r3.status);
    addLog('   Remaining: '+r3.headers.get('x-requests-remaining'));
    if(!r3.ok){addLog('❌ Failed: '+r3.status);return}
    const odds=await r3.json();
    addLog('✅ Got odds data');
    addLog('   Bookmakers: '+(odds.bookmakers?odds.bookmakers.length:0));
    if(odds.bookmakers&&odds.bookmakers.length){
      odds.bookmakers.forEach(bk=>{
        addLog('   📚 '+bk.title+': '+bk.markets.map(m=>m.key+'('+m.outcomes.length+')').join(', '));
      });
    }else{
      addLog('⚠️ No bookmakers in response. Raw: '+JSON.stringify(odds).substring(0,300));
    }
  }catch(e){addLog('❌ Error: '+e.message)}

  // Test 4: GET /events for NHL
  addLog('');
  addLog('📡 Step 4: Fetching NHL events...');
  try{
    const r4=await fetch(APIBASE+'/sports/icehockey_nhl/events?apiKey='+S.apiKey);
    addLog('   HTTP status: '+r4.status);
    if(!r4.ok){addLog('❌ Failed');return}
    const nhlEv=await r4.json();
    addLog('✅ '+nhlEv.length+' NHL events');
  }catch(e){addLog('❌ Error: '+e.message)}

  addLog('');
  addLog('🏁 Test complete');
}

load();
document.getElementById('app').innerHTML=
  '<div style="padding:20px 0"><div style="font-size:22px;font-weight:700;color:#00ffaa;margin-bottom:6px">🔧 API Diagnostic Tool</div>'+
  '<div style="font-size:13px;color:#888;margin-bottom:20px">This will make 4 API calls to test your connection. Hit the button below.</div>'+
  '<div style="font-size:12px;color:#aaa;margin-bottom:12px;font-family:monospace">Key loaded: '+(S.apiKey?S.apiKey.substring(0,8)+'...':'❌ NONE')+'</div>'+
  '<button onclick="runTest()" style="width:100%;padding:16px;border-radius:10px;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;background:rgba(0,255,170,.15);border:1px solid rgba(0,255,170,.25);color:#00ffaa;font-family:monospace;margin-bottom:16px">▶ RUN DIAGNOSTIC</button>'+
  '<div id="log" style="background:rgba(0,0,0,.4);border-radius:10px;padding:16px;font-size:12px;font-family:monospace;color:#ccc;line-height:1.8;min-height:200px">Results will appear here...</div></div>';
</script>
</body>
</html>
