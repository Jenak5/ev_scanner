<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080c14">
<title>+EV Scanner v4 — Model-Powered</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--surface:#0d1220;--card:rgba(255,255,255,0.028);
  --border:rgba(255,255,255,0.06);--border-h:rgba(255,255,255,0.12);
  --g:#00ffaa;--g2:#10b981;--cyan:#22d3ee;--gold:#fbbf24;
  --y:#ffd600;--r:#f43f5e;--slip:#fb923c;
  --text:#e4e8f0;--muted:#7c889a;--dim:#4a5568;
  --mono:'IBM Plex Mono',monospace;--body:'Outfit',sans-serif;
  --radius:10px;--radius-lg:14px;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:15px;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
input,select,button,textarea{font-family:var(--mono);outline:none}
::placeholder{color:#445}
.app{max-width:800px;margin:0 auto;padding:16px 14px;position:relative;z-index:1}

/* Subtle grid bg */
.grid-bg{position:fixed;inset:0;opacity:.015;background-image:
  repeating-linear-gradient(0deg,transparent,transparent 79px,rgba(0,255,170,.25) 79px,rgba(0,255,170,.25) 80px),
  repeating-linear-gradient(90deg,transparent,transparent 79px,rgba(0,255,170,.25) 79px,rgba(0,255,170,.25) 80px);
pointer-events:none}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;margin-bottom:16px;border-bottom:1px solid rgba(0,255,170,.06)}
.logo{font-size:22px;font-weight:800;letter-spacing:-.5px}
.logo-ev{background:linear-gradient(135deg,#00ffaa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:10px;letter-spacing:3px;color:var(--muted);font-family:var(--mono);font-weight:500}

/* Tabs */
.tabs{display:flex;gap:2px}
.tab{padding:8px 12px;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:1.5px;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--muted);font-family:var(--mono);transition:all .15s}
.tab:hover{color:var(--text);background:rgba(255,255,255,.03)}
.tab.on{background:rgba(0,255,170,.08);border-color:rgba(0,255,170,.18);color:var(--g)}

/* Layout */
.row{display:grid;gap:8px;margin-bottom:14px}
.r2{grid-template-columns:1fr 1fr}.r3{grid-template-columns:1fr 1fr 1fr}.r4{grid-template-columns:repeat(4,1fr)}
.box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;backdrop-filter:blur(8px)}
.lbl{display:block;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;font-family:var(--mono);font-weight:600}
.val{font-size:20px;font-weight:800;font-family:var(--mono);text-align:center}
.vl{font-size:9px;letter-spacing:2px;color:var(--muted);text-align:center;margin-bottom:3px;font-family:var(--mono);font-weight:600}
.inp{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:11px 13px;color:#fff;font-size:14px;transition:border-color .15s}
.inp:focus{border-color:rgba(0,255,170,.3)}

/* Chips / filters */
.chip{font-size:10px;padding:6px 12px;border-radius:6px;cursor:pointer;font-weight:700;letter-spacing:.5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--mono);transition:all .15s}
.chip:hover{border-color:var(--border-h);color:var(--text)}
.chip.on{background:rgba(0,255,170,.08);border-color:rgba(0,255,170,.18);color:var(--g)}

/* Buttons */
.btn-scan{width:100%;padding:16px;border-radius:var(--radius-lg);font-weight:700;font-size:14px;cursor:pointer;letter-spacing:2px;
  background:linear-gradient(135deg,rgba(0,255,170,.1),rgba(34,211,238,.05));
  border:1px solid rgba(0,255,170,.2);color:var(--g);position:relative;overflow:hidden;font-family:var(--mono);transition:all .15s}
.btn-scan:hover{background:linear-gradient(135deg,rgba(0,255,170,.15),rgba(34,211,238,.08));border-color:rgba(0,255,170,.3)}
.btn-scan:disabled{opacity:.5;cursor:wait}
.btn-scan .pulse{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,255,170,.08),transparent);animation:scan 1.5s infinite}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* Edge cards */
.edge-card{border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:10px;position:relative;transition:transform .1s}
.edge-card:active{transform:scale(.995)}
.grade{position:absolute;top:12px;right:14px;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;font-family:var(--mono)}
.edge-source{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;font-family:var(--mono);letter-spacing:.5px}
.src-cross{background:rgba(0,255,170,.08);color:var(--g);border:1px solid rgba(0,255,170,.15)}
.src-model{background:rgba(251,191,36,.08);color:var(--gold);border:1px solid rgba(251,191,36,.15)}
.src-both{background:rgba(34,211,238,.08);color:var(--cyan);border:1px solid rgba(34,211,238,.15)}

/* Metrics row */
.mets{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.met{background:rgba(0,0,0,.25);border-radius:8px;padding:7px 10px;text-align:center;min-width:62px}
.met-l{font-size:9px;letter-spacing:1px;color:var(--muted);font-family:var(--mono);font-weight:600}
.met-v{font-size:14px;font-weight:700;font-family:var(--mono)}

/* Books */
.books{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.book{font-size:10px;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.03);border:1px solid var(--border);color:#99a8b8;font-family:var(--mono)}
.book.best{background:rgba(0,255,170,.06);border-color:rgba(0,255,170,.15);color:var(--g)}

/* Slips */
.slip{background:rgba(0,255,170,.03);border:1px solid rgba(0,255,170,.1);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:14px}
.slip-t{font-size:12px;font-weight:700;color:var(--g);letter-spacing:2px;margin-bottom:10px;font-family:var(--mono)}
.slip-r{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px}

.cslip{background:rgba(251,146,60,.03);border:1px solid rgba(251,146,60,.1);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:14px}
.cslip-t{font-size:12px;font-weight:700;color:var(--slip);letter-spacing:2px;margin-bottom:10px;font-family:var(--mono)}
.cslip-r{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(251,146,60,.06);font-size:13px}
.cslip-rm{cursor:pointer;color:var(--r);font-size:9px;font-weight:700;padding:2px 8px;border:1px solid rgba(244,63,94,.12);border-radius:4px;background:rgba(244,63,94,.04);margin-left:8px}
.cslip-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(251,146,60,.06)}
.cslip-stat{text-align:center}
.cslip-stat-l{font-size:8px;letter-spacing:1px;color:var(--muted);font-family:var(--mono);font-weight:600}
.cslip-stat-v{font-size:15px;font-weight:800;font-family:var(--mono)}

/* Add to slip button */
.add-btn{position:absolute;top:14px;right:60px;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;cursor:pointer;border:1px solid rgba(251,146,60,.12);background:rgba(251,146,60,.04);color:var(--slip);transition:all .15s}
.add-btn:hover{background:rgba(251,146,60,.12);transform:scale(1.05)}
.add-btn.added{background:rgba(251,146,60,.15);border-color:var(--slip);color:#fff}

/* Misc */
.setup{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px}
.setup-t{font-size:14px;font-weight:700;color:#fff;margin-bottom:12px;font-family:var(--mono)}
.status{text-align:center;padding:10px;border-radius:8px;font-size:13px;margin-bottom:12px;font-family:var(--mono)}
.prog{height:3px;background:var(--border);border-radius:2px;margin-bottom:12px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--g),var(--cyan));border-radius:2px;transition:width .3s}
.empty{text-align:center;padding:40px 20px;border:1px dashed var(--border);border-radius:var(--radius-lg);margin-bottom:16px;font-size:13px;color:var(--muted)}
.sm-btn{background:rgba(255,255,255,.03);border:1px solid var(--border);color:#8898a8;border-radius:6px;padding:8px 14px;font-size:11px;cursor:pointer;letter-spacing:1px;font-weight:700;font-family:var(--mono);transition:all .15s}
.sm-btn:hover{border-color:var(--border-h);color:var(--text)}
.footer{text-align:center;font-size:11px;color:#334;padding:24px 0;font-family:var(--mono)}
.hidden{display:none}
</style>
</head>
<body>
<div class="grid-bg"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// QUANT ENGINE (v2 proven — unchanged)
// ═══════════════════════════════════════════════════════════════
function normalCdf(z){const t=1/(1+.2316419*Math.abs(z)),d=.3989422804*Math.exp(-z*z/2);const p=d*t*(.3193815+t*(-.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));return z>=0?1-p:p}
function calcBase(line,avg){return normalCdf((avg-line)/Math.max(avg*.2,2))}
function calcEv(tp,mp){return(tp-mp)*(1/mp)}
function kellyF(tp,mp,fr){const o=1/mp-1;if(o<=0)return 0;return Math.max(0,((tp*o-(1-tp))/o)*fr)}
function americanToProb(odds){return odds>0?100/(odds+100):Math.abs(odds)/(Math.abs(odds)+100)}
function probToAmerican(p){if(p<=0||p>=1)return 0;return p>=.5?Math.round(-100*p/(1-p)):Math.round(100*(1-p)/p)}
function getGrade(ev){
  if(ev>=.2)return{l:'A+',c:'#00ffaa',bg:'18,255,170'};
  if(ev>=.12)return{l:'A',c:'#10b981',bg:'16,185,129'};
  if(ev>=.08)return{l:'B+',c:'#84cc16',bg:'132,204,22'};
  if(ev>=.05)return{l:'B',c:'#eab308',bg:'234,179,8'};
  if(ev>=.02)return{l:'C',c:'#f97316',bg:'249,115,22'};
  if(ev>=0)return{l:'D',c:'#ef4444',bg:'239,68,68'};
  return{l:'F',c:'#f43f5e',bg:'244,63,94'}
}
const GR={'A+':0,A:1,'B+':2,B:3,C:4,D:5,F:6};

// ═══════════════════════════════════════════════════════════════
// MODEL ENGINE (NEW — logistic win probability from bracketology)
// ═══════════════════════════════════════════════════════════════
// Sport-specific scaling factors for the logistic model
// P = 1 / (1 + 10^(-emDiff / scalingFactor))
const MODEL_CONFIG={
  // scale=logistic scaling, hca=home court advantage (pts), spreadStd=game-to-game std dev, totalStd=total std dev
  // neutral=true means no home court (tournament play)
  basketball_nba:{scale:11,metric:'netRtg',label:'Net Rating',hca:3.0,spreadStd:12,totalStd:12,leagueAvg:115.5},
  basketball_ncaab:{scale:11,metric:'adjEM',label:'AdjEM (KenPom)',hca:0,spreadStd:11,totalStd:11,leagueAvg:107,neutral:true},
  basketball_wnba:{scale:11,metric:'netRtg',label:'Net Rating',hca:2.5,spreadStd:11,totalStd:11,leagueAvg:100},
  icehockey_nhl:{scale:0.8,metric:'goalDiff',label:'Goal Diff/G',hca:0.15,spreadStd:1.5,totalStd:1.2,leagueAvg:3.1},
  baseball_mlb:{scale:0.5,metric:'runDiff',label:'Run Diff/G',hca:0.3,spreadStd:3.5,totalStd:2.5,leagueAvg:4.5},
  americanfootball_nfl:{scale:8,metric:'dvoa',label:'DVOA',hca:2.5,spreadStd:14,totalStd:13,leagueAvg:22},
  americanfootball_ncaaf:{scale:10,metric:'adjEM',label:'AdjEM',hca:3.0,spreadStd:16,totalStd:14,leagueAvg:28},
  soccer_epl:{scale:0.6,metric:'xgDiff',label:'xG Diff',hca:0.2,spreadStd:1.2,totalStd:1.0,leagueAvg:1.4},
  soccer_usa_mls:{scale:0.6,metric:'xgDiff',label:'xG Diff',hca:0.25,spreadStd:1.2,totalStd:1.0,leagueAvg:1.4},
  soccer_spain_la_liga:{scale:0.6,metric:'xgDiff',label:'xG Diff',hca:0.2,spreadStd:1.2,totalStd:1.0,leagueAvg:1.3},
  soccer_germany_bundesliga:{scale:0.6,metric:'xgDiff',label:'xG Diff',hca:0.2,spreadStd:1.2,totalStd:1.0,leagueAvg:1.5},
  soccer_italy_serie_a:{scale:0.6,metric:'xgDiff',label:'xG Diff',hca:0.2,spreadStd:1.2,totalStd:1.0,leagueAvg:1.3},
  soccer_france_ligue_one:{scale:0.6,metric:'xgDiff',label:'xG Diff',hca:0.2,spreadStd:1.2,totalStd:1.0,leagueAvg:1.3},
  soccer_uefa_champs_league:{scale:0.6,metric:'xgDiff',label:'xG Diff',hca:0.15,spreadStd:1.2,totalStd:1.0,leagueAvg:1.4}
};

function modelWinProb(team1Rating,team2Rating,scalingFactor){
  const emDiff=team1Rating-team2Rating;
  return 1/(1+Math.pow(10,-emDiff/scalingFactor));
}

// Lookup team rating by matching team name to ratings database
// Returns {off, def, net} object or null
function findTeamRating(teamName,sportKey){
  const db=TEAM_RATINGS[sportKey];
  if(!db)return null;
  const name=teamName.toLowerCase().trim();
  // Try exact match first, then partial
  for(const[key,val]of Object.entries(db)){
    if(key.toLowerCase()===name){
      // Handle legacy single-number format
      if(typeof val==='number')return{off:0,def:0,net:val};
      return val;
    }
  }
  for(const[key,val]of Object.entries(db)){
    const k=key.toLowerCase();
    if(name.includes(k)||k.includes(name)){
      if(typeof val==='number')return{off:0,def:0,net:val};
      return val;
    }
    const lastWord=k.split(' ').pop();
    if(lastWord.length>3&&name.includes(lastWord)){
      if(typeof val==='number')return{off:0,def:0,net:val};
      return val;
    }
  }
  return null;
}

// Compute model edge for a game matchup — returns ML, spread, and total predictions
function computeModelEdge(homeTeam,awayTeam,sportKey){
  const cfg=MODEL_CONFIG[sportKey];
  if(!cfg)return null;
  const homeR=findTeamRating(homeTeam,sportKey);
  const awayR=findTeamRating(awayTeam,sportKey);
  if(!homeR||!awayR)return null;

  const emDiff=homeR.net-awayR.net;
  const hca=cfg.neutral?0:cfg.hca;

  // Moneyline: logistic model
  const modelHomeProb=modelWinProb(homeR.net+hca,awayR.net,cfg.scale);

  // Spread: predicted margin = net rating diff + home court advantage
  const predictedMargin=emDiff+hca;

  // Total: predicted total score
  // For basketball: (home_off + away_def)/2 + (away_off + home_def)/2 ≈ total score
  // For other sports: use off/def if available, else estimate from net
  let predictedTotal=null;
  if(homeR.off&&awayR.off&&homeR.def&&awayR.def){
    predictedTotal=((homeR.off+awayR.def)/2)+((awayR.off+homeR.def)/2);
  }

  return{
    homeProb:modelHomeProb,
    awayProb:1-modelHomeProb,
    homeRating:homeR.net,
    awayRating:awayR.net,
    emDiff,
    predictedMargin,       // positive = home favored by this many pts
    predictedTotal,        // predicted combined score
    spreadStd:cfg.spreadStd,
    totalStd:cfg.totalStd
  };
}

// ═══ MULTI-SLIP LOGIC ═══
function curSlip(){return S.slips[S.activeSlip]||S.slips[0]}
function curLegs(){return curSlip().legs}
function edgeId(e){return e.player+'_'+e.stat+'_'+e.direction+'_'+e.line+'_'+e.bestBook}
function isOnSlip(edge){return curLegs().some(s=>s.id===edgeId(edge))}
function toggleSlip(idx){
  const edge=getFilteredSorted()[idx];if(!edge)return;
  const id=edgeId(edge),legs=curLegs();
  if(legs.some(s=>s.id===id)){curSlip().legs=legs.filter(s=>s.id!==id)}
  else{if(legs.length>=10){alert('Max 10 legs per slip');return}
  legs.push({id,player:edge.player,sport:edge.sport,sportEmoji:edge.sportEmoji,stat:edge.stat,line:edge.line,direction:edge.direction,fairProb:edge.fairProb,bookProb:edge.bookProb,bestBook:edge.bestBook,bestPrice:edge.bestPrice,ev:edge.ev,grade:edge.grade,kelly:edge.kelly,wager:edge.wager,event:edge.event})}
  save();render();
}
function removeSlipByIndex(idx){curSlip().legs.splice(idx,1);save();render()}
function saveSlipEdit(idx){
  const s=curLegs()[idx];if(!s)return;
  const lineInput=document.getElementById('editLine'+idx),oddsInput=document.getElementById('editOdds'+idx);
  if(lineInput)s.line=lineInput.value.trim();
  if(oddsInput){const newOdds=parseInt(oddsInput.value.replace('+',''));if(!isNaN(newOdds)){s.bestPrice=newOdds;s.bookProb=americanToProb(newOdds);s.ev=calcEv(s.fairProb,s.bookProb);s.grade=getGrade(s.ev);s.kelly=kellyF(s.fairProb,s.bookProb,S.kellyMult)*100;s.wager=Math.round(S.bankroll*(s.kelly/100)*100)/100}}
  S.editingSlipLeg=null;save();render();
}
function clearSlip(){curSlip().legs=[];save();render()}
function addNewSlip(){S.slips.push({name:'Slip '+(S.slips.length+1),legs:[]});S.activeSlip=S.slips.length-1;S.editingSlipLeg=null;save();render()}
function switchSlip(idx){S.activeSlip=idx;S.editingSlipLeg=null;render()}
function deleteSlip(idx){if(S.slips.length<=1){alert('Need at least one slip');return}S.slips.splice(idx,1);if(S.activeSlip>=S.slips.length)S.activeSlip=S.slips.length-1;save();render()}
function renameSlip(idx){const name=prompt('Slip name:',S.slips[idx].name);if(name&&name.trim()){S.slips[idx].name=name.trim();save();render()}}
function getSlipStats(){
  const legs=curLegs();if(!legs.length)return{parlayProb:0,totalEv:0,kellyWager:0,parlayOdds:0,payout:0,parlayBookProb:0};
  const parlayProb=legs.reduce((p,s)=>p*s.fairProb,1),parlayBookProb=legs.reduce((p,s)=>p*s.bookProb,1);
  const totalEv=calcEv(parlayProb,parlayBookProb),kellyPct=kellyF(parlayProb,parlayBookProb,S.kellyMult);
  const kellyWager=Math.round(S.bankroll*kellyPct*100)/100,parlayOdds=probToAmerican(parlayBookProb),payout=Math.round(kellyWager*(1/parlayBookProb)*100)/100;
  return{parlayProb,parlayBookProb,totalEv,kellyWager,parlayOdds,payout};
}

function logPlay(idx){
  const edge=getFilteredSorted()[idx];if(!edge)return;
  S.results.push({id:'p_'+Date.now(),type:'straight',player:edge.player,dir:edge.direction,line:edge.line,stat:edge.stat,book:edge.bestBook,price:edge.bestPrice,wager:edge.wager,ev:edge.ev,grade:edge.grade.l,sport:edge.sport,sportEmoji:edge.sportEmoji,event:edge.event,date:new Date().toLocaleDateString(),status:'pending',hit:null,payout:0,source:edge.source||'cross-book'});
  save();S.tab='track';render();
}
function logParlay(){
  const cl=curLegs();if(!cl.length)return;const ss=getSlipStats();
  const legs=cl.map(s=>({player:s.player,dir:s.direction,line:s.line,stat:s.stat,book:s.bestBook,sport:s.sport,sportEmoji:s.sportEmoji,grade:s.grade.l,hit:null}));
  S.results.push({id:'par_'+Date.now(),type:'parlay',player:curSlip().name+' ('+legs.length+'-Leg)',legs,dir:legs.map(l=>l.player.split(' ')[0]).join(' / '),line:'',stat:'',book:'Multi',price:ss.parlayOdds,wager:ss.kellyWager,ev:ss.totalEv,grade:getGrade(ss.totalEv).l,sport:'MIX',sportEmoji:'🎫',event:legs.length+' legs',date:new Date().toLocaleDateString(),status:'pending',hit:null,payout:0});
  save();S.tab='track';render();
}
function resolvePlay(id,hit){
  const r=S.results.find(r=>r.id===id);if(!r)return;
  if(r.type==='parlay'&&r.legs){S.resolvingParlay=id;save();render();return}
  if(hit){r.status='won';r.hit=true;const pay=prompt('Payout amount:','0');r.payout=parseFloat(pay)||0}
  else{r.status='lost';r.hit=false;r.payout=0}
  save();render();
}
function resolveLeg(playId,legIdx,hit){const r=S.results.find(r=>r.id===playId);if(!r||!r.legs||!r.legs[legIdx])return;r.legs[legIdx].hit=hit;save();render()}
function submitParlay(id){
  const r=S.results.find(r=>r.id===id);if(!r||!r.legs)return;
  if(r.legs.filter(l=>l.hit===null).length){alert('Mark all legs first');return}
  if(r.legs.every(l=>l.hit)){r.status='won';r.hit=true;const pay=prompt('All legs hit! Payout:','0');r.payout=parseFloat(pay)||0}
  else{r.status='lost';r.hit=false;r.payout=0}
  S.resolvingParlay=null;save();render();
}
function cancelResolve(){S.resolvingParlay=null;render()}
function quickLossParlay(id){const r=S.results.find(r=>r.id===id);if(!r)return;r.status='lost';r.hit=false;r.payout=0;if(r.legs)r.legs.forEach(l=>{if(l.hit===null)l.hit=false});save();render()}
function unresolvePlay(id){const r=S.results.find(r=>r.id===id);if(!r)return;r.status='pending';r.hit=null;r.payout=0;if(r.legs)r.legs.forEach(l=>{l.hit=null});save();render()}
function deletePlay(id){S.results=S.results.filter(r=>r.id!==id);if(S.resolvingParlay===id)S.resolvingParlay=null;save();render()}

// ═══ HELPERS ═══
function getFilteredSorted(){
  let filtered=S.filterSport==='ALL'?S.edges:S.edges.filter(e=>e.sport===S.filterSport);
  if(S.filterSource!=='ALL')filtered=filtered.filter(e=>e.source===S.filterSource);
  return[...filtered].sort((a,b)=>S.sortBy==='ev'?b.ev-a.ev:S.sortBy==='kelly'?b.kelly-a.kelly:b.fairProb-a.fairProb);
}

// ═══ BOVADA + GENERAL BOOK DEDUP HELPER ═══
function dedupBookmakers(bookmakers){
  const seen={};
  return bookmakers.filter(bk=>{
    const name=bk.title||bk.key||'';
    // Normalize: lowercase, strip whitespace, strip .ag/.com suffixes
    let normalized=name.toLowerCase().replace(/\s+/g,'').replace(/\.(ag|com|net|io)$/,'');
    // Merge known variants
    if(normalized.includes('bovada'))normalized='bovada';
    if(normalized.includes('betonline'))normalized='betonline';
    if(normalized.includes('betrivers'))normalized='betrivers';
    if(normalized.includes('fanduel'))normalized='fanduel';
    if(normalized.includes('draftkings'))normalized='draftkings';
    if(seen[normalized])return false;
    seen[normalized]=true;return true;
  });
}

// ═══════════════════════════════════════════════════════════════
// AUTO-SCANNER — SAME V2 FETCH PATTERN + MODEL LAYER + BOVADA FIX
// ═══════════════════════════════════════════════════════════════
async function runFullScan(){
  if(!S.apiKey){alert('Enter your Odds API key in Settings first');return}
  S.scanning=true;S.edges=[];S.scanProgress=0;S.scanStatus='Starting scan...';render();
  const sportKeys=Object.keys(SPORTS_MAP),totalSteps=sportKeys.length;
  let allEdges=[];

  for(let si=0;si<sportKeys.length;si++){
    const sportKey=sportKeys[si],sport=SPORTS_MAP[sportKey];
    S.scanStatus='Scanning '+sport.name+' events...';
    S.scanProgress=((si)/totalSteps)*100;render();

    try{
      // Step 1: Get events
      const eventsUrl='https://api.the-odds-api.com/v4/sports/'+sportKey+'/events?apiKey='+S.apiKey;
      const eventsRes=await fetch(eventsUrl);
      if(!eventsRes.ok)continue;
      const rawEvents=await eventsRes.json();
      const now=new Date().getTime();
      const events=rawEvents.filter(e=>new Date(e.commence_time).getTime()>now);
      if(!events.length&&!rawEvents.length)continue;

      // Step 2: Props scan (unchanged from v2)
      if(sport.props.length>0){
        const eventsToScan=events;
        for(let ei=0;ei<eventsToScan.length;ei++){
          const event=eventsToScan[ei];
          S.scanStatus='Scanning '+sport.name+': '+event.home_team+' vs '+event.away_team+'...';
          S.scanProgress=((si+ei/eventsToScan.length)/totalSteps)*100;render();

          try{
            const propsUrl='https://api.the-odds-api.com/v4/sports/'+sportKey+'/events/'+event.id+'/odds?apiKey='+S.apiKey+'&regions=us&markets='+sport.props.join(',')+'&oddsFormat=american';
            const propsRes=await fetch(propsUrl);
            if(!propsRes.ok)continue;
            const propsData=await propsRes.json();

            if(propsData.bookmakers){
              const bookmakers=dedupBookmakers(propsData.bookmakers);
              const playerLines={};
              bookmakers.forEach(bk=>{
                (bk.markets||[]).forEach(mkt=>{
                  const outcomes=mkt.outcomes||[],byPlayer={};
                  outcomes.forEach(o=>{
                    // Include point in key so Over 0.5 and Over 1.5 stay separate
                    const ptKey=o.point!=null?'_@'+o.point:'';
                    const key=(o.description||'Unknown')+'_'+mkt.key+ptKey;
                    if(!byPlayer[key])byPlayer[key]={player:o.description||'Unknown',market:mkt.key,point:o.point,overs:[],unders:[]};
                    if(o.name==='Over')byPlayer[key].overs.push({book:bk.title,price:o.price,point:o.point});
                    if(o.name==='Under')byPlayer[key].unders.push({book:bk.title,price:o.price,point:o.point});
                    if(o.name==='Yes')byPlayer[key].overs.push({book:bk.title,price:o.price,point:null});
                    if(o.name==='No')byPlayer[key].unders.push({book:bk.title,price:o.price,point:null});
                  });
                  Object.values(byPlayer).forEach(pl=>{
                    // Include point in playerLines key so different lines stay separate across books
                    const ptSuffix=pl.point!=null?'_@'+pl.point:'';
                    const key=pl.player+'_'+pl.market+ptSuffix;
                    if(!playerLines[key])playerLines[key]={player:pl.player,market:pl.market,books:[],event:event};
                    pl.overs.forEach((ov,i)=>{
                      // Dedup: skip if this book already has an entry for this line
                      const existing=playerLines[key].books.find(b=>b.book===ov.book);
                      if(!existing){
                        playerLines[key].books.push({book:ov.book,overPrice:ov.price,underPrice:pl.unders[i]?pl.unders[i].price:null,point:ov.point});
                      }
                    });
                  });
                });
              });

              // Analyze each player line for cross-book edges
              Object.values(playerLines).forEach(pl=>{
                if(pl.books.length<3)return;// need 3+ books for reliable consensus
                const consensusPoint=pl.books.map(b=>b.point).filter(p=>p!=null)[0]||'Yes';
                const overPrices=pl.books.map(b=>b.overPrice).filter(p=>p!=null);
                const underPrices=pl.books.map(b=>b.underPrice).filter(p=>p!=null);
                if(!overPrices.length)return;
                const avgOverImp=overPrices.map(p=>americanToProb(p)).reduce((a,b)=>a+b,0)/overPrices.length;
                const avgUnderImp=underPrices.length?underPrices.map(p=>americanToProb(p)).reduce((a,b)=>a+b,0)/underPrices.length:(1-avgOverImp);
                const total=avgOverImp+avgUnderImp;
                const fairOver=avgOverImp/total,fairUnder=avgUnderImp/total;

                // Check OVER edge
                const bestOverBook=pl.books.reduce((best,b)=>b.overPrice!=null&&americanToProb(b.overPrice)<americanToProb(best.overPrice||999)?b:best,pl.books[0]);
                const bestOverProb=bestOverBook.overPrice?americanToProb(bestOverBook.overPrice):null;
                if(bestOverProb&&fairOver>bestOverProb&&fairOver>=.05){// min 5% fair prob — skip extreme longshots
                  const ev=calcEv(fairOver,bestOverProb);
                  if(ev>=.02){const k=kellyF(fairOver,bestOverProb,S.kellyMult);
                  allEdges.push({player:pl.player,sport:sport.name,sportEmoji:sport.e,sportColor:sport.c,stat:formatMarket(pl.market),line:consensusPoint,direction:'OVER',fairProb:fairOver,bookProb:bestOverProb,bestBook:bestOverBook.book,bestPrice:bestOverBook.overPrice,ev,grade:getGrade(ev),kelly:k*100,wager:Math.round(S.bankroll*k*100)/100,allBooks:dedupBooks(pl.books.map(b=>({name:b.book,price:b.overPrice})).filter(b=>b.price)),event:pl.event.home_team+' vs '+pl.event.away_team,time:new Date(pl.event.commence_time).toLocaleString(),source:'cross-book'})}
                }
                // Check UNDER edge
                if(underPrices.length){
                  const bestUnderBook=pl.books.reduce((best,b)=>b.underPrice!=null&&americanToProb(b.underPrice)<americanToProb(best.underPrice||999)?b:best,pl.books[0]);
                  const bestUnderProb=bestUnderBook.underPrice?americanToProb(bestUnderBook.underPrice):null;
                  if(bestUnderProb&&fairUnder>bestUnderProb&&fairUnder>=.05){// min 5% fair prob
                    const ev=calcEv(fairUnder,bestUnderProb);
                    if(ev>=.02){const k=kellyF(fairUnder,bestUnderProb,S.kellyMult);
                    allEdges.push({player:pl.player,sport:sport.name,sportEmoji:sport.e,sportColor:sport.c,stat:formatMarket(pl.market),line:consensusPoint,direction:'UNDER',fairProb:fairUnder,bookProb:bestUnderProb,bestBook:bestUnderBook.book,bestPrice:bestUnderBook.underPrice,ev,grade:getGrade(ev),kelly:k*100,wager:Math.round(S.bankroll*k*100)/100,allBooks:dedupBooks(pl.books.map(b=>({name:b.book,price:b.underPrice})).filter(b=>b.price)),event:pl.event.home_team+' vs '+pl.event.away_team,time:new Date(pl.event.commence_time).toLocaleString(),source:'cross-book'})}
                  }
                }
              });
            }
          }catch(e){console.log('Event error:',e)}
          await new Promise(r=>setTimeout(r,300));
        }
      }

      // ── GAME-LEVEL MARKETS + MODEL EDGES ──
      const gameMarketsArr=sport.gameMarkets||[];
      if(gameMarketsArr.length>0){
        const gmEvents=rawEvents;
        for(let gi=0;gi<gmEvents.length;gi++){
          const gev=gmEvents[gi];
          S.scanStatus='Scanning '+sport.name+' game markets: '+(gev.home_team||'TBD')+' vs '+(gev.away_team||'TBD')+'...';
          S.scanProgress=((si+(gi+.5)/Math.max(gmEvents.length,1))/totalSteps)*100;render();

          // Compute model probability for this matchup
          const modelResult=computeModelEdge(gev.home_team,gev.away_team,sportKey,null);

          try{
            const chunks=[];
            for(let ci=0;ci<gameMarketsArr.length;ci+=10)chunks.push(gameMarketsArr.slice(ci,ci+10));

            for(let ch=0;ch<chunks.length;ch++){
              const gmUrl='https://api.the-odds-api.com/v4/sports/'+sportKey+'/events/'+gev.id+'/odds?apiKey='+S.apiKey+'&regions=us&markets='+chunks[ch].join(',')+'&oddsFormat=american';
              const gmRes=await fetch(gmUrl);
              if(!gmRes.ok)continue;
              const gmData=await gmRes.json();
              if(!gmData.bookmakers||!gmData.bookmakers.length)continue;

              const bookmakers=dedupBookmakers(gmData.bookmakers);
              const mktLines={};
              bookmakers.forEach(bk=>{
                (bk.markets||[]).forEach(mkt=>{
                  if(!mktLines[mkt.key])mktLines[mkt.key]={};
                  (mkt.outcomes||[]).forEach(o=>{
                    let oKey=o.name;if(o.point!=null)oKey+='_'+o.point;
                    if(!mktLines[mkt.key][oKey])mktLines[mkt.key][oKey]={name:o.name,point:o.point,books:[]};
                    mktLines[mkt.key][oKey].books.push({book:bk.title,price:o.price});
                  });
                });
              });

              Object.keys(mktLines).forEach(mktKey=>{
                const outcomes=mktLines[mktKey],oKeys=Object.keys(outcomes);
                if(oKeys.length<2)return;
                const avgImplied={};
                oKeys.forEach(ok=>{const probs=outcomes[ok].books.map(b=>americanToProb(b.price));avgImplied[ok]=probs.reduce((a,b)=>a+b,0)/probs.length});
                const totalImp=Object.values(avgImplied).reduce((a,b)=>a+b,0);
                if(totalImp<=0)return;
                const fairProbs={};
                oKeys.forEach(ok=>{fairProbs[ok]=avgImplied[ok]/totalImp});

                oKeys.forEach(ok=>{
                  const oc=outcomes[ok];if(oc.books.length<3)return;// need 3+ books for reliable consensus
                  const bestBook=oc.books.reduce((best,b)=>americanToProb(b.price)<americanToProb(best.price)?b:best,oc.books[0]);
                  const bestBookProb=americanToProb(bestBook.price);
                  const fair=fairProbs[ok];
                  if(!fair||!bestBookProb)return;

                  // Determine edge source
                  let crossBookEdge=fair>bestBookProb?calcEv(fair,bestBookProb):0;
                  let modelEdge=0;
                  let useModelProb=null;

                  // ── MODEL: MONEYLINE ──
                  // Only standard moneylines (not 3-way, not partial game)
                  if(modelResult&&mktKey==='h2h'&&oc.point==null){
                    if(oc.name===gev.home_team){
                      useModelProb=modelResult.homeProb;
                    } else if(oc.name===gev.away_team){
                      useModelProb=modelResult.awayProb;
                    }
                  }

                  // ── MODEL: STANDARD SPREADS ONLY ──
                  // Alt spreads excluded — our model isn't precise enough to outprice books there
                  if(modelResult&&modelResult.predictedMargin!=null&&modelResult.spreadStd&&
                     mktKey==='spreads'&&oc.point!=null){
                    let teamMargin=null;
                    if(oc.name===gev.home_team) teamMargin=modelResult.predictedMargin;
                    else if(oc.name===gev.away_team) teamMargin=-modelResult.predictedMargin;
                    if(teamMargin!=null){
                      // P(cover) = P(actual_margin + spread > 0) = normalCdf((predicted + spread) / std)
                      const coverProb=normalCdf((teamMargin+oc.point)/modelResult.spreadStd);
                      useModelProb=coverProb;
                    }
                  }

                  // ── MODEL: STANDARD TOTALS ONLY ──
                  // Alt totals excluded for same reason
                  if(modelResult&&modelResult.predictedTotal!=null&&modelResult.totalStd&&
                     mktKey==='totals'&&oc.point!=null&&(oc.name==='Over'||oc.name==='Under')){
                    const totalDiff=modelResult.predictedTotal-oc.point;
                    const overProb=normalCdf(totalDiff/modelResult.totalStd);
                    useModelProb=oc.name==='Over'?overProb:(1-overProb);
                  }

                  // ── CONFIDENCE CAP ──
                  // Our model is simple ratings — cap how far it can deviate from cross-book consensus
                  // Max 15 percentage points above cross-book fair probability
                  if(useModelProb!=null){
                    const maxModelProb=Math.min(useModelProb, fair+0.15);
                    useModelProb=Math.max(useModelProb, 0.02);// floor at 2%
                    useModelProb=Math.min(useModelProb, 0.98);// ceiling at 98%
                    // Only count as model edge if capped probability still beats the book
                    if(maxModelProb>bestBookProb){
                      modelEdge=calcEv(maxModelProb,bestBookProb);
                      useModelProb=maxModelProb;
                    } else {
                      modelEdge=0;
                      useModelProb=null;
                    }
                  }

                  // Determine best fair probability and edge source
                  let finalFair=fair,source='cross-book',finalEv=crossBookEdge;
                  if(modelEdge>0&&crossBookEdge>0){
                    finalFair=Math.max(fair,useModelProb||0);
                    finalEv=Math.max(crossBookEdge,modelEdge);
                    source='both';
                  } else if(modelEdge>0){
                    finalFair=useModelProb;finalEv=modelEdge;source='model';
                  }

                  if(finalEv<.01)return;
                  if(finalFair<.05)return;// skip extreme longshots (under 5% fair prob)
                  const grade=getGrade(finalEv),k=kellyF(finalFair,bestBookProb,S.kellyMult);
                  let direction=oc.name,line=oc.point!=null?oc.point:'';
                  let displayName=(gev.home_team||'TBD')+' vs '+(gev.away_team||'TBD');
                  if(oc.name==='Over'||oc.name==='Under')direction=oc.name.toUpperCase();
                  if(oc.name===gev.home_team||oc.name===gev.away_team){
                    displayName=oc.name;
                    if(oc.point!=null){direction=oc.point>0?'+'+oc.point:String(oc.point);line=''}// show spread in direction only, clear line to prevent duplication
                    else direction='ML';
                  }
                  if(oc.name==='Yes'||oc.name==='No')direction=oc.name.toUpperCase();
                  if(oc.name==='Draw'){displayName=(gev.home_team||'TBD')+' vs '+(gev.away_team||'TBD');direction='DRAW'}

                  const edgeObj={player:displayName,sport:sport.name,sportEmoji:sport.e,sportColor:sport.c,stat:formatMarket(mktKey),line:line,direction:direction,fairProb:finalFair,bookProb:bestBookProb,bestBook:bestBook.book,bestPrice:bestBook.price,ev:finalEv,grade,kelly:k*100,wager:Math.round(S.bankroll*k*100)/100,allBooks:dedupBooks(oc.books.map(b=>({name:b.book,price:b.price}))),event:(gev.home_team||'TBD')+' vs '+(gev.away_team||'TBD'),time:new Date(gev.commence_time).toLocaleString(),source};

                  // Add model details if available
                  if(modelResult&&(source==='model'||source==='both')){
                    edgeObj.modelProb=useModelProb;
                    edgeObj.modelEmDiff=modelResult.emDiff;
                    edgeObj.homeRating=modelResult.homeRating;
                    edgeObj.awayRating=modelResult.awayRating;
                    edgeObj.predictedMargin=modelResult.predictedMargin;
                    edgeObj.predictedTotal=modelResult.predictedTotal;
                  }
                  allEdges.push(edgeObj);
                });
              });
            }
          }catch(e){console.log('Game market error:',e)}
          await new Promise(r=>setTimeout(r,300));
        }
      }
    }catch(e){console.log('Sport error:',e)}
  }

  allEdges.sort((a,b)=>b.ev-a.ev);
  S.edges=allEdges;S.scanning=false;S.scanProgress=100;
  const modelCount=allEdges.filter(e=>e.source==='model'||e.source==='both').length;
  S.scanStatus='Found '+allEdges.length+' edges ('+modelCount+' model-powered) across all sports';
  save();render();
}

          h+='<div style="font-size:13px;color:var(--text);margin-bottom:8px">'+edge.direction+' '+edge.line+' '+edge.stat+' @ <span style="color:var(--g);font-weight:600">'+edge.bestBook+'</span> <span style="font-family:var(--mono);color:var(--muted)">('+(edge.bestPrice>0?'+':'')+edge.bestPrice+')</span></div>';

          h+='<div class="mets">';
          [{l:'FAIR',v:(edge.fairProb*100).toFixed(1)+'%',c:pc},{l:'BOOK',v:(edge.bookProb*100).toFixed(1)+'%',c:'var(--muted)'},{l:'EV',v:evStr,c:edge.grade.c},{l:'KELLY',v:edge.kelly.toFixed(1)+'%',c:'var(--gold)'},{l:'WAGER',v:'$'+edge.wager.toFixed(0),c:'var(--gold)'}].forEach(m=>{
            h+='<div class="met"><div class="met-l">'+m.l+'</div><div class="met-v" style="color:'+m.c+'">'+m.v+'</div></div>';
          });
          h+='</div>';

          // Expanded details
          if(S.expandedIdx===i){
            h+='<div style="padding-top:8px;border-top:1px solid var(--border)" onclick="event.stopPropagation()">';
            // Model info
            if(edge.modelProb!=null){
              h+='<div style="background:rgba(251,191,36,.04);border:1px solid rgba(251,191,36,.1);border-radius:8px;padding:10px 12px;margin-bottom:8px">';
              h+='<div style="font-size:10px;letter-spacing:1.5px;color:var(--gold);font-family:var(--mono);font-weight:700;margin-bottom:4px">🧠 MODEL ANALYSIS</div>';
              h+='<div style="font-size:12px;color:var(--text);line-height:1.6">Model probability: <strong style="color:var(--gold)">'+(edge.modelProb*100).toFixed(1)+'%</strong> vs book '+(edge.bookProb*100).toFixed(1)+'%</div>';
              if(edge.homeRating!=null){
                const teams=edge.event.split(' vs ');
                h+='<div style="font-size:11px;color:var(--muted)">Ratings: '+(teams[0]||'')+' ('+edge.homeRating.toFixed(1)+') vs '+(teams[1]||'')+' ('+edge.awayRating.toFixed(1)+')</div>';
              }
              if(edge.predictedMargin!=null)h+='<div style="font-size:11px;color:var(--muted)">Predicted margin: <span style="color:var(--cyan)">'+(edge.predictedMargin>0?'Home by '+edge.predictedMargin.toFixed(1):'Away by '+Math.abs(edge.predictedMargin).toFixed(1))+'</span></div>';
              if(edge.predictedTotal!=null)h+='<div style="font-size:11px;color:var(--muted)">Predicted total: <span style="color:var(--cyan)">'+edge.predictedTotal.toFixed(1)+'</span></div>';
              h+='</div>';
            }
            h+='<div style="font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;font-family:var(--mono);font-weight:600">ODDS BY BOOK</div>';
            h+='<div class="books">';
            edge.allBooks.forEach(b=>{h+='<span class="book'+(b.name===edge.bestBook?' best':'')+'">'+b.name+': '+(b.price>0?'+':'')+b.price+'</span>'});
            h+='</div>';
            h+='<div style="font-size:11px;color:var(--dim);margin-top:8px;line-height:1.5;font-family:var(--mono)">Edge: '+(edge.fairProb*100).toFixed(1)+'% fair vs '+(edge.bookProb*100).toFixed(1)+'% book = '+((edge.fairProb-edge.bookProb)*100).toFixed(1)+'% mispricing</div>';
            h+='<div style="font-size:12px;color:var(--muted);margin-top:4px">'+edge.time+'</div>';
            h+='<button class="sm-btn" style="width:100%;margin-top:10px;color:var(--g);border-color:rgba(0,255,170,.15)" onclick="event.stopPropagation();logPlay('+i+')">📋 LOG THIS PLAY</button>';
            h+='</div>';
          }
          h+='</div>';
        });

        // Recommended slip
        if(rec.length){
          h+='<div class="slip"><div class="slip-t">RECOMMENDED ('+rec.length+' edges, '+S.minGrade+'+)</div>';
          rec.slice(0,8).forEach(e=>{
            h+='<div class="slip-r"><span style="color:var(--text);font-size:13px">'+e.player+' <span style="color:var(--dim)">'+e.direction+' '+e.line+' '+e.stat+'</span></span><span style="font-weight:700;color:'+e.grade.c+';font-family:var(--mono);font-size:12px">'+e.grade.l+' +'+e.ev.toFixed(2)+'</span></div>';
          });
          h+='<div style="display:flex;justify-content:space-between;margin-top:8px;padding-top:6px;border-top:1px solid rgba(0,255,170,.06)"><span style="font-size:12px;color:var(--muted)">Total wager</span><span style="font-size:16px;font-weight:800;color:var(--gold);font-family:var(--mono)">$'+recW.toFixed(2)+'</span></div></div>';
        }
      } else if(!S.scanning&&S.scanProgress===0){
        h+='<div class="empty"><div style="font-size:28px;opacity:.3">🔍</div><div style="margin-top:8px">Hit the scan button to find edges across all sports</div></div>';
      }
    }
  }

  // ═══ SLIP TAB ═══
  if(S.tab==='slip'){
    const cl=curLegs(),ss=getSlipStats();
    // Slip tabs
    h+='<div style="display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;align-items:center">';
    S.slips.forEach((sl,si)=>{
      const isA=si===S.activeSlip,cnt=sl.legs.length;
      h+='<button style="padding:7px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.5px;font-family:var(--mono);border:1px solid '+(isA?'rgba(251,146,60,.2)':'var(--border)')+';background:'+(isA?'rgba(251,146,60,.06)':'transparent')+';color:'+(isA?'var(--slip)':'var(--muted)')+'" onclick="switchSlip('+si+')">'+sl.name+(cnt?' ('+cnt+')':'')+'</button>';
    });
    h+='<button style="padding:7px 10px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;border:1px dashed var(--border);background:transparent;color:var(--dim);line-height:1" onclick="addNewSlip()">+</button></div>';

    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
    h+='<div style="font-size:18px;font-weight:700;color:var(--slip);font-family:var(--mono);cursor:pointer" onclick="renameSlip('+S.activeSlip+')">🎫 '+curSlip().name+'</div>';
    if(S.slips.length>1)h+='<button class="sm-btn" style="color:var(--r);border-color:rgba(244,63,94,.1);font-size:10px" onclick="if(confirm(\'Delete?\'))deleteSlip('+S.activeSlip+')">DELETE</button>';
    h+='</div>';

    if(!cl.length){
      h+='<div class="empty"><div style="font-size:32px;opacity:.2">🎫</div><div style="margin-top:8px">Tap <span style="color:var(--slip);font-weight:700">+</span> on edges in SCAN to build a slip</div></div>';
    } else {
      h+='<div class="cslip"><div class="cslip-t">'+curSlip().name.toUpperCase()+' — '+cl.length+'/10 LEGS</div>';
      cl.forEach((s,i)=>{
        const isE=S.editingSlipLeg===i;
        h+='<div class="cslip-r" style="flex-wrap:wrap"><div style="flex:1"><div style="font-size:13px;font-weight:700;color:#fff">'+s.sportEmoji+' '+s.player+'</div>';
        if(isE){
          h+='<div style="display:flex;gap:5px;margin-top:5px;align-items:center">';
          h+='<span style="font-size:10px;color:var(--muted)">'+s.direction+'</span>';
          h+='<input id="editLine'+i+'" type="text" value="'+s.line+'" style="width:55px;background:rgba(255,255,255,.05);border:1px solid rgba(251,146,60,.15);border-radius:4px;padding:3px 5px;color:#fff;font-size:12px;font-family:var(--mono);text-align:center">';
          h+='<span style="font-size:10px;color:var(--muted)">'+s.stat+' @</span>';
          h+='<input id="editOdds'+i+'" type="text" value="'+(s.bestPrice>0?'+':'')+s.bestPrice+'" style="width:60px;background:rgba(255,255,255,.05);border:1px solid rgba(251,146,60,.15);border-radius:4px;padding:3px 5px;color:#fff;font-size:12px;font-family:var(--mono);text-align:center">';
          h+='<button class="sm-btn" style="padding:3px 8px;color:var(--g)" onclick="saveSlipEdit('+i+')">✓</button>';
          h+='<button class="sm-btn" style="padding:3px 6px;color:var(--dim)" onclick="S.editingSlipLeg=null;render()">✕</button></div>';
        } else {
          h+='<div style="font-size:11px;color:var(--muted)">'+s.direction+' '+s.line+' '+s.stat+' @ '+s.bestBook+' ('+(s.bestPrice>0?'+':'')+s.bestPrice+')</div>';
        }
        h+='</div><div style="display:flex;align-items:center;gap:5px">';
        h+='<span style="font-weight:700;color:'+s.grade.c+';font-family:var(--mono);font-size:11px">'+s.grade.l+'</span>';
        if(!isE)h+='<span style="font-size:10px;padding:2px 5px;border-radius:3px;cursor:pointer;border:1px solid rgba(251,146,60,.1);color:var(--slip);background:rgba(251,146,60,.03)" onclick="S.editingSlipLeg='+i+';render()">✏️</span>';
        h+='<span class="cslip-rm" onclick="removeSlipByIndex('+i+')">✕</span></div></div>';
      });

      // Parlay stats
      const pg=getGrade(ss.totalEv);
      h+='<div class="cslip-stats">';
      [{l:'PARLAY PROB',v:(ss.parlayProb*100).toFixed(2)+'%',c:ss.parlayProb>.1?'var(--g)':ss.parlayProb>.03?'var(--gold)':'var(--r)'},{l:'TOTAL EV',v:(ss.totalEv>=0?'+':'')+ss.totalEv.toFixed(3),c:pg.c},{l:'ODDS',v:(ss.parlayOdds>0?'+':'')+ss.parlayOdds,c:'var(--cyan)'},{l:'KELLY',v:'$'+ss.kellyWager.toFixed(2),c:'var(--gold)'}].forEach(m=>{
        h+='<div class="cslip-stat"><div class="cslip-stat-l">'+m.l+'</div><div class="cslip-stat-v" style="color:'+m.c+'">'+m.v+'</div></div>';
      });
      h+='</div>';
      h+='<div style="display:flex;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid rgba(251,146,60,.06)"><span style="font-size:13px;color:var(--muted)">Potential payout</span><span style="font-size:20px;font-weight:800;color:var(--g);font-family:var(--mono)">$'+ss.payout.toFixed(2)+'</span></div></div>';

      // EV assessment
      h+='<div style="background:rgba('+(ss.totalEv>=0?'0,255,170':'244,63,94')+',.03);border:1px solid rgba('+(ss.totalEv>=0?'0,255,170':'244,63,94')+',.1);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px">';
      h+='<div style="font-size:12px;font-weight:700;color:'+(ss.totalEv>=0?'var(--g)':'var(--r)')+';letter-spacing:1px;font-family:var(--mono)">'+(ss.totalEv>=0?'✅ +EV PARLAY':'⚠️ -EV PARLAY')+'</div>';
      h+='<div style="font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5">'+(ss.totalEv>=0?'Fair prob '+((ss.parlayProb*100).toFixed(2))+'% beats book implied '+((ss.parlayBookProb*100).toFixed(2))+'%. Kelly: $'+ss.kellyWager.toFixed(2):'Negative EV overall. Remove weaker legs or bet individually.')+'</div></div>';

      h+='<button class="sm-btn" style="width:100%;padding:12px;color:var(--g);border-color:rgba(0,255,170,.12);margin-bottom:8px;font-size:12px" onclick="logParlay()">📋 LOG PARLAY</button>';
      h+='<button class="sm-btn" style="width:100%;padding:10px;color:var(--r);border-color:rgba(244,63,94,.08);font-size:10px" onclick="if(confirm(\'Clear legs?\'))clearSlip()">CLEAR LEGS</button>';
    }
  }

  // ═══ TRACK TAB ═══
  if(S.tab==='track'){
    const pending=S.results.filter(r=>r.status==='pending'),resolved=S.results.filter(r=>r.status!=='pending');
    const wins=resolved.filter(r=>r.hit),totalWagered=resolved.reduce((s,r)=>s+r.wager,0);
    const totalPayout=resolved.reduce((s,r)=>s+r.payout,0),roi=totalWagered?((totalPayout-totalWagered)/totalWagered*100):0;

    h+='<div style="font-size:18px;font-weight:700;margin-bottom:14px;font-family:var(--mono)">📋 Play Tracker</div>';

    if(S.results.length){
      h+='<div class="row r4">';
      [{l:'RECORD',v:wins.length+'-'+(resolved.length-wins.length),c:'#fff'},{l:'WIN RATE',v:resolved.length?(wins.length/resolved.length*100).toFixed(0)+'%':'—',c:'var(--g)'},{l:'NET P/L',v:(totalPayout-totalWagered>=0?'+$':'−$')+Math.abs(totalPayout-totalWagered).toFixed(2),c:totalPayout>=totalWagered?'var(--g)':'var(--r)'},{l:'ROI',v:(roi>=0?'+':'')+roi.toFixed(1)+'%',c:roi>=0?'var(--g)':'var(--r)'}].forEach(s=>{
        h+='<div class="box"><div class="vl">'+s.l+'</div><div class="val" style="color:'+s.c+';font-size:16px">'+s.v+'</div></div>';
      });
      h+='</div>';
    }

    // Resolving parlay
    if(S.resolvingParlay){
      const r=S.results.find(r=>r.id===S.resolvingParlay);
      if(r&&r.legs){
        h+='<div class="cslip"><div class="cslip-t">RESOLVE: '+r.player+'</div>';
        r.legs.forEach((l,li)=>{
          const status=l.hit===true?'✅':l.hit===false?'❌':'⬜';
          h+='<div class="cslip-r"><span>'+status+' '+l.sportEmoji+' '+l.player+' '+l.dir+' '+l.line+' '+l.stat+'</span>';
          if(l.hit===null)h+='<span><button class="sm-btn" style="padding:3px 8px;color:var(--g);font-size:10px;margin-right:4px" onclick="resolveLeg(\''+r.id+'\','+li+',true)">HIT</button><button class="sm-btn" style="padding:3px 8px;color:var(--r);font-size:10px" onclick="resolveLeg(\''+r.id+'\','+li+',false)">MISS</button></span>';
          h+='</div>';
        });
        h+='<div style="display:flex;gap:6px;margin-top:10px">';
        h+='<button class="sm-btn" style="flex:1;padding:10px;color:var(--g)" onclick="submitParlay(\''+r.id+'\')">SUBMIT</button>';
        h+='<button class="sm-btn" style="padding:10px;color:var(--r)" onclick="quickLossParlay(\''+r.id+'\')">ALL LOST</button>';
        h+='<button class="sm-btn" style="padding:10px;color:var(--dim)" onclick="cancelResolve()">CANCEL</button>';
        h+='</div></div>';
      }
    }

    // Pending plays
    if(pending.length){
      h+='<div style="font-size:12px;letter-spacing:2px;color:var(--gold);margin-bottom:8px;font-family:var(--mono);font-weight:700">PENDING ('+pending.length+')</div>';
      pending.forEach(r=>{
        h+='<div class="box" style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:start"><div><div style="font-size:14px;font-weight:700">'+r.sportEmoji+' '+r.player+'</div><div style="font-size:11px;color:var(--muted)">'+r.dir+' '+r.line+' '+r.stat+' @ '+r.book+' • $'+r.wager.toFixed(2)+'</div>';
        if(r.source)h+='<span class="edge-source '+(r.source==='model'?'src-model':r.source==='both'?'src-both':'src-cross')+'" style="margin-top:4px">'+(r.source==='model'?'🧠 MODEL':r.source==='both'?'⚡ BOTH':'📊')+'</span>';
        h+='</div><div style="text-align:right"><div style="font-size:11px;color:var(--muted)">'+r.date+'</div>';
        h+='<div style="display:flex;gap:4px;margin-top:6px"><button class="sm-btn" style="padding:4px 10px;color:var(--g);font-size:10px" onclick="resolvePlay(\''+r.id+'\',true)">WON</button><button class="sm-btn" style="padding:4px 10px;color:var(--r);font-size:10px" onclick="resolvePlay(\''+r.id+'\',false)">LOST</button></div>';
        h+='</div></div></div>';
      });
    }

    // Resolved plays
    if(resolved.length){
      h+='<div style="font-size:12px;letter-spacing:2px;color:var(--muted);margin:12px 0 8px;font-family:var(--mono);font-weight:700">RESOLVED ('+resolved.length+')</div>';
      resolved.slice(0,20).forEach(r=>{
        const icon=r.hit?'✅':'❌';
        h+='<div class="box" style="margin-bottom:6px;opacity:.8"><div style="display:flex;justify-content:space-between;align-items:center"><div><span style="margin-right:6px">'+icon+'</span><span style="font-size:13px;font-weight:600">'+r.player+'</span> <span style="font-size:11px;color:var(--dim)">'+r.dir+' '+r.line+'</span></div>';
        h+='<div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;font-family:var(--mono);color:'+(r.hit?'var(--g)':'var(--r)')+'">'+( r.hit?'+$'+r.payout.toFixed(2):'-$'+r.wager.toFixed(2))+'</span>';
        h+='<span style="font-size:10px;color:var(--dim);cursor:pointer" onclick="unresolvePlay(\''+r.id+'\')" title="Undo">↩</span>';
        h+='<span style="font-size:10px;color:var(--dim);cursor:pointer" onclick="if(confirm(\'Delete?\'))deletePlay(\''+r.id+'\')" title="Delete">🗑</span>';
        h+='</div></div></div>';
      });
    }

    if(!S.results.length)h+='<div class="empty"><div style="font-size:28px;opacity:.2">📋</div><div style="margin-top:8px">No plays logged yet. Expand an edge and tap "Log This Play"</div></div>';
  }

  // ═══ SETTINGS TAB ═══
  if(S.tab==='set'){
    h+='<div style="font-size:18px;font-weight:700;margin-bottom:14px;font-family:var(--mono)">⚙️ Settings</div>';

    // API Key
    h+='<div class="setup"><div class="setup-t">🔑 The Odds API Key</div>';
    h+='<input class="inp" type="password" id="apiKeyInput" placeholder="Paste your API key here" value="'+S.apiKey+'">';
    h+='<button class="sm-btn" style="width:100%;margin-top:8px;color:var(--g);border-color:rgba(0,255,170,.12)" onclick="S.apiKey=document.getElementById(\'apiKeyInput\').value.trim();save();render()">SAVE KEY</button></div>';

    // Config
    h+='<div class="setup"><div class="setup-t">📊 Scanner Config</div>';
    h+='<div class="row r2"><div><label class="lbl">BANKROLL ($)</label><input class="inp" type="number" value="'+S.bankroll+'" onblur="S.bankroll=+this.value;save()"></div>';
    h+='<div><label class="lbl">KELLY FRACTION</label><input class="inp" type="number" step="0.05" min="0.05" max="0.5" value="'+S.kellyMult+'" onblur="S.kellyMult=+this.value;save()"></div></div>';
    h+='<div><label class="lbl">MINIMUM GRADE</label><div style="display:flex;gap:4px;margin-top:4px">';
    ['A+','A','B+','B','C'].forEach(g=>{h+='<button class="chip'+(S.minGrade===g?' on':'')+'" onclick="S.minGrade=\''+g+'\';save();render()">'+g+'</button>'});
    h+='</div></div></div>';

    // Team Ratings Manager
    h+='<div class="setup"><div class="setup-t">🧠 Team Ratings (Model Engine)</div>';
    h+='<div style="font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5">The model uses team efficiency ratings to generate independent win probabilities. Currently loaded:</div>';
    const ratingCounts=Object.entries(TEAM_RATINGS).filter(([k,v])=>Object.keys(v).length>0).map(([k,v])=>{const sp=SPORTS_MAP[k];return sp?sp.e+' '+sp.name+': '+Object.keys(v).length+' teams':null}).filter(Boolean);
    ratingCounts.forEach(rc=>{h+='<div style="font-size:12px;color:var(--text);padding:3px 0;font-family:var(--mono)">'+rc+'</div>'});

    h+='<div style="margin-top:10px"><label class="lbl">PASTE RATINGS (JSON)</label>';
    h+='<textarea id="ratingsInput" class="inp" style="height:80px;font-size:11px;resize:vertical" placeholder=\'{"basketball_nba":{"Team Name":5.5},...}\'></textarea>';
    h+='<button class="sm-btn" style="width:100%;margin-top:6px;color:var(--gold);border-color:rgba(251,191,36,.12)" onclick="try{const r=JSON.parse(document.getElementById(\'ratingsInput\').value);Object.keys(r).forEach(k=>{if(!TEAM_RATINGS[k])TEAM_RATINGS[k]={};Object.assign(TEAM_RATINGS[k],r[k])});saveCustomRatings();alert(\'Ratings updated!\');render()}catch(e){alert(\'Invalid JSON: \'+e.message)}">UPDATE RATINGS</button></div></div>';

    // Data management
    h+='<div class="setup"><div class="setup-t">🗃️ Data</div>';
    h+='<button class="sm-btn" style="width:100%;margin-bottom:6px;color:var(--r);border-color:rgba(244,63,94,.08)" onclick="if(confirm(\'Clear all scan results?\')){S.edges=[];save();render()}">CLEAR SCAN RESULTS</button>';
    h+='<button class="sm-btn" style="width:100%;margin-bottom:6px;color:var(--r);border-color:rgba(244,63,94,.08)" onclick="if(confirm(\'Clear tracking history?\')){S.results=[];save();render()}">CLEAR TRACKING</button>';
    h+='<button class="sm-btn" style="width:100%;color:var(--r);border-color:rgba(244,63,94,.08)" onclick="if(confirm(\'Reset everything?\')){localStorage.removeItem(\'evpro4\');localStorage.removeItem(\'evpro4_ratings\');location.reload()}">FULL RESET</button></div>';

    h+='<div class="footer">+EV Scanner v4 • Model-Powered • Built for Jena</div>';
  }

  app.innerHTML=h;
}

// ═══ INIT ═══
load();render();
</script>
</body>
</html>
