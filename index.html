*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060810;--card:rgba(255,255,255,0.025);--border:rgba(255,255,255,0.07);--g:#00ffaa;--y:#ffd600;--r:#ff1744;--text:#e8eaf0;--muted:#8890a0;--dim:#607080;--mono:'DM Mono',monospace;--body:'Space Grotesk',sans-serif;--slip:#ff9100;--slipBg:rgba(255,145,0,.06);--slipBorder:rgba(255,145,0,.15)}
html,body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:16px;min-height:100vh;overflow-x:hidden}
input,select,button{font-family:var(--mono);outline:none}
::placeholder{color:#556}
.app{max-width:780px;margin:0 auto;padding:16px 14px;position:relative;z-index:1}
.grid-bg{position:fixed;inset:0;opacity:.02;background-image:repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(0,255,170,.3) 59px,rgba(0,255,170,.3) 60px),repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(0,255,170,.3) 59px,rgba(0,255,170,.3) 60px);pointer-events:none}
.hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;margin-bottom:16px;border-bottom:1px solid rgba(0,255,170,.08)}
.logo{font-size:24px;font-weight:700;background:linear-gradient(135deg,#00ffaa,#76ff03);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tabs{display:flex;gap:3px}
.tab{padding:9px 14px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:1.5px;cursor:pointer;border:1px solid var(--border);background:transparent;color:#8890a0}
.tab.on{background:rgba(0,255,170,.1);border-color:rgba(0,255,170,.25);color:var(--g)}
.row{display:grid;gap:8px;margin-bottom:14px}
.r2{grid-template-columns:1fr 1fr}.r3{grid-template-columns:1fr 1fr 1fr}.r4{grid-template-columns:repeat(4,1fr)}
.box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.lbl{display:block;font-size:11px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;font-family:var(--mono)}
.val{font-size:20px;font-weight:800;font-family:var(--mono);text-align:center}
.vl{font-size:10px;letter-spacing:2px;color:var(--muted);text-align:center;margin-bottom:3px;font-family:var(--mono)}
.inp{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;padding:11px 13px;color:#fff;font-size:15px}
.chip{font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;font-weight:700;letter-spacing:.5px;border:1px solid var(--border);background:transparent;color:#8890a0}

.btn-g{width:100%;padding:16px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;letter-spacing:1px;background:linear-gradient(135deg,rgba(0,255,170,.12),rgba(118,255,3,.06));border:1px solid rgba(0,255,170,.2);color:var(--g)}
.btn-g:hover{filter:brightness(1.1)}
.btn-scan{width:100%;padding:18px;border-radius:12px;font-weight:700;font-size:16px;cursor:pointer;letter-spacing:2px;background:linear-gradient(135deg,rgba(0,255,170,.15),rgba(255,214,0,.08));border:1px solid rgba(0,255,170,.25);color:var(--g);position:relative;overflow:hidden}
.btn-scan:disabled{opacity:.5;cursor:wait}
.btn-scan .pulse{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,255,170,.1),transparent);animation:scan 1.5s infinite}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.edge-card{border-radius:12px;padding:16px 18px;margin-bottom:10px;position:relative}
.grade{position:absolute;top:12px;right:14px;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;font-family:var(--mono)}
.mets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}

.cslip-stat{text-align:center}
.cslip-stat-l{font-size:9px;letter-spacing:1px;color:var(--muted);font-family:var(--mono)}
.cslip-stat-v{font-size:16px;font-weight:800;font-family:var(--mono)}

// ═══ QUANT ENGINE ═══
function normalCdf(z){const t=1/(1+.2316419*Math.abs(z)),d=.3989422804*Math.exp(-z*z/2);const p=d*t*(.3193815+t*(-.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));return z>=0?1-p:p}
function calcBase(line,avg){return normalCdf((avg-line)/Math.max(avg*.2,2))}
function calcEv(tp,mp){return(tp-mp)*(1/mp)}
function kellyF(tp,mp,fr){const o=1/mp-1;if(o<=0)return 0;return Math.max(0,((tp*o-(1-tp))/o)*fr)}
function americanToProb(odds){return odds>0?100/(odds+100):Math.abs(odds)/(Math.abs(odds)+100)}
function probToAmerican(p){if(p<=0||p>=1)return 0;return p>=.5?Math.round(-100*p/(1-p)):Math.round(100*(1-p)/p)}
function getGrade(ev){if(ev>=.2)return{l:'A+',c:'#00ffaa',bg:'18,255,170'};if(ev>=.12)return{l:'A',c:'#00e676',bg:'0,230,118'};if(ev>=.08)return{l:'B+',c:'#76ff03',bg:'118,255,3'};if(ev>=.05)return{l:'B',c:'#c6ff00',bg:'198,255,0'};if(ev>=.02)return{l:'C',c:'#ffd600',bg:'255,214,0'};if(ev>=0)return{l:'D',c:'#ff9100',bg:'255,145,0'};return{l:'F',c:'#ff1744',bg:'255,23,68'}}

// ═══ CUSTOM SLIP LOGIC ═══
function isOnSlip(edge){return S.customSlip.some(s=>s.id===edgeId(edge))}
function edgeId(e){return e.player+'_'+e.stat+'_'+e.direction+'_'+e.line+'_'+e.bestBook}
function toggleSlip(idx){
  const edge=getFilteredSorted()[idx];
  if(!edge)return;
  const id=edgeId(edge);
  if(S.customSlip.some(s=>s.id===id)){
    S.customSlip=S.customSlip.filter(s=>s.id!==id);
  } else {
    if(S.customSlip.length>=10){alert('Max 10 legs per slip');return}
    S.customSlip.push({id,player:edge.player,sport:edge.sport,sportEmoji:edge.sportEmoji,stat:edge.stat,
      line:edge.line,direction:edge.direction,fairProb:edge.fairProb,bookProb:edge.bookProb,
      bestBook:edge.bestBook,bestPrice:edge.bestPrice,ev:edge.ev,grade:edge.grade,
      kelly:edge.kelly,wager:edge.wager,event:edge.event});
  }
  save();render();
}
function removeFromSlip(id){S.customSlip=S.customSlip.filter(s=>s.id!==id);save();render()}
function clearSlip(){S.customSlip=[];save();render()}
function getSlipStats(){
  if(!S.customSlip.length)return{parlayProb:0,totalEv:0,kellyWager:0,parlayOdds:0,payout:0};
  const parlayProb=S.customSlip.reduce((p,s)=>p*s.fairProb,1);
  const parlayBookProb=S.customSlip.reduce((p,s)=>p*s.bookProb,1);
  const totalEv=calcEv(parlayProb,parlayBookProb);
  const kellyPct=kellyF(parlayProb,parlayBookProb,S.kellyMult);
  const kellyWager=Math.round(S.bankroll*kellyPct*100)/100;
  const parlayOdds=probToAmerican(parlayBookProb);
  const payout=Math.round(kellyWager*(1/parlayBookProb)*100)/100;
  return{parlayProb,parlayBookProb,totalEv,kellyWager,parlayOdds,payout};
}

// ═══ PLAY TRACKING ═══
function logPlay(idx){
  const edge=getFilteredSorted()[idx];
  if(!edge)return;
  const id='p_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  S.results.push({
    id,type:'straight',player:edge.player,dir:edge.direction,line:edge.line,
    stat:edge.stat,book:edge.bestBook,price:edge.bestPrice,wager:edge.wager,
    ev:edge.ev,grade:edge.grade.l,sport:edge.sport,sportEmoji:edge.sportEmoji,
    event:edge.event,date:new Date().toLocaleDateString(),
    status:'pending',hit:null,payout:0
  });
  save();S.tab='track';render();
}
function logParlay(){
  if(!S.customSlip.length)return;
  const ss=getSlipStats();
  const id='par_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  const legs=S.customSlip.map(s=>({
    player:s.player,dir:s.direction,line:s.line,stat:s.stat,book:s.bestBook,
    sport:s.sport,sportEmoji:s.sportEmoji,grade:s.grade.l
  }));
  S.results.push({
    id,type:'parlay',player:legs.length+'-Leg Parlay',legs,
    dir:legs.map(l=>l.player.split(' ')[0]).join(' / '),line:'',
    stat:'',book:'Multi',price:ss.parlayOdds,wager:ss.kellyWager,
    ev:ss.totalEv,grade:getGrade(ss.totalEv).l,sport:'MIX',sportEmoji:'🎫',
    event:legs.length+' legs',date:new Date().toLocaleDateString(),
    status:'pending',hit:null,payout:0
  });
  save();S.tab='track';render();
}
function resolvePlay(id,hit){
  const r=S.results.find(r=>r.id===id);
  if(!r)return;
  if(hit){
    r.status='won';r.hit=true;
    const payInput=prompt('Enter your payout amount (what you received back, including your wager):','0');
    r.payout=parseFloat(payInput)||0;
  } else {
    r.status='lost';r.hit=false;r.payout=0;
  }
  save();render();
}
function unresolvePlay(id){
  const r=S.results.find(r=>r.id===id);
  if(!r)return;
  r.status='pending';r.hit=null;r.payout=0;
  save();render();
}
function deletePlay(id){
  S.results=S.results.filter(r=>r.id!==id);
  save();render();
}

// ═══ AUTO-SCANNER (SAME FETCH PATTERN AS V2) ═══
async function runFullScan(){
  if(!S.apiKey){alert('Enter your Odds API key in Settings first');return}
  S.scanning=true;S.edges=[];S.scanProgress=0;S.scanStatus='Starting scan...';render();

  const sportKeys=Object.keys(SPORTS_MAP);
  const totalSteps=sportKeys.length;
  let allEdges=[];

  for(let si=0;si<sportKeys.length;si++){
    const sportKey=sportKeys[si];
    const sport=SPORTS_MAP[sportKey];
    S.scanStatus='Scanning '+sport.name+' events...';
    S.scanProgress=((si)/totalSteps)*100;render();

    try{
      // Step 1: Get events for this sport
      const eventsUrl='https://api.the-odds-api.com/v4/sports/'+sportKey+'/events?apiKey='+S.apiKey;
      const eventsRes=await fetch(eventsUrl);
      if(!eventsRes.ok)continue;
      const rawEvents=await eventsRes.json();
      // Filter to upcoming only — skip games that already started
      const now=new Date().getTime();
      const events=rawEvents.filter(e=>new Date(e.commence_time).getTime()>now);
      if(!events.length)continue;

      // Step 2: For sports with props, scan each event
      if(sport.props.length>0){
        const eventsToScan=events;// Paid plan — scan all upcoming
        for(let ei=0;ei<eventsToScan.length;ei++){
          const event=eventsToScan[ei];
          S.scanStatus='Scanning '+sport.name+': '+event.home_team+' vs '+event.away_team+'...';
          S.scanProgress=((si+ei/eventsToScan.length)/totalSteps)*100;render();

          try{
            const propsUrl='https://api.the-odds-api.com/v4/sports/'+sportKey+'/events/'+event.id+'/odds?apiKey='+S.apiKey+'&regions=us&markets='+sport.props.join(',')+'&oddsFormat=american';
            const propsRes=await fetch(propsUrl);
            if(!propsRes.ok)continue;
            const propsData=await propsRes.json();

            // Step 3: Process each bookmaker's props
            if(propsData.bookmakers){
              const playerLines={};

              propsData.bookmakers.forEach(bk=>{
                (bk.markets||[]).forEach(mkt=>{
                  const outcomes=mkt.outcomes||[];
                  const byPlayer={};
                  outcomes.forEach(o=>{
                    const key=(o.description||'Unknown')+'_'+mkt.key;
                    if(!byPlayer[key])byPlayer[key]={player:o.description||'Unknown',market:mkt.key,overs:[],unders:[]};
                    if(o.name==='Over')byPlayer[key].overs.push({book:bk.title,price:o.price,point:o.point});
                    if(o.name==='Under')byPlayer[key].unders.push({book:bk.title,price:o.price,point:o.point});
                    // Handle Yes/No markets (anytime TD, anytime goal, etc.)
                    if(o.name==='Yes')byPlayer[key].overs.push({book:bk.title,price:o.price,point:null});
                    if(o.name==='No')byPlayer[key].unders.push({book:bk.title,price:o.price,point:null});
                  });

                  Object.values(byPlayer).forEach(pl=>{
                    const key=pl.player+'_'+pl.market;
                    if(!playerLines[key])playerLines[key]={player:pl.player,market:pl.market,books:[],event:event};
                    pl.overs.forEach((ov,i)=>{
                      playerLines[key].books.push({book:ov.book,overPrice:ov.price,underPrice:pl.unders[i]?pl.unders[i].price:null,point:ov.point});
                    });
                  });
                });
              });

              // Step 4: Analyze each player line for edges
              Object.values(playerLines).forEach(pl=>{
                if(!pl.books.length)return;

                const points=pl.books.map(b=>b.point).filter(p=>p!=null);
                const consensusPoint=points.length?points[0]:'Yes';
                const overPrices=pl.books.map(b=>b.overPrice).filter(p=>p!=null);
                const underPrices=pl.books.map(b=>b.underPrice).filter(p=>p!=null);
                if(!overPrices.length)return;

                const overProbs=overPrices.map(p=>americanToProb(p));
                const underProbs=underPrices.map(p=>americanToProb(p));

                const avgOverImp=overProbs.reduce((a,b)=>a+b,0)/overProbs.length;
                const avgUnderImp=underProbs.length?underProbs.reduce((a,b)=>a+b,0)/underProbs.length:(1-avgOverImp);
                const total=avgOverImp+avgUnderImp;
                const fairOver=avgOverImp/total;
                const fairUnder=avgUnderImp/total;

                // Find books with best price
                const bestOverBook=pl.books.reduce((best,b)=>b.overPrice!=null&&americanToProb(b.overPrice)<americanToProb(best.overPrice||999)?b:best,pl.books[0]);
                const bestOverProb=bestOverBook.overPrice?americanToProb(bestOverBook.overPrice):null;

                if(bestOverProb&&fairOver>bestOverProb){
                  const ev=calcEv(fairOver,bestOverProb);
                  const grade=getGrade(ev);
                  if(ev>=.02){
                    const k=kellyF(fairOver,bestOverProb,S.kellyMult);
                    allEdges.push({
                      player:pl.player,sport:sport.name,sportEmoji:sport.e,sportColor:sport.c,
                      stat:formatMarket(pl.market),line:consensusPoint,direction:'OVER',
                      fairProb:fairOver,bookProb:bestOverProb,bestBook:bestOverBook.book,bestPrice:bestOverBook.overPrice,
                      ev,grade,kelly:k*100,wager:Math.round(S.bankroll*k*100)/100,
                      allBooks:pl.books.map(b=>({name:b.book,price:b.overPrice})).filter(b=>b.price),
                      event:pl.event.home_team+' vs '+pl.event.away_team,
                      time:new Date(pl.event.commence_time).toLocaleString()
                    });
                  }
                }

                // Check UNDER edge
                if(underPrices.length){
                  const bestUnderBook=pl.books.reduce((best,b)=>b.underPrice!=null&&americanToProb(b.underPrice)<americanToProb(best.underPrice||999)?b:best,pl.books[0]);
                  const bestUnderProb=bestUnderBook.underPrice?americanToProb(bestUnderBook.underPrice):null;
                  if(bestUnderProb&&fairUnder>bestUnderProb){
                    const ev=calcEv(fairUnder,bestUnderProb);
                    const grade=getGrade(ev);
                    if(ev>=.02){
                      const k=kellyF(fairUnder,bestUnderProb,S.kellyMult);
                      allEdges.push({
                        player:pl.player,sport:sport.name,sportEmoji:sport.e,sportColor:sport.c,
                        stat:formatMarket(pl.market),line:consensusPoint,direction:'UNDER',
                        fairProb:fairUnder,bookProb:bestUnderProb,bestBook:bestUnderBook.book,bestPrice:bestUnderBook.underPrice,
                        ev,grade,kelly:k*100,wager:Math.round(S.bankroll*k*100)/100,
                        allBooks:pl.books.map(b=>({name:b.book,price:b.underPrice})).filter(b=>b.price),
                        event:pl.event.home_team+' vs '+pl.event.away_team,
                        time:new Date(pl.event.commence_time).toLocaleString()
                      });
                    }
                  }
                }
              });
            }
          }catch(e){console.log('Event error:',e)}

          await new Promise(r=>setTimeout(r,300));
        }
      }

      // ── GAME-LEVEL MARKETS: per-event fetch for halves, quarters, periods, alt lines, BTTS, etc. ──
      const gameMarketsArr=sport.gameMarkets||[];
      if(gameMarketsArr.length>0){
        // Use same filtered upcoming events list
        const gmEvents=events;// Paid plan — scan all upcoming
        for(let gi=0;gi<gmEvents.length;gi++){
          const gev=gmEvents[gi];
          S.scanStatus='Scanning '+sport.name+' game markets: '+gev.home_team+' vs '+gev.away_team+'...';
          S.scanProgress=((si+(gi+.5)/Math.max(gmEvents.length,1))/totalSteps)*100;render();
          try{
            const gmUrl='https://api.the-odds-api.com/v4/sports/'+sportKey+'/events/'+gev.id+'/odds?apiKey='+S.apiKey+'&regions=us&markets='+gameMarketsArr.join(',')+'&oddsFormat=american';
            const gmRes=await fetch(gmUrl);
            if(!gmRes.ok)continue;
            const gmData=await gmRes.json();
            if(!gmData.bookmakers)continue;

            // Collect all outcomes per market across books
            const mktLines={};// {marketKey: {outcomeKey: [{book,price,point,name}]}}
            gmData.bookmakers.forEach(bk=>{
              (bk.markets||[]).forEach(mkt=>{
                if(!mktLines[mkt.key])mktLines[mkt.key]={};
                (mkt.outcomes||[]).forEach(o=>{
                  // Build a unique key per outcome side
                  let oKey=o.name;
                  if(o.point!=null)oKey+='_'+o.point;
                  if(!mktLines[mkt.key][oKey])mktLines[mkt.key][oKey]={name:o.name,point:o.point,books:[]};
                  mktLines[mkt.key][oKey].books.push({book:bk.title,price:o.price});
                });
              });
            });

            // For each market, find cross-book edges
            Object.keys(mktLines).forEach(mktKey=>{
              const outcomes=mktLines[mktKey];
              const oKeys=Object.keys(outcomes);
              if(oKeys.length<2)return;

              // Calculate fair probs via vig removal across ALL outcomes in this market
              const avgImplied={};
              oKeys.forEach(ok=>{
                const probs=outcomes[ok].books.map(b=>americanToProb(b.price));
                avgImplied[ok]=probs.reduce((a,b)=>a+b,0)/probs.length;
              });
              const totalImp=Object.values(avgImplied).reduce((a,b)=>a+b,0);
              if(totalImp<=0)return;
              const fairProbs={};
              oKeys.forEach(ok=>{fairProbs[ok]=avgImplied[ok]/totalImp});

              // Check each outcome for edge vs best available book price
              oKeys.forEach(ok=>{
                const oc=outcomes[ok];
                if(!oc.books.length)return;
                // Best book = lowest implied prob = highest payout
                const bestBook=oc.books.reduce((best,b)=>americanToProb(b.price)<americanToProb(best.price)?b:best,oc.books[0]);
                const bestBookProb=americanToProb(bestBook.price);
                const fair=fairProbs[ok];
                if(!fair||!bestBookProb||fair<=bestBookProb)return;

                const ev=calcEv(fair,bestBookProb);
                if(ev<.02)return;
                const grade=getGrade(ev);
                const k=kellyF(fair,bestBookProb,S.kellyMult);

                // Build display name
                let direction=oc.name;
                let line=oc.point!=null?oc.point:'';
                let displayName=gev.home_team+' vs '+gev.away_team;

                // For spreads/totals with Over/Under
                if(oc.name==='Over'||oc.name==='Under'){
                  direction=oc.name.toUpperCase();
                }
                // For h2h/spreads with team names
                if(oc.name===gev.home_team||oc.name===gev.away_team){
                  displayName=oc.name;
                  direction=oc.point!=null?(oc.point>0?'+'+oc.point:String(oc.point)):'ML';
                }
                // For BTTS / Yes-No
                if(oc.name==='Yes'||oc.name==='No'){
                  direction=oc.name.toUpperCase();
                }

                allEdges.push({
                  player:displayName,sport:sport.name,sportEmoji:sport.e,sportColor:sport.c,
                  stat:formatMarket(mktKey),line:line,direction:direction,
                  fairProb:fair,bookProb:bestBookProb,bestBook:bestBook.book,bestPrice:bestBook.price,
                  ev,grade,kelly:k*100,wager:Math.round(S.bankroll*k*100)/100,
                  allBooks:oc.books.map(b=>({name:b.book,price:b.price})),
                  event:gev.home_team+' vs '+gev.away_team,
                  time:new Date(gev.commence_time).toLocaleString()
                });
              });
            });
          }catch(e){console.log('Game market error:',e)}
          await new Promise(r=>setTimeout(r,300));
        }
      }
    }catch(e){console.log('Sport error:',e)}
  }

  allEdges.sort((a,b)=>b.ev-a.ev);
  S.edges=allEdges;
  S.scanning=false;S.scanProgress=100;
  S.scanStatus='Found '+allEdges.length+' edges across all sports';
  save();render();
}

// ═══ HELPERS ═══
function getFilteredSorted(){
  const filtered=S.filterSport==='ALL'?S.edges:S.edges.filter(e=>e.sport===S.filterSport);
  return[...filtered].sort((a,b)=>S.sortBy==='ev'?b.ev-a.ev:S.sortBy==='kelly'?b.kelly-a.kelly:b.fairProb-a.fairProb);
}

          // Expanded
          if(S.expandedIdx===i){
            h+='<div style="padding-top:8px;border-top:1px solid var(--border)" onclick="event.stopPropagation()">';
            h+='<div style="font-size:12px;color:var(--muted);letter-spacing:1px;margin-bottom:6px;font-family:var(--mono)">ODDS BY BOOK</div>';
            h+='<div class="books">';
            edge.allBooks.forEach(b=>{
              const isBest=b.name===edge.bestBook;
              h+='<span class="book'+(isBest?' best':'')+'">'+b.name+': '+(b.price>0?'+':'')+b.price+'</span>';
            });
            h+='</div>';
            h+='<div style="font-size:12px;color:#889;margin-top:8px;line-height:1.6;font-family:var(--mono)">Edge: Fair prob '+(edge.fairProb*100).toFixed(1)+'% vs book implied '+(edge.bookProb*100).toFixed(1)+'% = '+(((edge.fairProb-edge.bookProb)*100).toFixed(1))+'% mispricing</div>';
            h+='<div style="font-size:14px;color:#aab;margin-top:4px">'+edge.time+'</div>';
            h+='<button style="margin-top:10px;width:100%;padding:10px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;background:rgba(0,255,170,.06);border:1px solid rgba(0,255,170,.15);color:var(--g);font-family:var(--mono)" onclick="event.stopPropagation();logPlay('+i+')">📋 LOG THIS PLAY</button>';
            h+='</div>';
          }
          h+='</div>';
        });

        // Recommended slip (auto — same as v2)
        if(rec.length){
          h+='<div class="slip"><div class="slip-t">RECOMMENDED SLIP ('+rec.length+' edges, '+S.minGrade+'+)</div>';
          rec.slice(0,8).forEach(e=>{
            h+='<div class="slip-r"><span style="color:#bbb">'+e.player+' <span style="color:#555">'+e.direction+' '+e.line+' '+e.stat+'</span></span><span style="font-weight:700;color:'+e.grade.c+';font-family:var(--mono)">'+e.grade.l+' +'+e.ev.toFixed(2)+' @ '+e.bestBook+'</span></div>';
          });
          h+='<div style="display:flex;justify-content:space-between;margin-top:8px;padding-top:6px;border-top:1px solid rgba(0,255,170,.08)"><span style="font-size:13px;color:#99a">Total wager</span><span style="font-size:16px;font-weight:800;color:var(--y);font-family:var(--mono)">$'+recW.toFixed(2)+'</span></div></div>';
        }
      } else if(!S.scanning&&S.scanProgress===0){
        h+='<div class="empty" style="margin-top:16px"><div style="font-size:32px;opacity:.4">🔍</div><div style="font-size:14px;color:var(--muted);margin-top:8px">Hit the scan button to find edges across all sports</div></div>';
      }
    }
  }

  // ═══ CUSTOM SLIP TAB ═══
  if(S.tab==='slip'){
    h+='<div style="text-align:center;margin-bottom:16px"><div style="font-size:12px;letter-spacing:3px;color:var(--slip);font-family:var(--mono);margin-bottom:4px">BUILD YOUR</div><div style="font-size:28px;font-weight:700;background:linear-gradient(135deg,#ff9100,#ffd600);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Custom Parlay Slip</div><div style="font-size:13px;color:var(--muted);margin-top:4px">Tap <span style="color:var(--slip);font-weight:700">+</span> on any edge card in SCAN to add legs here</div></div>';

    if(!S.customSlip.length){
      h+='<div class="empty"><div style="font-size:40px;opacity:.3">🎫</div><div style="font-size:14px;color:var(--muted);margin-top:10px">Your custom slip is empty</div><div style="font-size:13px;color:#556;margin-top:4px">Go to SCAN and tap the <span style="color:var(--slip);font-weight:700">+</span> button on edges you like</div></div>';
    } else {
      // Slip legs
      h+='<div class="cslip"><div class="cslip-t">🎫 YOUR SLIP — '+S.customSlip.length+'/10 LEGS</div>';
      S.customSlip.forEach((s,i)=>{
        h+='<div class="cslip-r">';
        h+='<div style="flex:1"><div style="font-size:14px;font-weight:700;color:#fff">'+s.sportEmoji+' '+s.player+'</div>';
        h+='<div style="font-size:12px;color:#889">'+s.direction+' '+s.line+' '+s.stat+' @ '+s.bestBook+'</div></div>';
        h+='<div style="display:flex;align-items:center;gap:6px"><span style="font-weight:700;color:'+s.grade.c+';font-family:var(--mono);font-size:12px">'+s.grade.l+'</span>';
        h+='<span style="font-size:11px;color:#aab;font-family:var(--mono)">'+(s.fairProb*100).toFixed(0)+'%</span>';
        h+='<span class="cslip-rm" onclick="removeFromSlip(\''+s.id.replace(/'/g,"\\'")+'\')">✕</span></div>';
        h+='</div>';
      });

      // Parlay stats
      const ss=slipStats;
      const parlayGrade=getGrade(ss.totalEv);
      h+='<div class="cslip-stats">';
      h+='<div class="cslip-stat"><div class="cslip-stat-l">PARLAY PROB</div><div class="cslip-stat-v" style="color:'+(ss.parlayProb>.1?'var(--g)':ss.parlayProb>.03?'var(--y)':'var(--r)')+'">'+(ss.parlayProb*100).toFixed(2)+'%</div></div>';
      h+='<div class="cslip-stat"><div class="cslip-stat-l">TOTAL EV</div><div class="cslip-stat-v" style="color:'+parlayGrade.c+'">'+(ss.totalEv>=0?'+':'')+ss.totalEv.toFixed(3)+'</div></div>';
      h+='<div class="cslip-stat"><div class="cslip-stat-l">PARLAY ODDS</div><div class="cslip-stat-v" style="color:#c6ff00">'+(ss.parlayOdds>0?'+':'')+ss.parlayOdds+'</div></div>';
      h+='<div class="cslip-stat"><div class="cslip-stat-l">KELLY WAGER</div><div class="cslip-stat-v" style="color:var(--y)">$'+ss.kellyWager.toFixed(2)+'</div></div>';
      h+='</div>';

      // Payout line
      h+='<div style="display:flex;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,145,0,.1)">';
      h+='<span style="font-size:14px;color:#aab">Potential payout</span>';
      h+='<span style="font-size:22px;font-weight:900;color:var(--g);font-family:var(--mono)">$'+ss.payout.toFixed(2)+'</span></div>';

      h+='</div>';

      // EV assessment
      h+='<div style="background:rgba('+(ss.totalEv>=0?'0,255,170':'255,23,68')+',.04);border:1px solid rgba('+(ss.totalEv>=0?'0,255,170':'255,23,68')+',.12);border-radius:10px;padding:14px 16px;margin-bottom:14px">';
      h+='<div style="font-size:13px;font-weight:700;color:'+(ss.totalEv>=0?'var(--g)':'var(--r)')+';letter-spacing:1px;font-family:var(--mono);margin-bottom:4px">'+(ss.totalEv>=0?'✅ +EV PARLAY':'⚠️ -EV PARLAY')+'</div>';
      if(ss.totalEv>=0){
        h+='<div style="font-size:13px;color:#aab;line-height:1.6">This parlay has a positive expected value. The combined fair probability ('+((ss.parlayProb*100).toFixed(2))+'%) exceeds the book\'s implied probability ('+((ss.parlayBookProb*100).toFixed(2))+'%). Kelly suggests wagering <strong style="color:var(--y)">$'+ss.kellyWager.toFixed(2)+'</strong> from your $'+S.bankroll+' bankroll.</div>';
      } else {
        h+='<div style="font-size:13px;color:#aab;line-height:1.6">This parlay has negative expected value overall. Consider removing weaker legs or adjusting your picks. Individual legs may still be +EV as straight bets.</div>';
      }
      h+='</div>';

      // Log parlay + Clear buttons
      h+='<button style="width:100%;padding:14px;border-radius:8px;font-family:var(--mono);font-size:13px;cursor:pointer;background:rgba(0,255,170,.08);border:1px solid rgba(0,255,170,.15);color:var(--g);font-weight:700;letter-spacing:1px;margin-bottom:8px" onclick="logParlay()">📋 LOG PARLAY TO TRACKER</button>';
      h+='<button style="width:100%;padding:12px;border-radius:8px;font-family:var(--mono);font-size:11px;cursor:pointer;background:rgba(255,23,68,.04);border:1px solid rgba(255,23,68,.1);color:var(--r);font-weight:700;letter-spacing:1px" onclick="if(confirm(\'Clear your custom slip?\'))clearSlip()">CLEAR SLIP</button>';
    }
  }

  // ═══ TRACK TAB ═══
  if(S.tab==='track'){
    const resolved=S.results.filter(r=>r.status!=='pending');
    const pending=S.results.filter(r=>r.status==='pending');
    const tp=resolved.length,w=resolved.filter(r=>r.hit).length,hr=tp>0?w/tp*100:0;
    const totalWagered=resolved.reduce((s,r)=>s+r.wager,0);
    const totalPayout=resolved.reduce((s,r)=>s+r.payout,0);
    const profit=totalPayout-totalWagered;

    h+='<div class="row r4">';
    [{l:'RESOLVED',v:tp,c:'#fff'},{l:'HIT RATE',v:tp?hr.toFixed(1)+'%':'--',c:hr>55?'var(--g)':'var(--y)'},{l:'WINS',v:w,c:'var(--g)'},{l:'PROFIT',v:tp?(profit>=0?'+$':'-$')+Math.abs(profit).toFixed(2):'--',c:profit>=0?'var(--g)':'var(--r)'}].forEach(s=>{
      h+='<div class="box"><div class="vl">'+s.l+'</div><div class="val" style="color:'+s.c+'">'+s.v+'</div></div>'});
    h+='</div>';

    // ROI row
    if(tp&&totalWagered>0){
      const roi=((profit/totalWagered)*100).toFixed(1);
      h+='<div style="text-align:center;font-family:var(--mono);font-size:13px;color:var(--muted);margin-bottom:14px">ROI: <span style="color:'+(profit>=0?'var(--g)':'var(--r)')+';font-weight:700">'+roi+'%</span> on $'+totalWagered.toFixed(2)+' wagered</div>';
    }

    // ── PENDING PLAYS ──
    if(pending.length){
      h+='<div style="font-size:12px;letter-spacing:2px;color:var(--y);font-family:var(--mono);margin-bottom:8px">⏳ PENDING ('+pending.length+')</div>';
      pending.forEach(r=>{
        h+='<div style="background:rgba(255,214,0,.03);border:1px solid rgba(255,214,0,.1);border-radius:10px;padding:12px 14px;margin-bottom:6px">';
        h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">';
        h+='<div><div style="font-size:14px;font-weight:700;color:#fff">'+(r.sportEmoji||'')+' '+r.player+'</div>';
        if(r.type==='parlay'&&r.legs){
          r.legs.forEach(l=>{
            h+='<div style="font-size:11px;color:#778;padding-left:8px">'+l.sportEmoji+' '+l.player+' '+l.dir+' '+l.line+' '+l.stat+'</div>';
          });
        } else {
          h+='<div style="font-size:12px;color:#889">'+r.dir+' '+r.line+' '+(r.stat||'')+' @ '+r.book+'</div>';
        }
        h+='</div>';
        h+='<div style="text-align:right;font-family:var(--mono)"><div style="font-size:14px;font-weight:700;color:var(--y)">$'+r.wager.toFixed(2)+'</div><div style="font-size:10px;color:#667">'+r.date+'</div></div></div>';

        // W/L buttons
        h+='<div style="display:flex;gap:6px">';
        h+='<button style="flex:1;padding:10px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;background:rgba(0,255,170,.08);border:1px solid rgba(0,255,170,.2);color:var(--g);font-family:var(--mono)" onclick="resolvePlay(\''+r.id+'\',true)">✅ WIN</button>';
        h+='<button style="flex:1;padding:10px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;background:rgba(255,23,68,.06);border:1px solid rgba(255,23,68,.15);color:var(--r);font-family:var(--mono)" onclick="resolvePlay(\''+r.id+'\',false)">❌ LOSS</button>';
        h+='<button style="width:40px;padding:10px;border-radius:6px;font-size:11px;cursor:pointer;background:rgba(255,255,255,.03);border:1px solid var(--border);color:#556;font-family:var(--mono)" onclick="if(confirm(\'Delete this play?\'))deletePlay(\''+r.id+'\')">🗑</button>';
        h+='</div></div>';
      });
    }

    // ── RESOLVED PLAYS ──
    if(resolved.length){
      h+='<div style="font-size:12px;letter-spacing:2px;color:var(--muted);font-family:var(--mono);margin:14px 0 8px">✅ RESOLVED ('+resolved.length+')</div>';
      resolved.slice().reverse().forEach(r=>{
        const isW=r.hit;
        h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:'+(isW?'rgba(0,255,170,.03)':'rgba(255,23,68,.03)')+';border:1px solid '+(isW?'rgba(0,255,170,.08)':'rgba(255,23,68,.08)')+';border-radius:8px;margin-bottom:4px;font-size:12px">';
        h+='<div style="flex:1"><div style="display:flex;align-items:center;gap:6px"><span style="color:'+(isW?'var(--g)':'var(--r)')+';font-weight:700;font-size:14px">'+(isW?'W':'L')+'</span>';
        h+='<span style="color:#ddd;font-weight:600">'+r.player+'</span></div>';
        if(r.type==='parlay'&&r.legs){
          h+='<div style="font-size:10px;color:#667;padding-left:24px">'+r.legs.map(l=>l.player.split(' ')[0]).join(' + ')+'</div>';
        } else {
          h+='<div style="font-size:10px;color:#667;padding-left:24px">'+r.dir+' '+r.line+' '+(r.stat||'')+' @ '+r.book+'</div>';
        }
        h+='</div>';
        h+='<div style="text-align:right;font-family:var(--mono)">';
        if(isW){
          h+='<div style="color:var(--g);font-weight:700;font-size:13px">+$'+(r.payout-r.wager).toFixed(2)+'</div>';
        } else {
          h+='<div style="color:var(--r);font-weight:700;font-size:13px">-$'+r.wager.toFixed(2)+'</div>';
        }
        h+='<div style="color:#556;font-size:9px">'+r.date+'</div>';
        h+='</div>';
        h+='<div style="margin-left:6px;display:flex;gap:2px">';
        h+='<button style="padding:4px 6px;border-radius:4px;font-size:9px;cursor:pointer;background:none;border:1px solid rgba(255,255,255,.06);color:#556" onclick="unresolvePlay(\''+r.id+'\')" title="Undo">↩</button>';
        h+='<button style="padding:4px 6px;border-radius:4px;font-size:9px;cursor:pointer;background:none;border:1px solid rgba(255,255,255,.06);color:#556" onclick="if(confirm(\'Delete?\'))deletePlay(\''+r.id+'\')" title="Delete">🗑</button>';
        h+='</div></div>';
      });
    }

    if(!S.results.length)h+='<div class="empty"><div style="font-size:32px;opacity:.3">📋</div><div style="font-size:14px;color:var(--muted);margin-top:8px">No plays logged yet</div><div style="font-size:13px;color:#556;margin-top:4px">Tap an edge card → expand it → hit LOG THIS PLAY<br>Or log your entire custom parlay from the SLIP tab</div></div>';

    if(S.results.length)h+='<button style="width:100%;padding:10px;border-radius:8px;font-family:var(--mono);font-size:10px;cursor:pointer;background:rgba(255,23,68,.04);border:1px solid rgba(255,23,68,.1);color:var(--r);margin-top:14px;font-weight:700;letter-spacing:1px" onclick="if(confirm(\'Clear all plays?\'))S.results=[],save(),render()">CLEAR ALL</button>';
  }

  // ═══ SET TAB ═══
  if(S.tab==='set'){
    h+='<div class="setup"><div class="setup-t">🔑 The Odds API Key</div>';
    h+='<p style="font-size:13px;color:#99a;margin-bottom:8px;line-height:1.5">Paid plan from <strong style="color:var(--g)">the-odds-api.com</strong> — enables auto-scanning player props across all sports.</p>';
    h+='<label class="lbl">API KEY</label><input class="inp" id="apiKeyInput" type="text" value="'+S.apiKey+'" placeholder="Paste your API key here">';
    h+='<button style="padding:8px 20px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;background:rgba(0,255,170,.08);border:1px solid rgba(0,255,170,.15);color:var(--g);margin-top:8px;font-family:var(--mono)" onclick="saveApiKey()">SAVE KEY</button>';
    h+='<div id="apiStatus" style="margin-top:8px;font-size:10px;font-family:var(--mono)"></div></div>';

    h+='<div class="setup"><div class="setup-t">📊 What Gets Scanned (v3 — All Markets)</div>';
    h+='<p style="font-size:13px;color:#99a;line-height:1.6">The auto-scanner pulls player props + game markets from:<br><strong style="color:#aaa">DraftKings, FanDuel, BetMGM, Caesars, Bet365, BetRivers</strong></p>';
    h+='<p style="font-size:13px;color:#889;margin-top:8px;line-height:1.5">';
    h+='<strong style="color:#ff6b35">NBA:</strong> pts, reb, ast, 3PM, blk, stl, combos, 1st basket + ML, spread, total, 1H, 2H, Q1-Q4, alt lines, team totals<br>';
    h+='<strong style="color:#ff9e44">NCAAB:</strong> pts, reb, ast, 3PM, combos + ML, spread, total, 1H, 2H, team totals<br>';
    h+='<strong style="color:#e040fb">WNBA:</strong> pts, reb, ast, 3PM, PRA + ML, spread, total, 1H, team totals<br>';
    h+='<strong style="color:#4ecdc4">NFL:</strong> pass/rush/rec yds, TDs, sacks, tackles, kicking + ML, spread, total, 1H, 2H, Q1-Q4, alt lines<br>';
    h+='<strong style="color:#66bb6a">NCAAF:</strong> pass/rush/rec yds, TDs + ML, spread, total, 1H, 2H, team totals<br>';
    h+='<strong style="color:#e63946">MLB:</strong> hits, TB, HR, RBI, K, pitcher props + ML, spread, total, F5, 1st/3rd/5th innings, alt lines<br>';
    h+='<strong style="color:#457b9d">NHL:</strong> pts, goals, ast, SOG, saves + ML, spread, total, P1-P3, alt lines, team totals<br>';
    h+='<strong style="color:#2d6a4f">Golf:</strong> ML, outrights · <strong style="color:#c6a700">Tennis:</strong> ML, spreads, totals</p></div>';

    h+='<div class="setup"><div class="setup-t">🎫 Custom Slip</div>';
    h+='<p style="font-size:13px;color:#99a;line-height:1.5">Tap the <span style="color:var(--slip);font-weight:700">+</span> button on any edge card to build your own parlay slip (up to 10 legs). View combined probability, EV, Kelly sizing, and potential payout in the SLIP tab.</p></div>';

    h+='<div class="setup"><div class="setup-t">📱 Install as App</div>';
    h+='<p style="font-size:13px;color:#99a;line-height:1.5"><strong>iPhone/iPad:</strong> Share button → Add to Home Screen<br><strong>Android:</strong> Three-dot menu → Add to Home Screen</p></div>';

    h+='<div class="setup"><div class="setup-t">🗑 Reset</div>';
    h+='<button style="padding:8px 16px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;background:rgba(255,23,68,.04);border:1px solid rgba(255,23,68,.1);color:var(--r);font-family:var(--mono)" onclick="if(confirm(\'Factory reset?\'))localStorage.removeItem(\'evpro3\'),location.reload()">FACTORY RESET</button></div>';
  }

  h+='<div class="footer">+EV Scanner Pro v3.0 · All Markets + Custom Slip · Not financial advice</div>';

  // Floating slip badge (visible on scan tab when slip has items)
  if(S.tab==='scan'&&S.customSlip.length){
    h+='<div class="slip-badge" onclick="S.tab=\'slip\';render()">🎫<div class="slip-badge-count">'+S.customSlip.length+'</div></div>';
  }

  app.innerHTML=h;
}

load();render();

function saveApiKey(){
  var inp=document.getElementById('apiKeyInput');
  if(inp){S.apiKey=inp.value.trim();save();var st=document.getElementById('apiStatus');if(st){st.style.color=S.apiKey?'var(--g)':'var(--r)';st.textContent=S.apiKey?'Key saved! Go to SCAN tab and hit the scan button.':'No key entered.'};}
}

</script>
</body>
</html>
