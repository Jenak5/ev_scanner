<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060810">
<title>+EV Scanner Pro v2</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060810;--card:rgba(255,255,255,0.025);--border:rgba(255,255,255,0.07);--g:#00ffaa;--y:#ffd600;--r:#ff1744;--text:#e8eaf0;--muted:#8890a0;--dim:#607080;--mono:'DM Mono',monospace;--body:'Space Grotesk',sans-serif}
html,body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:16px;min-height:100vh;overflow-x:hidden}
input,select,button{font-family:var(--mono);outline:none}
::placeholder{color:#556}
.app{max-width:780px;margin:0 auto;padding:16px 14px;position:relative;z-index:1}
.grid-bg{position:fixed;inset:0;opacity:.02;background-image:repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(0,255,170,.3) 59px,rgba(0,255,170,.3) 60px),repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(0,255,170,.3) 59px,rgba(0,255,170,.3) 60px);pointer-events:none}
.hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;margin-bottom:16px;border-bottom:1px solid rgba(0,255,170,.08)}
.logo{font-size:24px;font-weight:700;background:linear-gradient(135deg,#00ffaa,#76ff03);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tabs{display:flex;gap:3px}
.tab{padding:9px 16px;border-radius:6px;font-size:12px;font-weight:700;letter-spacing:1.5px;cursor:pointer;border:1px solid var(--border);background:transparent;color:#8890a0}
.tab.on{background:rgba(0,255,170,.1);border-color:rgba(0,255,170,.25);color:var(--g)}
.row{display:grid;gap:8px;margin-bottom:14px}
.r2{grid-template-columns:1fr 1fr}.r3{grid-template-columns:1fr 1fr 1fr}.r4{grid-template-columns:repeat(4,1fr)}
.box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.lbl{display:block;font-size:11px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;font-family:var(--mono)}
.val{font-size:20px;font-weight:800;font-family:var(--mono);text-align:center}
.vl{font-size:10px;letter-spacing:2px;color:var(--muted);text-align:center;margin-bottom:3px;font-family:var(--mono)}
.inp{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;padding:11px 13px;color:#fff;font-size:15px}
.chip{font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;font-weight:700;letter-spacing:.5px;border:1px solid var(--border);background:transparent;color:#8890a0}
.chip.on{background:rgba(0,255,170,.1);border-color:rgba(0,255,170,.2);color:var(--g)}
.btn-g{width:100%;padding:16px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;letter-spacing:1px;background:linear-gradient(135deg,rgba(0,255,170,.12),rgba(118,255,3,.06));border:1px solid rgba(0,255,170,.2);color:var(--g)}
.btn-g:hover{filter:brightness(1.1)}
.btn-scan{width:100%;padding:18px;border-radius:12px;font-weight:700;font-size:16px;cursor:pointer;letter-spacing:2px;background:linear-gradient(135deg,rgba(0,255,170,.15),rgba(255,214,0,.08));border:1px solid rgba(0,255,170,.25);color:var(--g);position:relative;overflow:hidden}
.btn-scan:disabled{opacity:.5;cursor:wait}
.btn-scan .pulse{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,255,170,.1),transparent);animation:scan 1.5s infinite}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.edge-card{border-radius:12px;padding:16px 18px;margin-bottom:10px;position:relative;cursor:pointer}
.grade{position:absolute;top:12px;right:14px;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;font-family:var(--mono)}
.mets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.met{background:rgba(0,0,0,.3);border-radius:8px;padding:8px 12px;text-align:center;min-width:68px}
.met-l{font-size:10px;letter-spacing:1px;color:var(--muted);font-family:var(--mono)}
.met-v{font-size:15px;font-weight:700;font-family:var(--mono)}
.books{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.book{font-size:11px;padding:4px 10px;border-radius:4px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:#b0b8c8;font-family:var(--mono)}
.book.best{background:rgba(0,255,170,.08);border-color:rgba(0,255,170,.2);color:var(--g)}
.slip{background:rgba(0,255,170,.04);border:1px solid rgba(0,255,170,.12);border-radius:12px;padding:16px 18px;margin-bottom:14px}
.slip-t{font-size:13px;font-weight:700;color:var(--g);letter-spacing:2px;margin-bottom:10px;font-family:var(--mono)}
.slip-r{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px}
.setup{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px}
.setup-t{font-size:15px;font-weight:700;color:#fff;margin-bottom:12px;font-family:var(--mono)}
.status{text-align:center;padding:10px;border-radius:8px;font-size:14px;margin-bottom:12px;font-family:var(--mono)}
.footer{text-align:center;font-size:13px;color:#99a;padding:20px 0;font-family:var(--mono)}
.empty{text-align:center;padding:40px 20px;border:1px dashed var(--border);border-radius:12px;margin-bottom:16px;font-size:14px;color:var(--muted)}
.prog{height:4px;background:var(--border);border-radius:2px;margin-bottom:12px;overflow:hidden}
.prog-bar{height:100%;background:var(--g);border-radius:2px;transition:width .3s}
.sm-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#99a8b8;border-radius:6px;padding:8px 16px;font-size:12px;cursor:pointer;letter-spacing:1px;font-weight:700}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="app" id="app"></div>
<script>
// ═══ QUANT ENGINE ═══
function normalCdf(z){const t=1/(1+.2316419*Math.abs(z)),d=.3989422804*Math.exp(-z*z/2);const p=d*t*(.3193815+t*(-.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));return z>=0?1-p:p}
function calcBase(line,avg){return normalCdf((avg-line)/Math.max(avg*.2,2))}
function calcEv(tp,mp=.5){return(tp-mp)*(1/mp)}
function kellyF(tp,mp=.5,fr=.25){const o=1/mp-1;if(o<=0)return 0;return Math.max(0,((tp*o-(1-tp))/o)*fr)}
function americanToProb(odds){return odds>0?100/(odds+100):Math.abs(odds)/(Math.abs(odds)+100)}
function getGrade(ev){if(ev>=.2)return{l:'A+',c:'#00ffaa',bg:'18,255,170'};if(ev>=.12)return{l:'A',c:'#00e676',bg:'0,230,118'};if(ev>=.08)return{l:'B+',c:'#76ff03',bg:'118,255,3'};if(ev>=.05)return{l:'B',c:'#c6ff00',bg:'198,255,0'};if(ev>=.02)return{l:'C',c:'#ffd600',bg:'255,214,0'};if(ev>=0)return{l:'D',c:'#ff9100',bg:'255,145,0'};return{l:'F',c:'#ff1744',bg:'255,23,68'}}
const GR={'A+':0,A:1,'B+':2,B:3,C:4,D:5,F:6};

// ═══ STATE ═══
let S={tab:'scan',apiKey:'',bankroll:100,kellyMult:.25,scanning:false,scanProgress:0,scanStatus:'',
  edges:[],results:[],filterSport:'ALL',sortBy:'ev',expandedIdx:null,minGrade:'B+'};

const SPORTS_MAP={
  basketball_nba:{name:'NBA',e:'🏀',c:'#ff6b35',props:['player_points','player_rebounds','player_assists','player_threes','player_blocks','player_steals','player_points_rebounds_assists']},
  americanfootball_nfl:{name:'NFL',e:'🏈',c:'#4ecdc4',props:['player_pass_yds','player_rush_yds','player_reception_yds','player_pass_tds','player_receptions','player_rush_attempts']},
  baseball_mlb:{name:'MLB',e:'⚾',c:'#e63946',props:['batter_hits','batter_total_bases','batter_home_runs','batter_rbis','pitcher_strikeouts','pitcher_outs']},
  icehockey_nhl:{name:'NHL',e:'🏒',c:'#457b9d',props:['player_points','player_goals','player_assists','player_shots_on_goal','player_blocked_shots']},
  soccer_epl:{name:'EPL',e:'⚽',c:'#6a0572',props:['player_goal_scorer_anytime']},
  golf_pga_championship:{name:'GOLF',e:'⛳',c:'#2d6a4f',props:[]},
  mma_mixed_martial_arts:{name:'MMA',e:'🥊',c:'#d90429',props:[]}
};

// ═══ PERSISTENCE ═══
function save(){try{localStorage.setItem('evpro2',JSON.stringify({apiKey:S.apiKey,bankroll:S.bankroll,kellyMult:S.kellyMult,results:S.results,edges:S.edges}))}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem('evpro2'));if(d){S.apiKey=d.apiKey||'';S.bankroll=d.bankroll||100;S.kellyMult=d.kellyMult||.25;S.results=d.results||[];S.edges=d.edges||[]}}catch(e){}}

// ═══ AUTO-SCANNER ═══
async function runFullScan(){
  if(!S.apiKey){alert('Enter your Odds API key in Settings first');return}
  S.scanning=true;S.edges=[];S.scanProgress=0;S.scanStatus='Starting scan...';render();

  const sportKeys=Object.keys(SPORTS_MAP);
  const totalSteps=sportKeys.length;
  let allEdges=[];

  for(let si=0;si<sportKeys.length;si++){
    const sportKey=sportKeys[si];
    const sport=SPORTS_MAP[sportKey];
    S.scanStatus='Scanning '+sport.name+' events...';
    S.scanProgress=((si)/totalSteps)*100;render();

    try{
      // Step 1: Get events for this sport
      const eventsUrl='https://api.the-odds-api.com/v4/sports/'+sportKey+'/events?apiKey='+S.apiKey;
      const eventsRes=await fetch(eventsUrl);
      if(!eventsRes.ok)continue;
      const events=await eventsRes.json();
      if(!events.length)continue;

      // Step 2: For sports with props, scan each event
      if(sport.props.length>0){
        // Limit to first 3 events to conserve API calls
        const eventsToScan=events.slice(0,3);
        for(let ei=0;ei<eventsToScan.length;ei++){
          const event=eventsToScan[ei];
          S.scanStatus='Scanning '+sport.name+': '+event.home_team+' vs '+event.away_team+'...';
          S.scanProgress=((si+ei/eventsToScan.length)/totalSteps)*100;render();

          try{
            const propsUrl='https://api.the-odds-api.com/v4/sports/'+sportKey+'/events/'+event.id+'/odds?apiKey='+S.apiKey+'&regions=us&markets='+sport.props.join(',')+'&oddsFormat=american';
            const propsRes=await fetch(propsUrl);
            if(!propsRes.ok)continue;
            const propsData=await propsRes.json();

            // Step 3: Process each bookmaker's props
            if(propsData.bookmakers){
              const playerLines={};// {playerName_market: [{book,over,under,point}]}

              propsData.bookmakers.forEach(bk=>{
                (bk.markets||[]).forEach(mkt=>{
                  const outcomes=mkt.outcomes||[];
                  // Group by player
                  const byPlayer={};
                  outcomes.forEach(o=>{
                    const key=(o.description||'Unknown')+'_'+mkt.key;
                    if(!byPlayer[key])byPlayer[key]={player:o.description||'Unknown',market:mkt.key,overs:[],unders:[]};
                    if(o.name==='Over')byPlayer[key].overs.push({book:bk.title,price:o.price,point:o.point});
                    if(o.name==='Under')byPlayer[key].unders.push({book:bk.title,price:o.price,point:o.point});
                  });

                  Object.values(byPlayer).forEach(pl=>{
                    const key=pl.player+'_'+pl.market;
                    if(!playerLines[key])playerLines[key]={player:pl.player,market:pl.market,books:[],event:event};
                    pl.overs.forEach((ov,i)=>{
                      playerLines[key].books.push({book:ov.book,overPrice:ov.price,underPrice:pl.unders[i]?pl.unders[i].price:null,point:ov.point});
                    });
                  });
                });
              });

              // Step 4: Analyze each player line for edges
              Object.values(playerLines).forEach(pl=>{
                if(!pl.books.length)return;

                // Find consensus line and best odds
                const points=pl.books.map(b=>b.point).filter(p=>p!=null);
                if(!points.length)return;
                const consensusPoint=points[0];// Most common line
                const overPrices=pl.books.map(b=>b.overPrice).filter(p=>p!=null);
                const underPrices=pl.books.map(b=>b.underPrice).filter(p=>p!=null);
                if(!overPrices.length)return;

                // Calculate implied probs from each book
                const overProbs=overPrices.map(p=>americanToProb(p));
                const underProbs=underPrices.map(p=>americanToProb(p));

                // Average implied prob (removing vig by normalizing)
                const avgOverImp=overProbs.reduce((a,b)=>a+b,0)/overProbs.length;
                const avgUnderImp=underProbs.length?underProbs.reduce((a,b)=>a+b,0)/underProbs.length:(1-avgOverImp);
                const total=avgOverImp+avgUnderImp;
                const fairOver=avgOverImp/total;
                const fairUnder=avgUnderImp/total;

                // Find books with the best price (furthest from fair)
                const bestOverBook=pl.books.reduce((best,b)=>b.overPrice!=null&&americanToProb(b.overPrice)<americanToProb(best.overPrice||999)?b:best,pl.books[0]);
                const bestOverProb=bestOverBook.overPrice?americanToProb(bestOverBook.overPrice):null;

                // Check OVER edge: if fair prob > best book's implied prob
                if(bestOverProb&&fairOver>bestOverProb){
                  const ev=calcEv(fairOver,bestOverProb);
                  const grade=getGrade(ev);
                  if(ev>=.02){
                    const k=kellyF(fairOver,bestOverProb,S.kellyMult);
                    allEdges.push({
                      player:pl.player,sport:sport.name,sportEmoji:sport.e,sportColor:sport.c,
                      stat:formatMarket(pl.market),line:consensusPoint,direction:'OVER',
                      fairProb:fairOver,bookProb:bestOverProb,bestBook:bestOverBook.book,bestPrice:bestOverBook.overPrice,
                      ev,grade,kelly:k*100,wager:Math.round(S.bankroll*k*100)/100,
                      allBooks:pl.books.map(b=>({name:b.book,price:b.overPrice})).filter(b=>b.price),
                      event:pl.event.home_team+' vs '+pl.event.away_team,
                      time:new Date(pl.event.commence_time).toLocaleString()
                    });
                  }
                }

                // Check UNDER edge similarly
                if(underPrices.length){
                  const bestUnderBook=pl.books.reduce((best,b)=>b.underPrice!=null&&americanToProb(b.underPrice)<americanToProb(best.underPrice||999)?b:best,pl.books[0]);
                  const bestUnderProb=bestUnderBook.underPrice?americanToProb(bestUnderBook.underPrice):null;
                  if(bestUnderProb&&fairUnder>bestUnderProb){
                    const ev=calcEv(fairUnder,bestUnderProb);
                    const grade=getGrade(ev);
                    if(ev>=.02){
                      const k=kellyF(fairUnder,bestUnderProb,S.kellyMult);
                      allEdges.push({
                        player:pl.player,sport:sport.name,sportEmoji:sport.e,sportColor:sport.c,
                        stat:formatMarket(pl.market),line:consensusPoint,direction:'UNDER',
                        fairProb:fairUnder,bookProb:bestUnderProb,bestBook:bestUnderBook.book,bestPrice:bestUnderBook.underPrice,
                        ev,grade,kelly:k*100,wager:Math.round(S.bankroll*k*100)/100,
                        allBooks:pl.books.map(b=>({name:b.book,price:b.underPrice})).filter(b=>b.price),
                        event:pl.event.home_team+' vs '+pl.event.away_team,
                        time:new Date(pl.event.commence_time).toLocaleString()
                      });
                    }
                  }
                }
              });
            }
          }catch(e){console.log('Event error:',e)}

          // Small delay between events
          await new Promise(r=>setTimeout(r,300));
        }
      }

      // Also pull game-level odds for totals/spreads edges
      try{
        const oddsUrl='https://api.the-odds-api.com/v4/sports/'+sportKey+'/odds?apiKey='+S.apiKey+'&regions=us&markets=h2h,spreads,totals&oddsFormat=american';
        const oddsRes=await fetch(oddsUrl);
        if(oddsRes.ok){
          const oddsData=await oddsRes.json();
          oddsData.forEach(game=>{
            if(!game.bookmakers||!game.bookmakers.length)return;
            // Check for cross-book spread/total edges
            game.bookmakers.forEach(bk=>{
              (bk.markets||[]).forEach(mkt=>{
                if(mkt.key==='totals'){
                  const over=mkt.outcomes.find(o=>o.name==='Over');
                  const under=mkt.outcomes.find(o=>o.name==='Under');
                  if(over&&under){
                    const op=americanToProb(over.price),up=americanToProb(under.price);
                    const total=op+up,fairO=op/total;
                    // If significantly mispriced
                    if(fairO>.56||fairO<.44){
                      const dir=fairO>.56?'OVER':'UNDER';
                      const tp=dir==='OVER'?fairO:1-fairO;
                      const bp=dir==='OVER'?americanToProb(over.price):americanToProb(under.price);
                      const ev=calcEv(tp,.5);
                      if(ev>=.02){
                        const grade=getGrade(ev);
                        const k=kellyF(tp,.5,S.kellyMult);
                        allEdges.push({
                          player:game.home_team+' vs '+game.away_team,sport:sport.name,sportEmoji:sport.e,sportColor:sport.c,
                          stat:'Game Total',line:over.point,direction:dir,
                          fairProb:tp,bookProb:bp,bestBook:bk.title,bestPrice:dir==='OVER'?over.price:under.price,
                          ev,grade,kelly:k*100,wager:Math.round(S.bankroll*k*100)/100,
                          allBooks:[{name:bk.title,price:dir==='OVER'?over.price:under.price}],
                          event:game.home_team+' vs '+game.away_team,
                          time:new Date(game.commence_time).toLocaleString()
                        });
                      }
                    }
                  }
                }
              });
            });
          });
        }
      }catch(e){}
    }catch(e){console.log('Sport error:',e)}
  }

  // Sort by EV
  allEdges.sort((a,b)=>b.ev-a.ev);
  S.edges=allEdges;
  S.scanning=false;S.scanProgress=100;
  S.scanStatus='Found '+allEdges.length+' edges across all sports';
  save();render();
}

function formatMarket(m){
  const map={player_points:'Points',player_rebounds:'Rebounds',player_assists:'Assists',player_threes:'3PM',
    player_blocks:'Blocks',player_steals:'Steals',player_points_rebounds_assists:'PRA',
    player_pass_yds:'Pass Yards',player_rush_yds:'Rush Yards',player_reception_yds:'Rec Yards',
    player_pass_tds:'Pass TDs',player_receptions:'Receptions',player_rush_attempts:'Rush Att',
    batter_hits:'Hits',batter_total_bases:'Total Bases',batter_home_runs:'HRs',batter_rbis:'RBIs',
    pitcher_strikeouts:'Strikeouts',pitcher_outs:'Outs',player_goals:'Goals',player_shots_on_goal:'SOG',
    player_blocked_shots:'Blocked Shots',player_goal_scorer_anytime:'Anytime Goal'};
  return map[m]||m;
}

// ═══ RENDER ═══
function render(){
  const app=document.getElementById('app');
  const plusEv=S.edges.filter(e=>e.ev>=.05).length;
  const rec=S.edges.filter(e=>GR[e.grade.l]<=GR[S.minGrade]);
  const recW=rec.reduce((s,e)=>s+e.wager,0);
  const filtered=S.filterSport==='ALL'?S.edges:S.edges.filter(e=>e.sport===S.filterSport);
  const sorted=[...filtered].sort((a,b)=>S.sortBy==='ev'?b.ev-a.ev:S.sortBy==='kelly'?b.kelly-a.kelly:b.fairProb-a.fairProb);

  let h='';
  // Header
  h+='<div class="hdr"><div><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="width:7px;height:7px;border-radius:50%;background:var(--g);box-shadow:0 0 8px var(--g)"></div><span style="font-size:11px;letter-spacing:4px;color:var(--muted)">AUTO-SCAN</span></div><div class="logo">+EV Scanner Pro</div></div>';
  h+='<div class="tabs">';
  [['scan','SCAN'],['track','TRACK'],['set','SET']].forEach(([k,l])=>{h+='<button class="tab'+(S.tab===k?' on':'')+'" onclick="S.tab=\''+k+'\';render()">'+l+'</button>'});
  h+='</div></div>';

  // ═══ SCAN TAB ═══
  if(S.tab==='scan'){
    if(!S.apiKey){
      h+='<div class="setup"><div class="setup-t">🔑 API Key Required</div>';
      h+='<p style="font-size:14px;color:#aab;line-height:1.6;margin-bottom:12px">To auto-scan, you need your API key from <strong style="color:var(--g)">the-odds-api.com</strong>.</p>';
      h+='<p style="font-size:13px;color:#99a">Go to the SET tab to paste your key.</p></div>';
    } else {
      // Config
      h+='<div class="row r2"><div class="box"><label class="lbl">BANKROLL</label><div style="display:flex;align-items:baseline;gap:3px"><span style="color:var(--g);font-size:13px;font-weight:700">$</span><input id="bankrollInput" type="number" style="background:none;border:none;color:#fff;font-size:20px;font-weight:800;font-family:var(--mono);width:100%" value="'+S.bankroll+'" onblur="S.bankroll=+this.value;save()"></div></div>';
      h+='<div class="box"><label class="lbl">KELLY FRACTION</label><div style="display:flex;align-items:center;gap:6px"><input type="range" min="0.1" max="0.5" step="0.05" value="'+S.kellyMult+'" onchange="S.kellyMult=+this.value;save();render()" style="flex:1;accent-color:var(--g)"><span style="color:var(--y);font-weight:800;font-size:16px;font-family:var(--mono)">'+Math.round(S.kellyMult*100)+'%</span></div></div></div>';

      // Scan button
      h+='<button class="btn-scan" onclick="runFullScan()" '+(S.scanning?'disabled':'')+'>';
      if(S.scanning)h+='<div class="pulse"></div>';
      h+=(S.scanning?'SCANNING ALL MARKETS...':'🔍 AUTO-SCAN ALL SPORTS FOR +EV EDGES')+'</button>';

      // Progress
      if(S.scanning||S.scanProgress>0){
        h+='<div style="margin-top:12px"><div class="prog"><div class="prog-bar" style="width:'+S.scanProgress+'%"></div></div>';
        h+='<div style="font-size:13px;color:#99a;text-align:center;font-family:var(--mono)">'+S.scanStatus+'</div></div>';
      }

      // Stats
      if(S.edges.length){
        h+='<div class="row r4" style="margin-top:14px">';
        [{l:'EDGES FOUND',v:S.edges.length,c:'#fff'},{l:'+EV (B+)',v:plusEv,c:'var(--g)'},{l:'REC WAGER',v:'$'+recW.toFixed(0),c:'var(--y)'},{l:'SPORTS',v:[...new Set(S.edges.map(e=>e.sport))].length,c:'#c6ff00'}].forEach(s=>{
          h+='<div class="box"><div class="vl">'+s.l+'</div><div class="val" style="color:'+s.c+'">'+s.v+'</div></div>';
        });
        h+='</div>';

        // Sport filter
        h+='<div style="display:flex;gap:4px;margin:12px 0;flex-wrap:wrap">';
        h+='<button class="chip'+(S.filterSport==='ALL'?' on':'')+'" onclick="S.filterSport=\'ALL\';render()">ALL</button>';
        const sportsSeen=[...new Set(S.edges.map(e=>e.sport))];
        sportsSeen.forEach(sn=>{
          const cfg=Object.values(SPORTS_MAP).find(v=>v.name===sn);
          if(cfg)h+='<button class="chip'+(S.filterSport===sn?' on':'')+'" onclick="S.filterSport=\''+sn+'\';render()" style="'+(S.filterSport===sn?'background:'+cfg.c+'18;border-color:'+cfg.c+'33;color:'+cfg.c:'')+'">'+cfg.e+' '+sn+' ('+S.edges.filter(e=>e.sport===sn).length+')</button>';
        });
        h+='</div>';

        // Sort
        h+='<div style="display:flex;gap:4px;margin-bottom:10px;align-items:center"><span style="font-size:14px;color:#aab;letter-spacing:1px;font-family:var(--mono)">SORT:</span>';
        [['ev','EV'],['fairProb','PROB'],['kelly','KELLY']].forEach(([k,l])=>{h+='<button class="chip'+(S.sortBy===k?' on':'')+'" style="font-size:8px;padding:3px 10px" onclick="S.sortBy=\''+k+'\';render()">'+l+'</button>'});
        h+='</div>';

        // Edge cards
        sorted.slice(0,50).forEach((edge,i)=>{
          const evStr='+'+edge.ev.toFixed(3);
          const pc=edge.fairProb>.6?'#00ffaa':edge.fairProb>.55?'#c6ff00':'#d8dae5';
          h+='<div class="edge-card" style="background:rgba('+edge.grade.bg+',.04);border:1px solid rgba('+edge.grade.bg+',.12)" onclick="S.expandedIdx=S.expandedIdx==='+i+'?null:'+i+';render()">';
          h+='<div class="grade" style="background:rgba('+edge.grade.bg+',.08);border:2px solid '+edge.grade.c+'33;color:'+edge.grade.c+'">'+edge.grade.l+'</div>';

          h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">';
          h+='<span style="font-size:9px;color:'+edge.grade.c+';font-weight:700;font-family:var(--mono)">#'+(i+1)+'</span>';
          h+='<span style="font-size:11px;padding:3px 8px;border-radius:3px;background:'+edge.sportColor+'15;color:'+edge.sportColor+';border:1px solid '+edge.sportColor+'22">'+edge.sportEmoji+' '+edge.sport+'</span></div>';

          h+='<div style="font-size:17px;font-weight:700;color:#fff">'+edge.player+'</div>';
          h+='<div style="font-size:13px;color:#99a;margin-bottom:2px">'+edge.event+'</div>';
          h+='<div style="font-size:14px;color:#aab;margin-bottom:10px">'+edge.direction+' '+edge.line+' '+edge.stat+' @ <span style="color:var(--g)">'+edge.bestBook+'</span> ('+(edge.bestPrice>0?'+':'')+edge.bestPrice+')</div>';

          h+='<div class="mets">';
          [['FAIR',(edge.fairProb*100).toFixed(1)+'%',pc],['BOOK',(edge.bookProb*100).toFixed(1)+'%','#888'],['EV',evStr,edge.grade.c],['KELLY',edge.kelly.toFixed(1)+'%','#c6ff00'],['WAGER','$'+edge.wager.toFixed(2),'var(--y)']].forEach(([ml,mv,mc])=>{
            h+='<div class="met"><div class="met-l">'+ml+'</div><div class="met-v" style="color:'+mc+'">'+mv+'</div></div>';
          });
          h+='</div>';

          // Expanded: show all books
          if(S.expandedIdx===i){
            h+='<div style="padding-top:8px;border-top:1px solid var(--border)" onclick="event.stopPropagation()">';
            h+='<div style="font-size:12px;color:var(--muted);letter-spacing:1px;margin-bottom:6px;font-family:var(--mono)">ODDS BY BOOK</div>';
            h+='<div class="books">';
            edge.allBooks.forEach(b=>{
              const isBest=b.name===edge.bestBook;
              h+='<span class="book'+(isBest?' best':'')+'">'+b.name+': '+(b.price>0?'+':'')+b.price+'</span>';
            });
            h+='</div>';
            h+='<div style="font-size:12px;color:#889;margin-top:8px;line-height:1.6;font-family:var(--mono)">Edge: Fair prob '+(edge.fairProb*100).toFixed(1)+'% vs book implied '+(edge.bookProb*100).toFixed(1)+'% = '+(((edge.fairProb-edge.bookProb)*100).toFixed(1))+'% mispricing</div>';
            h+='<div style="font-size:14px;color:#aab;margin-top:4px">'+edge.time+'</div>';
            h+='</div>';
          }
          h+='</div>';
        });

        // Recommended slip
        if(rec.length){
          h+='<div class="slip"><div class="slip-t">RECOMMENDED SLIP ('+rec.length+' edges, '+S.minGrade+'+)</div>';
          rec.slice(0,8).forEach(e=>{
            h+='<div class="slip-r"><span style="color:#bbb">'+e.player+' <span style="color:#555">'+e.direction+' '+e.line+' '+e.stat+'</span></span><span style="font-weight:700;color:'+e.grade.c+';font-family:var(--mono)">'+e.grade.l+' +'+e.ev.toFixed(2)+' @ '+e.bestBook+'</span></div>';
          });
          h+='<div style="display:flex;justify-content:space-between;margin-top:8px;padding-top:6px;border-top:1px solid rgba(0,255,170,.08)"><span style="font-size:13px;color:#99a">Total wager</span><span style="font-size:16px;font-weight:800;color:var(--y);font-family:var(--mono)">$'+recW.toFixed(2)+'</span></div></div>';
        }
      } else if(!S.scanning&&S.scanProgress===0){
        h+='<div class="empty" style="margin-top:16px"><div style="font-size:32px;opacity:.4">🔍</div><div style="font-size:14px;color:var(--muted);margin-top:8px">Hit the scan button to find edges across all sports</div></div>';
      }
    }
  }

  // ═══ TRACK TAB ═══
  if(S.tab==='track'){
    const tp=S.results.length,w=S.results.filter(r=>r.hit).length,hr=tp>0?w/tp*100:0;
    const profit=S.results.reduce((s,r)=>s+(r.hit?r.wager*.8:-r.wager),0);
    h+='<div class="row r4">';
    [{l:'PLAYS',v:tp,c:'#fff'},{l:'HIT RATE',v:tp?hr.toFixed(1)+'%':'--',c:hr>55?'var(--g)':'var(--y)'},{l:'WINS',v:w,c:'var(--g)'},{l:'PROFIT',v:tp?(profit>=0?'+$':'-$')+Math.abs(profit).toFixed(2):'--',c:profit>=0?'var(--g)':'var(--r)'}].forEach(s=>{
      h+='<div class="box"><div class="vl">'+s.l+'</div><div class="val" style="color:'+s.c+'">'+s.v+'</div></div>'});
    h+='</div>';

    if(!tp)h+='<div class="empty"><div style="font-size:14px;color:var(--muted)">No results logged yet.</div></div>';

    S.results.slice().reverse().forEach(r=>{
      h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:'+(r.hit?'rgba(0,255,170,.03)':'rgba(255,23,68,.03)')+';border:1px solid '+(r.hit?'rgba(0,255,170,.08)':'rgba(255,23,68,.08)')+';border-radius:8px;margin-bottom:4px;font-size:11px">';
      h+='<div><span style="color:'+(r.hit?'var(--g)':'var(--r)')+';font-weight:700">'+(r.hit?'W':'L')+'</span> <span style="color:#bbb">'+r.player+'</span> <span style="color:#556">'+r.dir+' '+r.line+'</span></div>';
      h+='<div style="text-align:right;font-family:var(--mono)"><div style="color:#888;font-size:10px">'+r.book+' | $'+r.wager+'</div></div></div>';
    });

    if(tp)h+='<button style="width:100%;padding:10px;border-radius:8px;font-family:var(--mono);font-size:10px;cursor:pointer;background:rgba(255,23,68,.04);border:1px solid rgba(255,23,68,.1);color:var(--r);margin-top:10px;font-weight:700;letter-spacing:1px" onclick="if(confirm(\'Clear?\'))S.results=[],save(),render()">CLEAR</button>';
  }

  // ═══ SET TAB ═══
  if(S.tab==='set'){
    h+='<div class="setup"><div class="setup-t">🔑 The Odds API Key</div>';
    h+='<p style="font-size:13px;color:#99a;margin-bottom:8px;line-height:1.5">Paid plan from <strong style="color:var(--g)">the-odds-api.com</strong> — enables auto-scanning player props across all sports.</p>';
    h+='<label class="lbl">API KEY</label><input class="inp" id="apiKeyInput" type="text" value="'+S.apiKey+'" placeholder="Paste your API key here">';
    h+='<button style="padding:8px 20px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;background:rgba(0,255,170,.08);border:1px solid rgba(0,255,170,.15);color:var(--g);margin-top:8px;font-family:var(--mono)" onclick="saveApiKey()">SAVE KEY</button>';
    h+='<div id="apiStatus" style="margin-top:8px;font-size:10px;font-family:var(--mono)"></div></div>';

    h+='<div class="setup"><div class="setup-t">📊 What Gets Scanned</div>';
    h+='<p style="font-size:13px;color:#99a;line-height:1.6">The auto-scanner pulls player props from:<br><strong style="color:#aaa">DraftKings, FanDuel, BetMGM, Caesars, Bet365, BetRivers</strong></p>';
    h+='<p style="font-size:13px;color:#889;margin-top:8px;line-height:1.5">NBA: points, rebounds, assists, 3PM, blocks, steals, PRA<br>NFL: pass/rush/rec yards, TDs, receptions<br>MLB: hits, total bases, HRs, RBIs, strikeouts<br>NHL: points, goals, assists, SOG<br>EPL: anytime goalscorer<br>+ Game totals and spreads for all sports</p></div>';

    h+='<div class="setup"><div class="setup-t">📱 Install as App</div>';
    h+='<p style="font-size:13px;color:#99a;line-height:1.5"><strong>iPhone/iPad:</strong> Share button → Add to Home Screen<br><strong>Android:</strong> Three-dot menu → Add to Home Screen</p></div>';

    h+='<div class="setup"><div class="setup-t">🗑 Reset</div>';
    h+='<button style="padding:8px 16px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;background:rgba(255,23,68,.04);border:1px solid rgba(255,23,68,.1);color:var(--r);font-family:var(--mono)" onclick="if(confirm(\'Factory reset?\'))localStorage.removeItem(\'evpro2\'),location.reload()">FACTORY RESET</button></div>';
  }

  h+='<div class="footer">+EV Scanner Pro v2.0 · Auto-Scan Edition · Not financial advice</div>';
  app.innerHTML=h;
}

load();render();

function saveApiKey(){
  var inp=document.getElementById('apiKeyInput');
  if(inp){S.apiKey=inp.value.trim();save();var st=document.getElementById('apiStatus');if(st){st.style.color=S.apiKey?'var(--g)':'var(--r)';st.textContent=S.apiKey?'Key saved! Go to SCAN tab and hit the scan button.':'No key entered.'};}
}

</script>
</body>
</html>
