<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>+EV Scanner Pro v3</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#060810;--card:rgba(255,255,255,.015);--border:rgba(255,255,255,.04);--g:#00ffaa;--r:#ff1744;--y:#ffd600;--muted:#3a3a4a;--text:#d8dae5;--mono:'DM Mono',monospace;--body:'Space Grotesk',sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;overflow-x:hidden}
input,select,button{font-family:var(--mono);outline:none}
.grid-bg{position:fixed;inset:0;opacity:.02;background-image:repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(0,255,170,.3) 59px,rgba(0,255,170,.3) 60px),repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(0,255,170,.3) 59px,rgba(0,255,170,.3) 60px);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:16px 14px 80px}
.header{display:flex;justify-content:space-between;align-items:center;padding-bottom:14px;margin-bottom:16px;border-bottom:1px solid rgba(0,255,170,.06)}
.logo-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--g);margin-right:8px;box-shadow:0 0 8px var(--g)}
.logo-label{font-size:9px;font-weight:700;letter-spacing:4px;color:var(--muted);font-family:var(--mono)}
.logo-title{font-size:22px;font-weight:700;background:linear-gradient(135deg,#00ffaa,#76ff03);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-top:2px}
.tab-bar{display:flex;gap:2px}
.tab-btn{background:none;border:1px solid var(--border);color:#444;font-size:10px;font-weight:700;letter-spacing:1.5px;padding:7px 14px;border-radius:6px;cursor:pointer;font-family:var(--mono);transition:.15s}
.tab-btn.active{background:rgba(0,255,170,.08);border-color:rgba(0,255,170,.2);color:var(--g)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 10px;text-align:center}
.stat-val{font-size:22px;font-weight:800;font-family:var(--mono);color:#fff}
.stat-lbl{font-size:8px;font-weight:600;letter-spacing:2px;color:var(--muted);margin-top:3px;font-family:var(--mono)}
.scan-btn{width:100%;padding:16px;border-radius:10px;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;font-family:var(--mono);transition:.3s;border:none;margin-bottom:14px}
.scan-btn.go{background:linear-gradient(135deg,rgba(0,255,170,.15),rgba(255,214,0,.08));border:1px solid rgba(0,255,170,.25);color:var(--g)}
.scan-btn.stop{background:rgba(255,23,68,.1);border:1px solid rgba(255,23,68,.15);color:var(--r)}
.edge-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:.15s}
.edge-card:hover{border-color:rgba(0,255,170,.15)}
.edge-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.edge-grade{font-size:15px;font-weight:900;font-family:var(--mono);padding:3px 10px;border-radius:6px;display:inline-block}
.edge-ev{font-size:16px;font-weight:800;font-family:var(--mono);color:var(--g)}
.edge-player{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px}
.edge-detail{font-size:12px;color:#888;font-family:var(--mono);margin-bottom:3px}
.edge-books{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.edge-book{font-size:10px;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.04);border:1px solid var(--border);font-family:var(--mono);color:#888}
.edge-book.best{background:rgba(0,255,170,.06);border-color:rgba(0,255,170,.15);color:var(--g)}
.edge-expanded{padding:14px;margin-top:10px;background:rgba(0,0,0,.25);border-radius:8px;border-top:1px solid var(--border)}
.slip{background:rgba(0,255,170,.03);border:1px solid rgba(0,255,170,.1);border-radius:10px;padding:16px 18px;margin-bottom:16px}
.slip-t{font-size:11px;font-weight:700;color:var(--g);letter-spacing:2px;margin-bottom:10px;font-family:var(--mono)}
.setup{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:16px}
.setup-t{font-size:13px;font-weight:700;color:#fff;margin-bottom:14px;font-family:var(--mono)}
.status{text-align:center;padding:10px;border-radius:8px;font-size:12px;margin-bottom:14px;font-family:var(--mono)}
.footer{text-align:center;font-size:9px;color:#1a1a2a;padding:20px 0;font-family:var(--mono)}
.empty{text-align:center;padding:40px 20px;border:1px dashed var(--border);border-radius:10px;margin-bottom:16px}
.prog{height:4px;background:var(--border);border-radius:2px;margin-bottom:14px;overflow:hidden}
.prog-bar{height:100%;background:var(--g);border-radius:2px;transition:width .3s}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.filter-btn{font-size:10px;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:#444;cursor:pointer;font-family:var(--mono);font-weight:700;letter-spacing:1px;transition:.15s}
.filter-btn.active{background:rgba(0,255,170,.08);border-color:rgba(0,255,170,.15);color:var(--g)}
.mkt-tag{font-size:9px;padding:2px 6px;border-radius:4px;font-family:var(--mono);font-weight:700;letter-spacing:.5px;display:inline-block;margin-left:5px}
.mkt-alt-spread{background:rgba(138,43,226,.15);color:#bb86fc}
.mkt-alt-total{background:rgba(255,152,0,.15);color:#ffab40}
.mkt-half{background:rgba(33,150,243,.15);color:#64b5f6}
.mkt-quarter{background:rgba(233,30,99,.15);color:#f48fb1}
.mkt-period{background:rgba(0,188,212,.15);color:#4dd0e1}
.mkt-innings{background:rgba(76,175,80,.15);color:#81c784}
.mkt-spread{background:rgba(255,255,255,.08);color:#bbb}
.mkt-total{background:rgba(255,255,255,.08);color:#bbb}
.mkt-ml{background:rgba(255,255,255,.08);color:#bbb}
.mkt-prop{background:rgba(255,214,0,.12);color:#ffd600}
input,select{background:rgba(255,255,255,.05);border:1px solid var(--border);color:#fff;padding:10px 12px;border-radius:8px;font-size:14px;font-family:var(--mono);width:100%}
input:focus,select:focus{outline:none;border-color:rgba(0,255,170,.3)}
label{font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--muted);display:block;margin-bottom:5px;font-family:var(--mono)}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="app" id="app"></div>
<script>
var API='https://api.the-odds-api.com/v4';
function americanToProb(o){return o>0?100/(o+100):Math.abs(o)/(Math.abs(o)+100)}
function probToAmerican(p){return p>=.5?Math.round(-100*p/(1-p)):Math.round(100*(1-p)/p)}
function calcEv(tp,mp){return mp>0&&mp<1?(tp-mp)*(1/mp):0}
function kellyF(tp,mp,fr){var o=1/mp-1;if(o<=0)return 0;return Math.max(0,((tp*o-(1-tp))/o)*fr)}
function getGrade(ev){if(ev>=.20)return{l:'A+',c:'#00ffaa',bg:'18,255,170'};if(ev>=.12)return{l:'A',c:'#00e676',bg:'0,230,118'};if(ev>=.08)return{l:'B+',c:'#76ff03',bg:'118,255,3'};if(ev>=.05)return{l:'B',c:'#c6ff00',bg:'198,255,0'};if(ev>=.02)return{l:'C',c:'#ffd600',bg:'255,214,0'};if(ev>=0)return{l:'D',c:'#ff9100',bg:'255,145,0'};return{l:'F',c:'#ff1744',bg:'255,23,68'}}
var GR={'A+':0,A:1,'B+':2,B:3,C:4,D:5,F:6};

var S={tab:'scan',apiKey:'',bankroll:100,kellyMult:.25,scanning:false,scanProgress:0,scanStatus:'',edges:[],filterSport:'ALL',filterMkt:'ALL',sortBy:'ev',expandedIdx:null,minGrade:'C',lastScan:null,scanStats:{},scanLog:[],apiRemaining:'?',mySlip:[],slipView:'rec'};

function save(){try{localStorage.setItem('evpro3',JSON.stringify({apiKey:S.apiKey,bankroll:S.bankroll,kellyMult:S.kellyMult,edges:S.edges,minGrade:S.minGrade,lastScan:S.lastScan,scanStats:S.scanStats,mySlip:S.mySlip}))}catch(e){}}
function load(){try{var d=JSON.parse(localStorage.getItem('evpro3'));if(d){S.apiKey=d.apiKey||'';S.bankroll=d.bankroll||100;S.kellyMult=d.kellyMult||.25;S.edges=d.edges||[];S.minGrade=d.minGrade||'C';S.lastScan=d.lastScan||null;S.scanStats=d.scanStats||{};S.mySlip=d.mySlip||[]}}catch(e){}
if(!S.apiKey){['evpro2','evpro'].forEach(function(k){try{var o=JSON.parse(localStorage.getItem(k));if(o&&o.apiKey&&!S.apiKey){S.apiKey=o.apiKey;save()}}catch(e){}})}}

var SPORTS={
  basketball_nba:{name:'NBA',e:'\u{1F3C0}',c:'#ff6b35',
    gameMkts:'h2h,spreads,totals,alternate_spreads,alternate_totals,h2h_h1,h2h_h2,spreads_h1,spreads_h2,totals_h1,totals_h2,h2h_q1,h2h_q2,h2h_q3,h2h_q4,spreads_q1,spreads_q2,totals_q1,totals_q2,totals_q3,totals_q4',
    props:['player_points','player_rebounds','player_assists','player_threes','player_blocks','player_steals','player_points_rebounds_assists','player_points_alternate','player_rebounds_alternate','player_assists_alternate']},
  basketball_ncaab:{name:'NCAAB',e:'\u{1F3C0}',c:'#ff9100',gameMkts:'h2h,spreads,totals,alternate_spreads,alternate_totals,h2h_h1,spreads_h1,totals_h1',props:['player_points','player_rebounds','player_assists']},
  americanfootball_nfl:{name:'NFL',e:'\u{1F3C8}',c:'#4ecdc4',gameMkts:'h2h,spreads,totals,alternate_spreads,alternate_totals,h2h_h1,spreads_h1,totals_h1,h2h_q1,spreads_q1,totals_q1',props:['player_pass_yds','player_rush_yds','player_reception_yds','player_pass_tds','player_receptions','player_anytime_td']},
  americanfootball_ncaaf:{name:'NCAAF',e:'\u{1F3C8}',c:'#66bb6a',gameMkts:'h2h,spreads,totals,alternate_spreads,alternate_totals,h2h_h1,spreads_h1,totals_h1',props:[]},
  baseball_mlb:{name:'MLB',e:'\u26BE',c:'#e63946',gameMkts:'h2h,spreads,totals,alternate_spreads,alternate_totals,h2h_1st_5_innings,spreads_1st_5_innings,totals_1st_5_innings,h2h_1st_3_innings,h2h_1st_7_innings,totals_1st_3_innings,totals_1st_7_innings',props:['pitcher_strikeouts','batter_hits','batter_home_runs','batter_total_bases','batter_rbis','batter_runs_scored']},
  icehockey_nhl:{name:'NHL',e:'\u{1F3D2}',c:'#457b9d',gameMkts:'h2h,spreads,totals,alternate_spreads,alternate_totals,h2h_p1,h2h_p2,h2h_p3,spreads_p1,totals_p1,totals_p2,totals_p3',props:['player_points','player_goals','player_assists','player_shots_on_goal','player_total_saves']},
  soccer_epl:{name:'EPL',e:'\u26BD',c:'#6a0572',gameMkts:'h2h,spreads,totals,alternate_spreads,alternate_totals,h2h_h1,totals_h1,btts,draw_no_bet',props:['player_goal_scorer_anytime','player_shots_on_target']},
  soccer_usa_mls:{name:'MLS',e:'\u26BD',c:'#ab47bc',gameMkts:'h2h,spreads,totals,alternate_spreads,alternate_totals,h2h_h1,totals_h1,btts',props:[]},
  mma_mixed_martial_arts:{name:'MMA',e:'\u{1F94A}',c:'#d90429',gameMkts:'h2h',props:[]}
};

function getMktCat(k){if(k.indexOf('alternate_spread')>=0)return{label:'ALT SPR',cls:'mkt-alt-spread'};if(k.indexOf('alternate_total')>=0)return{label:'ALT TOT',cls:'mkt-alt-total'};if(k.indexOf('_h1')>=0||k.indexOf('_h2')>=0)return{label:'HALF',cls:'mkt-half'};if(k.indexOf('_q')>=0)return{label:'QTR',cls:'mkt-quarter'};if(k.indexOf('_p1')>=0||k.indexOf('_p2')>=0||k.indexOf('_p3')>=0)return{label:'PERIOD',cls:'mkt-period'};if(k.indexOf('innings')>=0)return{label:'INN',cls:'mkt-innings'};if(k.indexOf('player_')>=0||k.indexOf('pitcher_')>=0||k.indexOf('batter_')>=0)return{label:'PROP',cls:'mkt-prop'};if(k.indexOf('spread')>=0)return{label:'SPREAD',cls:'mkt-spread'};if(k.indexOf('total')>=0)return{label:'TOTAL',cls:'mkt-total'};return{label:'ML',cls:'mkt-ml'}}
function getMktFK(k){if(k.indexOf('alternate_spread')>=0)return'ALT_SPREAD';if(k.indexOf('alternate_total')>=0)return'ALT_TOTAL';if(k.indexOf('_h1')>=0||k.indexOf('_h2')>=0)return'HALF';if(k.indexOf('_q')>=0)return'QTR';if(k.indexOf('_p1')>=0||k.indexOf('_p2')>=0||k.indexOf('_p3')>=0)return'PERIOD';if(k.indexOf('innings')>=0)return'INNINGS';if(k.indexOf('player_')>=0||k.indexOf('pitcher_')>=0||k.indexOf('batter_')>=0)return'PROP';return'MAIN'}
function fmtMkt(k){var n={h2h:'ML',spreads:'Spread',totals:'Total',alternate_spreads:'Alt Spread',alternate_totals:'Alt Total',h2h_h1:'1H ML',h2h_h2:'2H ML',spreads_h1:'1H Spread',spreads_h2:'2H Spread',totals_h1:'1H Total',totals_h2:'2H Total',h2h_q1:'Q1 ML',h2h_q2:'Q2 ML',h2h_q3:'Q3 ML',h2h_q4:'Q4 ML',spreads_q1:'Q1 Spread',spreads_q2:'Q2 Spread',totals_q1:'Q1 Total',totals_q2:'Q2 Total',totals_q3:'Q3 Total',totals_q4:'Q4 Total',h2h_p1:'P1 ML',h2h_p2:'P2 ML',h2h_p3:'P3 ML',spreads_p1:'P1 Spread',totals_p1:'P1 Total',totals_p2:'P2 Total',totals_p3:'P3 Total',h2h_1st_5_innings:'F5 ML',spreads_1st_5_innings:'F5 Spread',totals_1st_5_innings:'F5 Total',h2h_1st_3_innings:'F3 ML',h2h_1st_7_innings:'F7 ML',totals_1st_3_innings:'F3 Total',totals_1st_7_innings:'F7 Total',btts:'Both Score',draw_no_bet:'DNB',player_points:'Points',player_rebounds:'Rebounds',player_assists:'Assists',player_threes:'Threes',player_blocks:'Blocks',player_steals:'Steals',player_points_rebounds_assists:'PRA',player_pass_yds:'Pass Yds',player_rush_yds:'Rush Yds',player_reception_yds:'Rec Yds',player_pass_tds:'Pass TDs',player_receptions:'Rec',player_anytime_td:'Any TD',pitcher_strikeouts:'K',batter_hits:'Hits',batter_home_runs:'HR',batter_total_bases:'TB',batter_rbis:'RBI',batter_runs_scored:'Runs',player_goals:'Goals',player_shots_on_goal:'SOG',player_total_saves:'Saves',player_goal_scorer_anytime:'Any Goal',player_shots_on_target:'SOT'};var kk=k.replace('_alternate','');return(k.indexOf('_alternate')>=0?'Alt ':'')+((n[kk])||k.replace(/_/g,' '))}

var scanAbort=false;

function processGame(game,sport,allEdges){
  if(!game.bookmakers||!game.bookmakers.length)return;
  var evLabel=(game.away_team||'?')+' @ '+(game.home_team||'?');
  var md={};
  game.bookmakers.forEach(function(bk){(bk.markets||[]).forEach(function(mkt){if(!md[mkt.key])md[mkt.key]={};mkt.outcomes.forEach(function(oc){var ok=oc.name+(oc.point!=null?'|'+oc.point:'');if(!md[mkt.key][ok])md[mkt.key][ok]={outcomes:[],point:oc.point};md[mkt.key][ok].outcomes.push({book:bk.title,name:oc.name,price:oc.price,point:oc.point})})})});
  Object.keys(md).forEach(function(mk){S.scanStats.markets++;Object.keys(md[mk]).forEach(function(ok){var od=md[mk][ok];var prices=od.outcomes.map(function(o){return o.price}).filter(function(p){return p&&Math.abs(p)>=100});if(prices.length<2)return;var probs=prices.map(americanToProb);var fair=probs.reduce(function(a,b){return a+b},0)/probs.length;od.outcomes.forEach(function(bo){var bp=americanToProb(bo.price);if(bp<=.01||bp>=.99)return;var ev=calcEv(fair,bp);if(ev<.02)return;var gr=getGrade(ev);if(GR[gr.l]>GR[S.minGrade])return;var k=kellyF(fair,bp,S.kellyMult);allEdges.push({sport:sport.name,sportEmoji:sport.e,sportColor:sport.c,event:evLabel,time:new Date(game.commence_time).toLocaleString(),marketKey:mk,marketName:fmtMkt(mk),mktCategory:getMktCat(mk),mktFilterKey:getMktFK(mk),outcome:bo.name,point:bo.point,bestBook:bo.book,bestPrice:bo.price,fairProb:fair,bookProb:bp,ev:ev,grade:gr,kelly:k*100,wager:Math.round(S.bankroll*k*100)/100,allBooks:od.outcomes.map(function(o){return{name:o.book,price:o.price}}),numBooks:prices.length});S.scanStats.edges++})})});
}

async function runScan(){
  if(!S.apiKey){alert('Set API key in SET tab');return}
  if(S.scanning){scanAbort=true;return}
  S.scanning=true;S.edges=[];scanAbort=false;
  S.scanStats={sports:0,events:0,markets:0,edges:0};S.scanLog=[];S.apiRemaining='?';
  render();
  var allEdges=[];
  var sportKeys=Object.keys(SPORTS);

  for(var si=0;si<sportKeys.length;si++){
    if(scanAbort)break;
    var sportKey=sportKeys[si];
    var sp=SPORTS[sportKey];
    S.scanStatus=sp.e+' Scanning '+sp.name+'...';
    S.scanProgress=(si/sportKeys.length)*100;render();

    // STEP 1: Game-level odds via /odds endpoint (same as working v2)
    try{
      var oddsRes=await fetch(API+'/sports/'+sportKey+'/odds?apiKey='+S.apiKey+'&regions=us&markets='+sp.gameMkts+'&oddsFormat=american');
      var rem=oddsRes.headers.get('x-requests-remaining');
      if(rem)S.apiRemaining=rem;
      if(oddsRes.ok){
        var games=await oddsRes.json();
        if(games&&games.length){
          S.scanStats.sports++;
          S.scanLog.push('\u2705 '+sp.name+': '+games.length+' games (game mkts)');
          games.forEach(function(g){S.scanStats.events++;processGame(g,sp,allEdges)});
        }else{S.scanLog.push('\u23ED '+sp.name+': No games')}
      }else{S.scanLog.push('\u26A0\uFE0F '+sp.name+' odds: HTTP '+oddsRes.status)}
    }catch(e){S.scanLog.push('\u274C '+sp.name+' odds: '+e.message)}

    // STEP 2: Player props via /events then /events/{id}/odds (same as working v2)
    if(sp.props.length>0){
      try{
        S.scanStatus=sp.e+' '+sp.name+' props...';render();
        var eventsRes=await fetch(API+'/sports/'+sportKey+'/events?apiKey='+S.apiKey);
        if(eventsRes.ok){
          var events=await eventsRes.json();
          if(events&&events.length){
            var eventsToScan=events.slice(0,3);
            for(var ei=0;ei<eventsToScan.length;ei++){
              if(scanAbort)break;
              var event=eventsToScan[ei];
              S.scanStatus=sp.e+' Props: '+(event.away_team||'?')+' @ '+(event.home_team||'?');render();
              try{
                var propsRes=await fetch(API+'/sports/'+sportKey+'/events/'+event.id+'/odds?apiKey='+S.apiKey+'&regions=us&markets='+sp.props.join(',')+'&oddsFormat=american');
                if(propsRes.ok){
                  var propsData=await propsRes.json();
                  processGame(propsData,sp,allEdges);
                  S.scanLog.push('\u2705 '+sp.name+' props: '+(event.away_team||'')+' @ '+(event.home_team||''));
                }else{S.scanLog.push('\u26A0\uFE0F '+sp.name+' props: HTTP '+propsRes.status)}
              }catch(e2){S.scanLog.push('\u26A0\uFE0F '+sp.name+' prop err: '+e2.message)}
              await new Promise(function(r){setTimeout(r,400)});
            }
          }
        }else{S.scanLog.push('\u26A0\uFE0F '+sp.name+' events: HTTP '+eventsRes.status)}
      }catch(e){S.scanLog.push('\u26A0\uFE0F '+sp.name+' props skip: '+e.message)}
    }

    if(S.apiRemaining!=='?'&&parseInt(S.apiRemaining)<3){S.scanLog.push('\u26A0\uFE0F Quota low. Stopping.');scanAbort=true}
    await new Promise(function(r){setTimeout(r,300)});
  }

  allEdges.sort(function(a,b){return b.ev-a.ev});
  S.edges=allEdges;S.scanning=false;S.scanProgress=100;
  S.scanStatus=(scanAbort?'\u26A0\uFE0F Stopped':'\u2705 Done')+' \u2014 '+allEdges.length+' edges';
  S.lastScan=new Date().toLocaleString();save();render();
}

function gradeSlip(p){if(!p.length)return null;var ae=p.reduce(function(s,e){return s+e.ev},0)/p.length,tw=p.reduce(function(s,e){return s+e.wager},0),ep=p.reduce(function(s,e){return s+e.wager*e.ev},0),pfp=p.reduce(function(a,e){return a*e.fairProb},1),pbp=p.reduce(function(a,e){return a*e.bookProb},1);return{avgEv:ae,totalWager:tw,expectedProfit:ep,parlayFairProb:pfp,parlayBookProb:pbp,parlayOdds:pbp>0?probToAmerican(pbp):0,parlayPayout:pbp>0?1/pbp:0,parlayEv:pfp>0&&pbp>0?calcEv(pfp,pbp):0,grade:getGrade(ae),count:p.length}}
