<script>
// ═══ QUANT ENGINE ═══
function normalCdf(z){const t=1/(1+.2316419*Math.abs(z)),d=.3989422804*Math.exp(-z*z/2);const p=d*t*(.3193815+t*(-.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));return z>=0?1-p:p}
function calcBase(line,avg){return normalCdf((avg-line)/Math.max(avg*.2,2))}
function calcEv(tp,mp){return(tp-mp)*(1/mp)}
function kellyF(tp,mp,fr){const o=1/mp-1;if(o<=0)return 0;return Math.max(0,((tp*o-(1-tp))/o)*fr)}
function americanToProb(odds){return odds>0?100/(odds+100):Math.abs(odds)/(Math.abs(odds)+100)}
function probToAmerican(p){if(p<=0||p>=1)return 0;return p>=.5?Math.round(-100*p/(1-p)):Math.round(100*(1-p)/p)}
function getGrade(ev){if(ev>=.2)return{l:'A+',c:'#00ffaa',bg:'18,255,170'};if(ev>=.12)return{l:'A',c:'#00e676',bg:'0,230,118'};if(ev>=.08)return{l:'B+',c:'#76ff03',bg:'118,255,3'};if(ev>=.05)return{l:'B',c:'#c6ff00',bg:'198,255,0'};if(ev>=.02)return{l:'C',c:'#ffd600',bg:'255,214,0'};if(ev>=0)return{l:'D',c:'#ff9100',bg:'255,145,0'};return{l:'F',c:'#ff1744',bg:'255,23,68'}}
const GR={'A+':0,A:1,'B+':2,B:3,C:4,D:5,F:6};

// ═══ STATE ═══
let S={tab:'scan',apiKey:'',bankroll:100,kellyMult:.25,scanning:false,scanProgress:0,scanStatus:'',
  edges:[],results:[],customSlip:[],filterSport:'ALL',sortBy:'ev',expandedIdx:null,minGrade:'B+',showSlipPanel:false};

// ═══ EXPANDED SPORTS MAP — ALL AVAILABLE MARKETS ═══

    'batter_hits_runs_rbis','batter_singles','batter_doubles','batter_triples','batter_walks',

  ]},

  ]},
  soccer_uefa_champs_league:{name:'UCL',e:'⚽',c:'#1a237e',props:[

  ]},
  mma_mixed_martial_arts:{name:'MMA',e:'🥊',c:'#d90429',props:[]},
  golf_pga_championship:{name:'GOLF',e:'⛳',c:'#2d6a4f',props:[]},
  tennis_atp_french_open:{name:'TENNIS',e:'🎾',c:'#c6a700',props:[]}

// ═══ MARKET NAME MAPPING ═══
const MKT_NAMES={
  player_points:'Points',player_rebounds:'Rebounds',player_assists:'Assists',player_threes:'3PM',
  player_blocks:'Blocks',player_steals:'Steals',player_turnovers:'Turnovers',

  player_rush_longest:'Lng Rush',player_reception_longest:'Lng Rec',
  batter_hits:'Hits',batter_total_bases:'Total Bases',batter_home_runs:'HRs',batter_rbis:'RBIs',
  batter_runs_scored:'Runs',batter_hits_runs_rbis:'H+R+RBI',batter_singles:'Singles',
  batter_doubles:'Doubles',batter_triples:'Triples',batter_walks:'Walks',
  batter_strikeouts:'Batter Ks',batter_stolen_bases:'SBs',batter_first_home_run:'1st HR',
  pitcher_strikeouts:'Strikeouts',pitcher_outs:'Outs',pitcher_hits_allowed:'Hits Allowed',
  pitcher_walks:'BB Allowed',pitcher_earned_runs:'Earned Runs',pitcher_record_a_win:'Record Win',

};
function formatMarket(m){return MKT_NAMES[m]||m.replace(/^(player_|batter_|pitcher_)/,'').replace(/_/g,' ')}

// ═══ PERSISTENCE ═══
function save(){try{localStorage.setItem('evpro3',JSON.stringify({apiKey:S.apiKey,bankroll:S.bankroll,kellyMult:S.kellyMult,results:S.results,edges:S.edges,customSlip:S.customSlip}))}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem('evpro3'));if(d){S.apiKey=d.apiKey||'';S.bankroll=d.bankroll||100;S.kellyMult=d.kellyMult||.25;S.results=d.results||[];S.edges=d.edges||[];S.customSlip=d.customSlip||[]}}catch(e){}}

// ═══ CUSTOM SLIP LOGIC ═══
function isOnSlip(edge){return S.customSlip.some(s=>s.id===edgeId(edge))}
function edgeId(e){return e.player+'_'+e.stat+'_'+e.direction+'_'+e.line+'_'+e.bestBook}
function toggleSlip(idx){
  const edge=getFilteredSorted()[idx];
  if(!edge)return;
  const id=edgeId(edge);
  if(S.customSlip.some(s=>s.id===id)){
    S.customSlip=S.customSlip.filter(s=>s.id!==id);
  } else {
    if(S.customSlip.length>=10){alert('Max 10 legs per slip');return}
    S.customSlip.push({id,player:edge.player,sport:edge.sport,sportEmoji:edge.sportEmoji,stat:edge.stat,
      line:edge.line,direction:edge.direction,fairProb:edge.fairProb,bookProb:edge.bookProb,
      bestBook:edge.bestBook,bestPrice:edge.bestPrice,ev:edge.ev,grade:edge.grade,
      kelly:edge.kelly,wager:edge.wager,event:edge.event});
  }
  save();render();
}
function removeFromSlip(id){S.customSlip=S.customSlip.filter(s=>s.id!==id);save();render()}
function clearSlip(){S.customSlip=[];save();render()}
function getSlipStats(){
  if(!S.customSlip.length)return{parlayProb:0,totalEv:0,kellyWager:0,parlayOdds:0,payout:0};
  const parlayProb=S.customSlip.reduce((p,s)=>p*s.fairProb,1);
  const parlayBookProb=S.customSlip.reduce((p,s)=>p*s.bookProb,1);
  const totalEv=calcEv(parlayProb,parlayBookProb);
  const kellyPct=kellyF(parlayProb,parlayBookProb,S.kellyMult);
  const kellyWager=Math.round(S.bankroll*kellyPct*100)/100;
  const parlayOdds=probToAmerican(parlayBookProb);
  const payout=Math.round(kellyWager*(1/parlayBookProb)*100)/100;
  return{parlayProb,parlayBookProb,totalEv,kellyWager,parlayOdds,payout};
}

// ═══ AUTO-SCANNER (SAME FETCH PATTERN AS V2) ═══
async function runFullScan(){
  if(!S.apiKey){alert('Enter your Odds API key in Settings first');return}
  S.scanning=true;S.edges=[];S.scanProgress=0;S.scanStatus='Starting scan...';render();

  const sportKeys=Object.keys(SPORTS_MAP);
  const totalSteps=sportKeys.length;
  let allEdges=[];

  for(let si=0;si<sportKeys.length;si++){
    const sportKey=sportKeys[si];
    const sport=SPORTS_MAP[sportKey];
    S.scanStatus='Scanning '+sport.name+' events...';
    S.scanProgress=((si)/totalSteps)*100;render();

    try{
      // Step 1: Get events for this sport
      const eventsUrl='https://api.the-odds-api.com/v4/sports/'+sportKey+'/events?apiKey='+S.apiKey;
      const eventsRes=await fetch(eventsUrl);
      if(!eventsRes.ok)continue;
      const events=await eventsRes.json();
      if(!events.length)continue;

      // Step 2: For sports with props, scan each event
      if(sport.props.length>0){
        // Limit to first 3 events to conserve API calls
        const eventsToScan=events.slice(0,3);
        for(let ei=0;ei<eventsToScan.length;ei++){
          const event=eventsToScan[ei];
          S.scanStatus='Scanning '+sport.name+': '+event.home_team+' vs '+event.away_team+'...';
          S.scanProgress=((si+ei/eventsToScan.length)/totalSteps)*100;render();

          try{
            const propsUrl='https://api.the-odds-api.com/v4/sports/'+sportKey+'/events/'+event.id+'/odds?apiKey='+S.apiKey+'&regions=us&markets='+sport.props.join(',')+'&oddsFormat=american';
            const propsRes=await fetch(propsUrl);
            if(!propsRes.ok)continue;
            const propsData=await propsRes.json();

            // Step 3: Process each bookmaker's props
            if(propsData.bookmakers){
              const playerLines={};

              propsData.bookmakers.forEach(bk=>{
                (bk.markets||[]).forEach(mkt=>{
                  const outcomes=mkt.outcomes||[];
                  const byPlayer={};
                  outcomes.forEach(o=>{
                    const key=(o.description||'Unknown')+'_'+mkt.key;
                    if(!byPlayer[key])byPlayer[key]={player:o.description||'Unknown',market:mkt.key,overs:[],unders:[]};
                    if(o.name==='Over')byPlayer[key].overs.push({book:bk.title,price:o.price,point:o.point});
                    if(o.name==='Under')byPlayer[key].unders.push({book:bk.title,price:o.price,point:o.point});
                    // Handle Yes/No markets (anytime TD, anytime goal, etc.)
                    if(o.name==='Yes')byPlayer[key].overs.push({book:bk.title,price:o.price,point:null});
                    if(o.name==='No')byPlayer[key].unders.push({book:bk.title,price:o.price,point:null});
                  });

                  Object.values(byPlayer).forEach(pl=>{
                    const key=pl.player+'_'+pl.market;
                    if(!playerLines[key])playerLines[key]={player:pl.player,market:pl.market,books:[],event:event};
                    pl.overs.forEach((ov,i)=>{
                      playerLines[key].books.push({book:ov.book,overPrice:ov.price,underPrice:pl.unders[i]?pl.unders[i].price:null,point:ov.point});
                    });
                  });
                });
              });

              // Step 4: Analyze each player line for edges
              Object.values(playerLines).forEach(pl=>{
                if(!pl.books.length)return;

                const points=pl.books.map(b=>b.point).filter(p=>p!=null);
                const consensusPoint=points.length?points[0]:'Yes';
                const overPrices=pl.books.map(b=>b.overPrice).filter(p=>p!=null);
                const underPrices=pl.books.map(b=>b.underPrice).filter(p=>p!=null);
                if(!overPrices.length)return;

                const overProbs=overPrices.map(p=>americanToProb(p));
                const underProbs=underPrices.map(p=>americanToProb(p));

                const avgOverImp=overProbs.reduce((a,b)=>a+b,0)/overProbs.length;
                const avgUnderImp=underProbs.length?underProbs.reduce((a,b)=>a+b,0)/underProbs.length:(1-avgOverImp);
                const total=avgOverImp+avgUnderImp;
                const fairOver=avgOverImp/total;
                const fairUnder=avgUnderImp/total;

                // Find books with best price
                const bestOverBook=pl.books.reduce((best,b)=>b.overPrice!=null&&americanToProb(b.overPrice)<americanToProb(best.overPrice||999)?b:best,pl.books[0]);
                const bestOverProb=bestOverBook.overPrice?americanToProb(bestOverBook.overPrice):null;

                if(bestOverProb&&fairOver>bestOverProb){
                  const ev=calcEv(fairOver,bestOverProb);
                  const grade=getGrade(ev);
                  if(ev>=.02){
                    const k=kellyF(fairOver,bestOverProb,S.kellyMult);
                    allEdges.push({
                      player:pl.player,sport:sport.name,sportEmoji:sport.e,sportColor:sport.c,
                      stat:formatMarket(pl.market),line:consensusPoint,direction:'OVER',
                      fairProb:fairOver,bookProb:bestOverProb,bestBook:bestOverBook.book,bestPrice:bestOverBook.overPrice,
                      ev,grade,kelly:k*100,wager:Math.round(S.bankroll*k*100)/100,
                      allBooks:pl.books.map(b=>({name:b.book,price:b.overPrice})).filter(b=>b.price),
                      event:pl.event.home_team+' vs '+pl.event.away_team,
                      time:new Date(pl.event.commence_time).toLocaleString()
                    });
                  }
                }

                // Check UNDER edge
                if(underPrices.length){
                  const bestUnderBook=pl.books.reduce((best,b)=>b.underPrice!=null&&americanToProb(b.underPrice)<americanToProb(best.underPrice||999)?b:best,pl.books[0]);
                  const bestUnderProb=bestUnderBook.underPrice?americanToProb(bestUnderBook.underPrice):null;
                  if(bestUnderProb&&fairUnder>bestUnderProb){
                    const ev=calcEv(fairUnder,bestUnderProb);
                    const grade=getGrade(ev);
                    if(ev>=.02){
                      const k=kellyF(fairUnder,bestUnderProb,S.kellyMult);
                      allEdges.push({
                        player:pl.player,sport:sport.name,sportEmoji:sport.e,sportColor:sport.c,
                        stat:formatMarket(pl.market),line:consensusPoint,direction:'UNDER',
                        fairProb:fairUnder,bookProb:bestUnderProb,bestBook:bestUnderBook.book,bestPrice:bestUnderBook.underPrice,
                        ev,grade,kelly:k*100,wager:Math.round(S.bankroll*k*100)/100,
                        allBooks:pl.books.map(b=>({name:b.book,price:b.underPrice})).filter(b=>b.price),
                        event:pl.event.home_team+' vs '+pl.event.away_team,
                        time:new Date(pl.event.commence_time).toLocaleString()
                      });
                    }
                  }
                }
              });
            }
          }catch(e){console.log('Event error:',e)}

          await new Promise(r=>setTimeout(r,300));
        }
      }

      // Also pull game-level odds for totals/spreads edges
      try{
        const oddsUrl='https://api.the-odds-api.com/v4/sports/'+sportKey+'/odds?apiKey='+S.apiKey+'&regions=us&markets=h2h,spreads,totals&oddsFormat=american';
        const oddsRes=await fetch(oddsUrl);
        if(oddsRes.ok){
          const oddsData=await oddsRes.json();
          oddsData.forEach(game=>{
            if(!game.bookmakers||!game.bookmakers.length)return;
            game.bookmakers.forEach(bk=>{
              (bk.markets||[]).forEach(mkt=>{
                if(mkt.key==='totals'){
                  const over=mkt.outcomes.find(o=>o.name==='Over');
                  const under=mkt.outcomes.find(o=>o.name==='Under');
                  if(over&&under){
                    const op=americanToProb(over.price),up=americanToProb(under.price);
                    const total=op+up,fairO=op/total;
                    if(fairO>.56||fairO<.44){
                      const dir=fairO>.56?'OVER':'UNDER';
                      const tp=dir==='OVER'?fairO:1-fairO;
                      const bp=dir==='OVER'?americanToProb(over.price):americanToProb(under.price);
                      const ev=calcEv(tp,.5);
                      if(ev>=.02){
                        const grade=getGrade(ev);
                        const k=kellyF(tp,.5,S.kellyMult);
                        allEdges.push({
                          player:game.home_team+' vs '+game.away_team,sport:sport.name,sportEmoji:sport.e,sportColor:sport.c,
                          stat:'Game Total',line:over.point,direction:dir,
                          fairProb:tp,bookProb:bp,bestBook:bk.title,bestPrice:dir==='OVER'?over.price:under.price,
                          ev,grade,kelly:k*100,wager:Math.round(S.bankroll*k*100)/100,
                          allBooks:[{name:bk.title,price:dir==='OVER'?over.price:under.price}],
                          event:game.home_team+' vs '+game.away_team,
                          time:new Date(game.commence_time).toLocaleString()
                        });
                      }
                    }
                  }
                }
              });
            });
          });
        }
      }catch(e){}
    }catch(e){console.log('Sport error:',e)}
  }

  allEdges.sort((a,b)=>b.ev-a.ev);
  S.edges=allEdges;
  S.scanning=false;S.scanProgress=100;
  S.scanStatus='Found '+allEdges.length+' edges across all sports';
  save();render();
}

// ═══ HELPERS ═══
function getFilteredSorted(){
  const filtered=S.filterSport==='ALL'?S.edges:S.edges.filter(e=>e.sport===S.filterSport);
  return[...filtered].sort((a,b)=>S.sortBy==='ev'?b.ev-a.ev:S.sortBy==='kelly'?b.kelly-a.kelly:b.fairProb-a.fairProb);
}

      h+='</div>';

      // Clear button
      h+='<button style="width:100%;padding:12px;border-radius:8px;font-family:var(--mono);font-size:11px;cursor:pointer;background:rgba(255,23,68,.04);border:1px solid rgba(255,23,68,.1);color:var(--r);font-weight:700;letter-spacing:1px" onclick="if(confirm(\'Clear your custom slip?\'))clearSlip()">CLEAR SLIP</button>';
    }
  }

  // ═══ TRACK TAB ═══
  if(S.tab==='track'){
    const tp=S.results.length,w=S.results.filter(r=>r.hit).length,hr=tp>0?w/tp*100:0;
    const profit=S.results.reduce((s,r)=>s+(r.hit?r.wager*.8:-r.wager),0);
    h+='<div class="row r4">';
    [{l:'PLAYS',v:tp,c:'#fff'},{l:'HIT RATE',v:tp?hr.toFixed(1)+'%':'--',c:hr>55?'var(--g)':'var(--y)'},{l:'WINS',v:w,c:'var(--g)'},{l:'PROFIT',v:tp?(profit>=0?'+$':'-$')+Math.abs(profit).toFixed(2):'--',c:profit>=0?'var(--g)':'var(--r)'}].forEach(s=>{
      h+='<div class="box"><div class="vl">'+s.l+'</div><div class="val" style="color:'+s.c+'">'+s.v+'</div></div>'});
    h+='</div>';

    if(!tp)h+='<div class="empty"><div style="font-size:14px;color:var(--muted)">No results logged yet.</div></div>';

    S.results.slice().reverse().forEach(r=>{
      h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:'+(r.hit?'rgba(0,255,170,.03)':'rgba(255,23,68,.03)')+';border:1px solid '+(r.hit?'rgba(0,255,170,.08)':'rgba(255,23,68,.08)')+';border-radius:8px;margin-bottom:4px;font-size:11px">';
      h+='<div><span style="color:'+(r.hit?'var(--g)':'var(--r)')+';font-weight:700">'+(r.hit?'W':'L')+'</span> <span style="color:#bbb">'+r.player+'</span> <span style="color:#556">'+r.dir+' '+r.line+'</span></div>';
      h+='<div style="text-align:right;font-family:var(--mono)"><div style="color:#888;font-size:10px">'+r.book+' | $'+r.wager+'</div></div></div>';
    });

    if(tp)h+='<button style="width:100%;padding:10px;border-radius:8px;font-family:var(--mono);font-size:10px;cursor:pointer;background:rgba(255,23,68,.04);border:1px solid rgba(255,23,68,.1);color:var(--r);margin-top:10px;font-weight:700;letter-spacing:1px" onclick="if(confirm(\'Clear?\'))S.results=[],save(),render()">CLEAR</button>';
  }

  // ═══ SET TAB ═══
  if(S.tab==='set'){
    h+='<div class="setup"><div class="setup-t">🔑 The Odds API Key</div>';
    h+='<p style="font-size:13px;color:#99a;margin-bottom:8px;line-height:1.5">Paid plan from <strong style="color:var(--g)">the-odds-api.com</strong> — enables auto-scanning player props across all sports.</p>';
    h+='<label class="lbl">API KEY</label><input class="inp" id="apiKeyInput" type="text" value="'+S.apiKey+'" placeholder="Paste your API key here">';
    h+='<button style="padding:8px 20px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;background:rgba(0,255,170,.08);border:1px solid rgba(0,255,170,.15);color:var(--g);margin-top:8px;font-family:var(--mono)" onclick="saveApiKey()">SAVE KEY</button>';
    h+='<div id="apiStatus" style="margin-top:8px;font-size:10px;font-family:var(--mono)"></div></div>';

    h+='<div class="setup"><div class="setup-t">📊 What Gets Scanned (v3 — All Markets)</div>';
    h+='<p style="font-size:13px;color:#99a;line-height:1.6">The auto-scanner pulls player props from:<br><strong style="color:#aaa">DraftKings, FanDuel, BetMGM, Caesars, Bet365, BetRivers</strong></p>';
    h+='<p style="font-size:13px;color:#889;margin-top:8px;line-height:1.5">';
    h+='<strong style="color:#ff6b35">NBA:</strong> pts, reb, ast, 3PM, blk, stl, TO, PRA, combos, Q1 props, 1st basket, dbl-dbl, trp-dbl<br>';
    h+='<strong style="color:#ff9e44">NCAAB:</strong> pts, reb, ast, 3PM, blk, stl, PRA, combos<br>';
    h+='<strong style="color:#e040fb">WNBA:</strong> pts, reb, ast, 3PM, blk, stl, PRA<br>';
    h+='<strong style="color:#4ecdc4">NFL:</strong> pass/rush/rec yds, TDs, completions, sacks, tackles, kicking, longest<br>';
    h+='<strong style="color:#66bb6a">NCAAF:</strong> pass/rush/rec yds, TDs, completions<br>';
    h+='<strong style="color:#e63946">MLB:</strong> hits, TB, HR, RBI, runs, K, walks, doubles, SB, pitcher Ks/outs/ERA<br>';
    h+='<strong style="color:#457b9d">NHL:</strong> pts, goals, ast, SOG, blocks, PP pts, saves, anytime goal<br>';
    h+='<strong style="color:#6a0572">Soccer:</strong> EPL, MLS, La Liga, Bundesliga, Serie A, Ligue 1, UCL — goals, shots, assists, cards<br>';
    h+='<strong style="color:#d90429">MMA/Golf/Tennis:</strong> game-level moneylines, spreads, totals</p></div>';

    h+='<div class="setup"><div class="setup-t">🎫 Custom Slip</div>';
    h+='<p style="font-size:13px;color:#99a;line-height:1.5">Tap the <span style="color:var(--slip);font-weight:700">+</span> button on any edge card to build your own parlay slip (up to 10 legs). View combined probability, EV, Kelly sizing, and potential payout in the SLIP tab.</p></div>';

    h+='<div class="setup"><div class="setup-t">📱 Install as App</div>';
    h+='<p style="font-size:13px;color:#99a;line-height:1.5"><strong>iPhone/iPad:</strong> Share button → Add to Home Screen<br><strong>Android:</strong> Three-dot menu → Add to Home Screen</p></div>';

    h+='<div class="setup"><div class="setup-t">🗑 Reset</div>';
    h+='<button style="padding:8px 16px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;background:rgba(255,23,68,.04);border:1px solid rgba(255,23,68,.1);color:var(--r);font-family:var(--mono)" onclick="if(confirm(\'Factory reset?\'))localStorage.removeItem(\'evpro3\'),location.reload()">FACTORY RESET</button></div>';
  }

  h+='<div class="footer">+EV Scanner Pro v3.0 · All Markets + Custom Slip · Not financial advice</div>';

  // Floating slip badge (visible on scan tab when slip has items)
  if(S.tab==='scan'&&S.customSlip.length){
    h+='<div class="slip-badge" onclick="S.tab=\'slip\';render()">🎫<div class="slip-badge-count">'+S.customSlip.length+'</div></div>';
  }

  app.innerHTML=h;
}

load();render();

function saveApiKey(){
  var inp=document.getElementById('apiKeyInput');
  if(inp){S.apiKey=inp.value.trim();save();var st=document.getElementById('apiStatus');if(st){st.style.color=S.apiKey?'var(--g)':'var(--r)';st.textContent=S.apiKey?'Key saved! Go to SCAN tab and hit the scan button.':'No key entered.'};}
}

</script>
</body>
</html>
