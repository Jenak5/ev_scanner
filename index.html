function normalCdf(z){const t=1/(1+.2316419*Math.abs(z)),d=.3989422804*Math.exp(-z*z/2);const p=d*t*(.3193815+t*(-.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));return z>=0?1-p:p}
function americanToProb(odds){return odds>0?100/(odds+100):Math.abs(odds)/(Math.abs(odds)+100)}
function probToAmerican(p){return p>=.5?Math.round(-100*p/(1-p)):Math.round(100*(1-p)/p)}
function calcEv(tp,mp){return mp>0&&mp<1?(tp-mp)*(1/mp):0}
function kellyF(tp,mp,fr){const o=1/mp-1;if(o<=0)return 0;return Math.max(0,((tp*o-(1-tp))/o)*fr)}
function getGrade(ev){
  if(ev>=.20)return{l:'A+',c:'#00ffaa',bg:'18,255,170'};

  if(ev>=.08)return{l:'B+',c:'#76ff03',bg:'118,255,3'};
  if(ev>=.05)return{l:'B',c:'#c6ff00',bg:'198,255,0'};
  if(ev>=.02)return{l:'C',c:'#ffd600',bg:'255,214,0'};
  if(ev>=0)return{l:'D',c:'#ff9100',bg:'255,145,0'};
  return{l:'F',c:'#ff1744',bg:'255,23,68'};
}

// ═══ MARKET CATEGORIZATION ═══
function getMktCategory(key){
  if(key.includes('alternate_spread'))return{label:'ALT SPREAD',cls:'mkt-alt-spread'};
  if(key.includes('alternate_total')||key.includes('alternate_team_total'))return{label:'ALT TOTAL',cls:'mkt-alt-total'};
  if(key.includes('_h1')||key.includes('_h2'))return{label:'HALF',cls:'mkt-half'};
  if(key.includes('_q1')||key.includes('_q2')||key.includes('_q3')||key.includes('_q4'))return{label:'QTR',cls:'mkt-quarter'};
  if(key.includes('_p1')||key.includes('_p2')||key.includes('_p3'))return{label:'PERIOD',cls:'mkt-period'};
  if(key.includes('innings'))return{label:'INN',cls:'mkt-innings'};
  if(key.includes('spread'))return{label:'SPREAD',cls:'mkt-spread'};
  if(key.includes('total')||key.includes('team_total'))return{label:'TOTAL',cls:'mkt-total'};
  if(key==='h2h'||key==='h2h_3_way')return{label:'ML',cls:'mkt-ml'};
  if(key.includes('player_')||key.includes('pitcher_')||key.includes('batter_'))return{label:'PROP',cls:'mkt-prop'};
  if(key==='btts')return{label:'BTTS',cls:'mkt-total'};
  if(key==='draw_no_bet')return{label:'DNB',cls:'mkt-ml'};
  if(key==='double_chance')return{label:'DBL',cls:'mkt-ml'};
  if(key==='outrights')return{label:'FUTURE',cls:'mkt-ml'};
  return{label:'OTHER',cls:'mkt-ml'};
}

function getMktFilterKey(key){
  if(key.includes('alternate_spread'))return 'ALT_SPREAD';
  if(key.includes('alternate_total')||key.includes('alternate_team_total'))return 'ALT_TOTAL';
  if(key.includes('_h1')||key.includes('_h2'))return 'HALF';
  if(key.includes('_q1')||key.includes('_q2')||key.includes('_q3')||key.includes('_q4'))return 'QTR';
  if(key.includes('_p1')||key.includes('_p2')||key.includes('_p3'))return 'PERIOD';
  if(key.includes('innings'))return 'INNINGS';
  if(key.includes('player_')||key.includes('pitcher_')||key.includes('batter_'))return 'PROP';
  return 'MAIN';
}

    player_pass_tds:'Pass TDs',player_rush_tds:'Rush TDs',player_receptions:'Receptions',player_anytime_td:'Anytime TD',
    pitcher_strikeouts:'Strikeouts',batter_hits:'Hits',batter_home_runs:'HRs',batter_total_bases:'Total Bases',
    batter_rbis:'RBIs',batter_runs_scored:'Runs',batter_walks:'Walks',batter_stolen_bases:'Stolen Bases',
    player_goals:'Goals',player_shots_on_goal:'SOG',player_total_saves:'Saves',
    player_goal_scorer_anytime:'Anytime Goal',player_shots_on_target:'Shots on Target',player_shots:'Shots'
  };
  // Handle alternate props
  let k=key.replace('_alternate','');
  let prefix=key.includes('_alternate')?'Alt ':'';
  return prefix+(names[k]||key.replace(/_/g,' '));
}

// ═══ SCANNER ENGINE ═══
let scanAbort=false;

// Track API usage from response headers
function trackApi(res){
  const rem=res.headers.get('x-requests-remaining');
  const used=res.headers.get('x-requests-used');
  if(rem!==null)S.apiRemaining=rem;
  if(used!==null)S.apiUsed=used;
}

// Smart fetch with error tracking
async function apiFetch(url,label){
  try{
    const res=await fetch(url);
    trackApi(res);
    if(res.status===401){S.scanLog.push('❌ '+label+': Invalid API key');return null}
    if(res.status===429){S.scanLog.push('⚠️ '+label+': Rate limited (wait 1 min)');return null}
    if(res.status===422){S.scanLog.push('⚠️ '+label+': Quota exceeded');return null}
    if(!res.ok){S.scanLog.push('⚠️ '+label+': HTTP '+res.status);return null}
    return await res.json();
  }catch(e){
    S.scanLog.push('❌ '+label+': Network error');
    return null;
  }
}

// Process bookmaker data into edges
function findEdges(data,sport,event,mktKey,allEdges){
  if(!data||!data.bookmakers||!data.bookmakers.length)return;
  
  const marketData={};
  data.bookmakers.forEach(bk=>{
    (bk.markets||[]).forEach(mkt=>{
      if(!marketData[mkt.key])marketData[mkt.key]={};
      mkt.outcomes.forEach(oc=>{
        const ocKey=oc.name+(oc.point!==undefined?'|'+oc.point:'');
        if(!marketData[mkt.key][ocKey])marketData[mkt.key][ocKey]={outcomes:[],point:oc.point};
        marketData[mkt.key][ocKey].outcomes.push({book:bk.title,bookKey:bk.key,name:oc.name,price:oc.price,point:oc.point});
      });
    });
  });

  Object.entries(marketData).forEach(([mk,outcomes])=>{
    S.scanStats.markets++;
    Object.entries(outcomes).forEach(([ocKey,ocData])=>{
      const prices=ocData.outcomes.map(o=>o.price).filter(p=>p&&Math.abs(p)>=100);
      if(prices.length<2)return;

      const impliedProbs=prices.map(p=>americanToProb(p));
      const avgProb=impliedProbs.reduce((a,b)=>a+b,0)/impliedProbs.length;

      ocData.outcomes.forEach(bookOc=>{
        const bookProb=americanToProb(bookOc.price);
        if(bookProb<=0.01||bookProb>=0.99)return;
        const ev=calcEv(avgProb,bookProb);
        if(ev<.02)return;

        const grade=getGrade(ev);
        if(GR[grade.l]>GR[S.minGrade])return;

        const k=kellyF(avgProb,bookProb,S.kellyMult);
        const mktCat=getMktCategory(mk);

        allEdges.push({
          sport:sport.name,sportEmoji:sport.e,sportColor:sport.c,
          event:(event.away_team||'')+ ' @ '+(event.home_team||''),
          time:new Date(event.commence_time).toLocaleString(),
          marketKey:mk,marketName:formatMarketName(mk),
          mktCategory:mktCat,mktFilterKey:getMktFilterKey(mk),
          outcome:bookOc.name,point:bookOc.point,
          bestBook:bookOc.book,bestBookKey:bookOc.bookKey,bestPrice:bookOc.price,
          fairProb:avgProb,bookProb,ev,grade,
          kelly:k*100,wager:Math.round(S.bankroll*k*100)/100,
          allBooks:ocData.outcomes.map(o=>({name:o.book,price:o.price})),
          numBooks:prices.length
        });
        S.scanStats.edges++;
      });
    });
  });
}

async function runScan(){
  if(!S.apiKey){alert('Set your API key in the SET tab first');return}
  if(S.scanning){scanAbort=true;return}
  S.scanning=true;S.edges=[];scanAbort=false;
  S.scanStats={sports:0,events:0,markets:0,edges:0};
  S.scanLog=[];S.apiRemaining='?';S.apiUsed=0;
  render();

  const allEdges=[];

  // Scan each sport
  for(let si=0;si<SPORTS.length;si++){
    if(scanAbort)break;
    const sport=SPORTS[si];
    S.scanStatus=sport.e+' Scanning '+sport.name+'...';
    S.scanProgress=((si)/SPORTS.length)*100;
    render();

    // Step 1: Get events
    const events=await apiFetch(
      `https://api.the-odds-api.com/v4/sports/${sport.key}/events?apiKey=${S.apiKey}`,
      sport.name+' events'
    );
    if(!events||!events.length){
      S.scanLog.push('⏭ '+sport.name+': No events (off-season or no data)');
      continue;
    }
    S.scanStats.sports++;
    S.scanLog.push('✅ '+sport.name+': '+events.length+' events found');

    // Step 2: For each event, pull markets
    // Cap events per sport based on scan mode
    const maxEvents=Math.min(events.length, S.scanMode==='quick'?3:8);
    
    for(let ei=0;ei<maxEvents;ei++){
      if(scanAbort)break;
      const event=events[ei];
      S.scanStats.events++;
      const matchLabel=(event.away_team||'?')+' @ '+(event.home_team||'?');
      S.scanStatus=sport.e+' '+sport.name+': '+matchLabel+' ('+(ei+1)+'/'+maxEvents+')';
      S.scanProgress=((si+(ei/maxEvents))/SPORTS.length)*100;
      render();

      // Split markets into chunks of 8 to manage API cost
      // Each unique market in the response costs 1 quota unit
      const allMkts=[...sport.gameMarkets,...sport.propMarkets];
      const chunkSize=8;
      const chunks=[];
      for(let i=0;i<allMkts.length;i+=chunkSize)chunks.push(allMkts.slice(i,i+chunkSize));

      for(const chunk of chunks){
        if(scanAbort)break;
        
        // Check if we're running low on API quota
        if(S.apiRemaining!=='?'&&parseInt(S.apiRemaining)<5){
          S.scanLog.push('⚠️ API quota nearly exhausted ('+S.apiRemaining+' remaining). Stopping.');
          scanAbort=true;break;
        }

        const mktsStr=chunk.join(',');
        const data=await apiFetch(
          `https://api.the-odds-api.com/v4/sports/${sport.key}/events/${event.id}/odds?apiKey=${S.apiKey}&regions=us&markets=${mktsStr}&oddsFormat=american`,
          sport.name+' '+matchLabel+' markets'
        );
        
        if(data)findEdges(data,sport,event,null,allEdges);
        await new Promise(r=>setTimeout(r,200));
      }
      await new Promise(r=>setTimeout(r,150));
    }
  }

  // Sort by EV descending
  allEdges.sort((a,b)=>b.ev-a.ev);
  S.edges=allEdges;
  S.scanning=false;S.scanProgress=100;
  S.scanStatus=scanAbort?'⚠️ Scan stopped — '+allEdges.length+' edges found':'✅ Complete — '+allEdges.length+' edges found';
  S.lastScan=new Date().toLocaleString();
  save();render();
}

// ═══ SLIP GRADING ═══
function gradeSlip(picks){
  if(!picks.length)return null;
  const avgEv=picks.reduce((s,e)=>s+e.ev,0)/picks.length;
  const totalWager=picks.reduce((s,e)=>s+e.wager,0);
  const expectedProfit=picks.reduce((s,e)=>s+e.wager*e.ev,0);
  // Combined parlay: multiply fair probs
  const parlayFairProb=picks.reduce((p,e)=>p*e.fairProb,1);
  // Parlay implied prob from best book prices
  const parlayBookProb=picks.reduce((p,e)=>p*e.bookProb,1);
  const parlayOdds=parlayBookProb>0?probToAmerican(parlayBookProb):0;
  const parlayPayout=parlayBookProb>0?(1/parlayBookProb):0;
  const parlayEv=parlayFairProb>0&&parlayBookProb>0?calcEv(parlayFairProb,parlayBookProb):0;
  const grade=getGrade(avgEv);
  return{avgEv,totalWager,expectedProfit,parlayFairProb,parlayBookProb,parlayOdds,parlayPayout,parlayEv,grade,count:picks.length};
}

          h+='</div>';
          h+='<div style="font-size:12px;color:#aaa;margin-bottom:2px">'+e.event+'</div>';
          h+='<div style="font-size:11px;color:#888;margin-bottom:4px">'+e.marketName+' <span class="mkt-tag '+e.mktCategory.cls+'">'+e.mktCategory.label+'</span></div>';
          h+='<div style="display:flex;justify-content:space-between;font-size:12px;font-family:var(--mono)">';
          h+='<span style="color:var(--g)">'+e.bestBook+' '+e.bestPrice+'</span>';
          h+='<span style="color:#aaa">+'+(e.ev*100).toFixed(1)+'% EV</span>';
          h+='<span style="color:var(--y)">$'+e.wager.toFixed(2)+'</span>';
          h+='</div></div>';
        });
        h+='</div>';

      }else{
        h+='<div class="empty"><div style="font-size:32px;margin-bottom:10px">🏆</div>';
        h+='<div style="font-size:13px;color:#888">Run a scan first to build your recommended slip</div></div>';
      }
    }

    // ── MY CUSTOM SLIP ──
    else if(S.slipView==='my'){
      // Get the actual edge objects for my slip
      const myPicks=S.mySlip.map(idx=>S.edges[idx]).filter(e=>e);

      if(myPicks.length){
        const sg=gradeSlip(myPicks);

        // Slip grade header
        h+='<div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px">';
        h+='<span class="edge-grade" style="font-size:22px;padding:6px 16px;background:rgba('+sg.grade.bg+',.15);color:'+sg.grade.c+'">'+sg.grade.l+'</span>';
        h+='<div><div style="font-size:13px;font-weight:700;color:#fff">My Slip Grade</div>';
        h+='<div style="font-size:12px;color:#aaa;font-family:var(--mono)">'+sg.count+' picks · Avg EV: +'+(sg.avgEv*100).toFixed(1)+'%</div></div>';
        h+='</div>';

        // Grading breakdown cards
        h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">';
        h+='<div class="stat-card"><div class="stat-val" style="color:var(--g)">$'+sg.totalWager.toFixed(0)+'</div><div class="stat-lbl">TOTAL RISK</div></div>';
        h+='<div class="stat-card"><div class="stat-val" style="color:var(--y)">$'+sg.expectedProfit.toFixed(2)+'</div><div class="stat-lbl">EXP PROFIT</div></div>';
        h+='<div class="stat-card"><div class="stat-val" style="color:#bb86fc">'+sg.parlayOdds+'</div><div class="stat-lbl">PARLAY ODDS</div></div>';
        h+='</div>';

        // Parlay info
        h+='<div class="setup" style="margin-bottom:14px"><div class="setup-t">🎲 Parlay Breakdown</div>';
        h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
        h+='<div><label>PARLAY FAIR PROB</label><div style="font-size:16px;font-weight:700;color:#fff;font-family:var(--mono)">'+(sg.parlayFairProb*100).toFixed(3)+'%</div></div>';
        h+='<div><label>PARLAY BOOK PROB</label><div style="font-size:16px;font-weight:700;color:var(--r);font-family:var(--mono)">'+(sg.parlayBookProb*100).toFixed(3)+'%</div></div>';
        h+='<div><label>PARLAY PAYOUT</label><div style="font-size:16px;font-weight:700;color:var(--g);font-family:var(--mono)">'+sg.parlayPayout.toFixed(1)+'x</div></div>';
        h+='<div><label>PARLAY EV</label><div style="font-size:16px;font-weight:700;color:'+(sg.parlayEv>=0?'var(--g)':'var(--r)');
        h+=';font-family:var(--mono)">'+(sg.parlayEv>=0?'+':'')+(sg.parlayEv*100).toFixed(1)+'%</div></div>';
        h+='</div></div>';

        // My picks with remove buttons
        h+='<div class="slip"><div class="slip-t">🛠 MY PICKS</div>';
        myPicks.forEach((e,pos)=>{
          h+='<div style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);position:relative">';
          h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
          h+='<span style="font-size:14px;font-weight:700;color:#fff">'+e.sportEmoji+' '+e.outcome+(e.point!==undefined?' '+(e.point>0?'+':'')+e.point:'')+'</span>';
          h+='<div style="display:flex;align-items:center;gap:8px">';
          h+='<span class="edge-grade" style="font-size:11px;padding:2px 8px;background:rgba('+e.grade.bg+',.12);color:'+e.grade.c+'">'+e.grade.l+'</span>';
          h+='<button onclick="event.stopPropagation();removeFromSlip('+pos+')" style="background:rgba(255,23,68,.1);border:1px solid rgba(255,23,68,.15);color:var(--r);border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;font-family:var(--mono)">✕</button>';
          h+='</div></div>';
          h+='<div style="font-size:12px;color:#aaa;margin-bottom:2px">'+e.event+'</div>';
          h+='<div style="font-size:11px;color:#888;margin-bottom:4px">'+e.marketName+' <span class="mkt-tag '+e.mktCategory.cls+'">'+e.mktCategory.label+'</span></div>';
          h+='<div style="display:flex;justify-content:space-between;font-size:12px;font-family:var(--mono)">';
          h+='<span style="color:var(--g)">'+e.bestBook+' '+e.bestPrice+'</span>';
          h+='<span style="color:#aaa">+'+(e.ev*100).toFixed(1)+'% EV</span>';
          h+='<span style="color:var(--y)">$'+e.wager.toFixed(2)+'</span>';
          h+='</div></div>';
        });
        h+='</div>';

        h+='<button onclick="clearMySlip()" style="width:100%;padding:12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:rgba(255,23,68,.06);border:1px solid rgba(255,23,68,.12);color:var(--r);font-family:var(--mono);letter-spacing:1px;margin-bottom:14px">🗑 CLEAR MY SLIP</button>';

      }else{
        h+='<div style="text-align:center;padding:20px;margin-bottom:14px"><div style="font-size:32px;margin-bottom:10px">🛠</div>';
        h+='<div style="font-size:13px;color:#888;margin-bottom:6px">Add edges from below to build your custom slip</div>';
        h+='<div style="font-size:11px;color:#666">Your slip gets graded with EV, parlay odds, and expected profit</div></div>';
      }

      // Edge picker — show all scanned edges with "ADD" buttons
      if(S.edges.length){
        h+='<div class="setup"><div class="setup-t">➕ Add Edges to My Slip</div>';
        // Quick sport filter for picker
        const sportSet=new Set(S.edges.map(e=>e.sport));
        h+='<div class="filter-row" style="margin-bottom:10px">';
        h+='<button class="filter-btn'+(S.filterSport==='ALL'?' active':'')+'" onclick="S.filterSport=\'ALL\';render()">ALL</button>';
        sportSet.forEach(sp=>{
          const emoji=SPORTS.find(s=>s.name===sp)?.e||'';
          h+='<button class="filter-btn'+(S.filterSport===sp?' active':'')+'" onclick="S.filterSport=\''+sp+'\';render()">'+emoji+sp+'</button>';
        });
        h+='</div>';

        const pickerEdges=S.edges.filter(e=>S.filterSport==='ALL'||e.sport===S.filterSport).slice(0,50);
        const inSlipSet=new Set(S.mySlip);
        pickerEdges.forEach((e,i)=>{
          const globalIdx=S.edges.indexOf(e);
          const alreadyIn=inSlipSet.has(globalIdx);
          h+='<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.03)">';
          h+='<button onclick="'+(alreadyIn?'':'addToSlip('+globalIdx+')')+'" style="min-width:44px;padding:6px 0;border-radius:6px;font-size:11px;font-weight:700;cursor:'+(alreadyIn?'default':'pointer');
          h+=';background:'+(alreadyIn?'rgba(0,255,170,.08)':'rgba(255,255,255,.03)')+';border:1px solid '+(alreadyIn?'rgba(0,255,170,.2)':'var(--border)')+';color:'+(alreadyIn?'var(--g)':'#888')+';font-family:var(--mono)">'+(alreadyIn?'✓':'ADD')+'</button>';
          h+='<div style="flex:1;min-width:0">';
          h+='<div style="font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+e.sportEmoji+' '+e.outcome+(e.point!==undefined?' '+(e.point>0?'+':'')+e.point:'')+'</div>';
          h+='<div style="font-size:11px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+e.event+'</div>';
          h+='<div style="font-size:10px;color:#777">'+e.marketName+' <span class="mkt-tag '+e.mktCategory.cls+'">'+e.mktCategory.label+'</span></div>';
          h+='</div>';
          h+='<div style="text-align:right;min-width:60px">';
          h+='<div style="font-size:12px;font-weight:700;color:var(--g);font-family:var(--mono)">+'+(e.ev*100).toFixed(1)+'%</div>';
          h+='<div style="font-size:10px;color:'+e.grade.c+';font-family:var(--mono)">'+e.grade.l+'</div>';
          h+='</div></div>';
        });
        if(pickerEdges.length>=50)h+='<div style="text-align:center;font-size:11px;color:#666;padding:10px;font-family:var(--mono)">Showing top 50 edges</div>';
        h+='</div>';
      }else{
        h+='<div class="empty"><div style="font-size:28px;margin-bottom:8px">🔍</div>';
        h+='<div style="font-size:13px;color:#888">Run a scan first to see edges you can add</div></div>';
      }
    }
  }

  // ═══ SET TAB ═══
  else if(S.tab==='set'){
    h+='<div class="setup"><div class="setup-t">🔑 API Key</div>';
    h+='<input type="password" value="'+S.apiKey+'" placeholder="Paste your Odds API key" oninput="S.apiKey=this.value;save()" />';
    h+='<div style="font-size:11px;color:#666;margin-top:8px">Free key from <strong>the-odds-api.com</strong></div></div>';

    h+='<div class="setup"><div class="setup-t">💰 Bankroll & Sizing</div>';
    h+='<label>BANKROLL ($)</label>';
    h+='<input type="number" value="'+S.bankroll+'" oninput="S.bankroll=parseFloat(this.value)||100;save()" style="margin-bottom:8px" />';
    h+='<label>KELLY FRACTION</label>';
    h+='<select onchange="S.kellyMult=parseFloat(this.value);save()">';
    [.1,.15,.2,.25,.3,.5].forEach(v=>{
      h+='<option value="'+v+'"'+(S.kellyMult===v?' selected':'')+'>'+v+'x'+(v===.25?' (default)':'')+'</option>';
    });
    h+='</select></div>';

    h+='<div class="setup"><div class="setup-t">🎯 Minimum Grade Filter</div>';
    h+='<select onchange="S.minGrade=this.value;save();render()">';
    ['A+','A','B+','B','C','D'].forEach(g=>{
      h+='<option value="'+g+'"'+(S.minGrade===g?' selected':'')+'>'+g+(g==='C'?' (default)':'')+'</option>';
    });
    h+='</select>';
    h+='<div style="font-size:11px;color:#666;margin-top:8px">Only edges at or above this grade will show in scan results</div></div>';

    h+='<div class="setup"><div class="setup-t">📱 Install as App</div>';
    h+='<p style="font-size:13px;color:#888;line-height:1.6"><strong>iPhone/iPad:</strong> Share → Add to Home Screen<br><strong>Android:</strong> Menu → Add to Home Screen</p></div>';

    h+='<div class="setup"><div class="setup-t">📊 What\'s New in v3</div>';
    h+='<p style="font-size:13px;color:#aaa;line-height:1.8">';
    h+='<span class="mkt-tag mkt-alt-spread">ALT SPREAD</span> Alternate spreads across all games<br>';
    h+='<span class="mkt-tag mkt-alt-total">ALT TOTAL</span> Alternate totals (over/under)<br>';
    h+='<span class="mkt-tag mkt-half">HALF</span> 1st & 2nd half ML, spreads, totals<br>';
    h+='<span class="mkt-tag mkt-quarter">QTR</span> Q1–Q4 moneylines, spreads, totals<br>';
    h+='<span class="mkt-tag mkt-period">PERIOD</span> NHL period markets (P1, P2, P3)<br>';
    h+='<span class="mkt-tag mkt-innings">INN</span> MLB innings (F5, F3, F7, 1st inning)<br>';
    h+='<span class="mkt-tag mkt-prop">PROP</span> Player props + alternate props<br>';
    h+='</p></div>';

    h+='<div class="setup"><div class="setup-t">🗑 Reset</div>';
    h+='<button style="padding:8px 16px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;background:rgba(255,23,68,.04);border:1px solid rgba(255,23,68,.1);color:var(--r);font-family:var(--mono)" onclick="if(confirm(\'Factory reset?\'))localStorage.removeItem(\'evpro3\'),location.reload()">FACTORY RESET</button></div>';
  }

  h+='<div class="footer">+EV Scanner Pro v3.0 · Full Market Edition · Not financial advice</div>';
  app.innerHTML=h;
}

// ═══ INIT ═══
load();render();
</script>
</body>
</html>
